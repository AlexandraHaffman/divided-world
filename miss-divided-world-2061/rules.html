<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Правила · Мисс Разделённый мир 2061</title>

</head>
<body>
<div class="page">
  <div id="topbar"></div>
  <div class="wrap"><div id="main"></div></div>
  <div id="foot"></div>
</div>
<script src="data/data.js"></script>
<script>window.CB="";</script>
<script src="assets/js/main.js"></script>
<script>
(function(){
  if(!window.DWguard()) return;
  window.DWinit("rules.html");
  const DW=window.DWget(), esc=window.DWesc;
  const prelim=[["Выход в купальнике","30%"],["Вечернее платье","25%"],["Фракционный костюм","20%"],["Представление","15%"],["Закрытое интервью","10%"]];
  const stages=[
    ["35 → 20","Сумма пяти предварительных раундов по весам выше."],
    ["Топ-20 · Манифест + Импровизация","Подготовленное обращение к миру и живая импровизация без заготовки."],
    ["20 → 10","55% — предварительные раунды, 25% — «Манифест», 20% — импровизация."],
    ["Топ-10 · Персональный вопрос + Конкурс талантов","Один сложный вопрос каждой и номер, показывающий её настоящий дар."],
    ["10 → 5","45% — полуфинальный итог, 25% — персональный вопрос, 30% — конкурс талантов."],
    ["Топ-5 · Финальный образ + Фотосессия + Общий вопрос","Собственная система финала с двумя визуальными раундами."],
    ["5 → 3","40% — финальный образ, 35% — фотосессия, 25% — общий вопрос."],
    ["Топ-3 · Последнее слово","Минута без вопроса, затем блокировка оценок."],
    ["Корона","40% — финальный образ, 30% — общий вопрос, 30% — последнее слово."],
  ];
  const tb=["более высокий балл интервью","более высокий балл фракционного костюма","более высокий балл последнего актуального раунда","решение председателя жюри с письменным обоснованием"];
  const row=(a,b)=>`<div class="drow"><div class="k" style="color:var(--silver)">${a}</div><div class="v">${b}</div></div>`;
  document.getElementById("main").innerHTML=
    `<div class="section"><div class="round-hero" style="border:none;padding:0 0 8px">`+
    `<div class="rn">регламент и формула судейства</div><h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(32px,7vw,52px)">Правила</h1>`+
    `<div class="sub">Все оценки хранятся в едином источнике данных; места, средние и сокращения считаются автоматически. Отображаемые значения округлены до одного знака, расчёты ведутся с полной точностью.</div></div>`+

    `<div class="section"><div class="two-col">`+
    `<div class="card"><h3>Предварительные раунды · веса</h3><div class="drows" style="padding:0">${prelim.map(([a,b])=>row(a,b)).join("")}</div>`+
    `<p class="muted" style="font-size:12px;margin-top:8px">Ни одна участница не выбывает, не получив полноценного представления, интервью, купальника, вечернего платья и фракционного костюма.</p></div>`+
    `<div class="card"><h3>Разрешение равенства (тайбрейк)</h3><ol style="padding-left:18px;display:grid;gap:6px;font-size:13.5px">`+
    tb.map(t=>`<li>${t}</li>`).join("")+`</ol></div>`+
    `</div></div>`+

    `<div class="section"><div class="shead"><span class="n">Система этапов и агрегации</span></div>`+
    `<div class="card"><div class="drows" style="padding:0">${stages.map(([a,b])=>row(a,b)).join("")}</div>`+
    `<p class="muted" style="font-size:12px;margin-top:10px">Сокращения идут поэтапно: пройти дальше всегда весомее любого балла. Поэтому в итоговой таблице баллы сопоставимы внутри группы выбытия, а не между группами.</p></div></div>`+

    `<div class="section"><div class="two-col">`+
    `<div class="card"><h3>Отношение к морали</h3><p class="muted" style="font-size:13.5px">Конкурс оценивает красоту, индивидуальность, сценическую выразительность, харизму, интеллект, речь, стиль и способность стать символом — но не моральную добродетель. Участницы могут быть жестокими, авторитарными, опасными; злое или угрожающее выступление способно получить высокий балл за эффектность, убедительность и цельность образа. Жестокость не награждается автоматически, а мораль не является критерием.</p></div>`+
    `<div class="card"><h3>Модель судейства</h3><p class="muted" style="font-size:13.5px">У каждой участницы — двенадцать конкурсных атрибутов (0–10), выведенных из канона и реальных портретов: красота, сексуальность, пластика/форма, индивидуальность, харизма, интеллект, речь, стиль, владение залом, цельность, запоминаемость, сценическая сила. Это в первую очередь конкурс красоты: визуальные раунды (купальник, платье, представление, фотосессия) весят больше, а красота, сексуальность и форма — ключевые критерии выходов и учитываются даже в разговорных раундах. Каждый раунд оценивает своё подмножество атрибутов; семеро судей взвешивают их по своей зоне внимания с небольшим характерным разбросом. Модель детерминирована и не содержит ни одного слагаемого за славу, статус, боевую силу или мораль. Победитель не выбирается заранее — он вытекает из арифметики.</p></div>`+
    `</div></div>`+

    `<div class="section"><div class="shead"><span class="n">Судейская ложа и её предвзятость</span></div>`+
    `<div class="card"><p class="muted" style="font-size:13.5px;margin-bottom:10px">Судят не эксперты, а семь первых лиц держав — и они не беспристрастны. Предвзятость не спрятана: она вынесена в отдельную, честно задокументированную надбавку к баллу судьи. Итоговый балл судьи = оценка конкурсных качеств <b>плюс</b> надбавка = (симпатия к фракции) + (личное отношение) + (результат «работы с ложей»). Величины малые — десятые доли балла: они смещают картину, но не переворачивают арифметику.</p>`+
    `<div class="drows" style="padding:0">`+
    [["Адриан Гилберт · Единая Америка","эталон объективности — нулевая надбавка; взятки и лесть возвращает."],
     ["Артур Остерман · Тенебрион","+ своей церкви, − Ракшасам; отдельно + Ирэн Штайнер и Тенебрии. Манипуляцию узнаёт и не ведётся."],
     ["Ричард Уолш · Forge","+ Forge; сильная личная надбавка дочери Элари и её матери Кларе Уолш."],
     ["Дариан Сорель · Ракшасы","+ Ракшасам и + всем молодым и чувственным; падок на женское внимание — этим пользуются Нимфея и Валентина."],
     ["Курт Вистнер · Аркадия","+ Аркадии, − «пустой красоте» Единой Америки; ценит ум и цельность."],
     ["Элиас Дорн · Аркадия","малая + Аркадии; близок к объективности, ловит фальшь и заготовку."],
     ["Юлиан Грей · Аркадия","+ Аркадии; личная надбавка невесте Эмили Грей, которую старается судить строго."],
    ].map(([a,b])=>row(a,b)).join("")+`</div>`+
    `<p class="muted" style="font-size:12px;margin-top:10px">«Работа с ложей» — это закулисные усилия самих участниц (см. <a class="tag gold" href="chronology/interlude-1.html">«Игры за кулисами»</a>): Нимфея за вечер расположила к себе шестерых из семи, Валентина взяла грубее и подействовала лишь на падкого Сореля, а Гилберт вернул её подарки. Всё это — детерминированные величины в открытой модели, а не «драматургия задним числом».</p></div></div>`;
})();
</script>
</body>
</html>
