<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Правила · Мисс Разделённый мир 2061</title>
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/rounds.css">
</head>
<body>
<div class="page">
  <div id="topbar"></div>
  <div class="wrap"><div id="main"></div></div>
  <div id="foot"></div>
</div>
<script src="data/data.js"></script>
<script>window.CB="";</script>
<script src="assets/js/main.js"></script>
<script>
(function(){
  if(!window.DWguard()) return;
  window.DWinit("rules.html");
  const DW=window.DWget(), esc=window.DWesc;
  const prelim=[["Представление","10%"],["Закрытое интервью","25%"],["Выход в купальнике","20%"],["Вечернее платье","20%"],["Фракционный костюм","25%"]];
  const stages=[
    ["35 → 20","Сумма пяти предварительных раундов по весам выше."],
    ["Топ-20 · Манифест","Отдельный раунд обращения к миру."],
    ["20 → 10","60% — предварительные раунды, 40% — «Манифест»."],
    ["Топ-10 · Персональный вопрос","Один сложный вопрос каждой."],
    ["10 → 5","55% — полуфинальный итог, 45% — персональный вопрос."],
    ["Топ-5 · Финальный образ + Общий вопрос","Собственная система финала."],
    ["5 → 3","50% — финальный образ, 50% — общий вопрос."],
    ["Топ-3 · Последнее слово","Минута без вопроса, затем блокировка оценок."],
    ["Корона","40% — финальный образ, 30% — общий вопрос, 30% — последнее слово."],
  ];
  const tb=["более высокий балл интервью","более высокий балл фракционного костюма","более высокий балл последнего актуального раунда","решение председателя жюри с письменным обоснованием"];
  const row=(a,b)=>`<div class="drow"><div class="k" style="color:var(--silver)">${a}</div><div class="v">${b}</div></div>`;
  document.getElementById("main").innerHTML=
    `<div class="section"><div class="round-hero" style="border:none;padding:0 0 8px">`+
    `<div class="rn">регламент и формула судейства</div><h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(32px,7vw,52px)">Правила</h1>`+
    `<div class="sub">Все оценки хранятся в едином источнике данных; места, средние и сокращения считаются автоматически. Отображаемые значения округлены до одного знака, расчёты ведутся с полной точностью.</div></div>`+

    `<div class="section"><div class="two-col">`+
    `<div class="card"><h3>Предварительные раунды · веса</h3><div class="drows" style="padding:0">${prelim.map(([a,b])=>row(a,b)).join("")}</div>`+
    `<p class="muted" style="font-size:12px;margin-top:8px">Ни одна участница не выбывает, не получив полноценного представления, интервью, купальника, вечернего платья и фракционного костюма.</p></div>`+
    `<div class="card"><h3>Разрешение равенства (тайбрейк)</h3><ol style="padding-left:18px;display:grid;gap:6px;font-size:13.5px">`+
    tb.map(t=>`<li>${t}</li>`).join("")+`</ol></div>`+
    `</div></div>`+

    `<div class="section"><div class="shead"><span class="n">Система этапов и агрегации</span></div>`+
    `<div class="card"><div class="drows" style="padding:0">${stages.map(([a,b])=>row(a,b)).join("")}</div>`+
    `<p class="muted" style="font-size:12px;margin-top:10px">Сокращения идут поэтапно: пройти дальше всегда весомее любого балла. Поэтому в итоговой таблице баллы сопоставимы внутри группы выбытия, а не между группами.</p></div></div>`+

    `<div class="section"><div class="two-col">`+
    `<div class="card"><h3>Отношение к морали</h3><p class="muted" style="font-size:13.5px">Конкурс оценивает красоту, индивидуальность, сценическую выразительность, харизму, интеллект, речь, стиль и способность стать символом — но не моральную добродетель. Участницы могут быть жестокими, авторитарными, опасными; злое или угрожающее выступление способно получить высокий балл за эффектность, убедительность и цельность образа. Жестокость не награждается автоматически, а мораль не является критерием.</p></div>`+
    `<div class="card"><h3>Модель судейства</h3><p class="muted" style="font-size:13.5px">У каждой участницы — одиннадцать конкурсных атрибутов (0–10), выведенных из канона. Каждый раунд оценивает своё подмножество атрибутов. Семь судей взвешивают их по своей компетенции, добавляют небольшой характерный разброс и не выходят за пределы своей области. Модель детерминирована и не содержит ни одного слагаемого за славу, статус, боевую силу или мораль. Победитель не выбирается заранее — он вытекает из арифметики.</p></div>`+
    `</div></div>`;
})();
</script>
</body>
</html>
