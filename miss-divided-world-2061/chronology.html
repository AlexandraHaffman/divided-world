<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хроника · Мисс Разделённый мир 2061</title>
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/chronology.css">
</head>
<body>
<div class="page">
  <div id="topbar"></div>
  <div class="wrap"><div id="main"></div></div>
  <div id="foot"></div>
</div>
<script src="data/data.js"></script>
<script>window.CB="";</script>
<script src="assets/js/main.js"></script>
<script>
(function(){
  if(!window.DWguard()) return;
  window.DWinit("chronology.html");
  const DW=window.DWget(), esc=window.DWesc;
  const DESC={
    prologue:"Площадка, вещание, корона, символ и судейская коллегия. Как расколотый мир согласился сесть в один амфитеатр.",
    arrivals:"Тридцать пять способов войти в один зал: кортежи, морские явления, демонстративная роскошь и тихое проникновение без прессы.",
    opening:"Парад и первые баллы: походка, взгляд, реплика каждой под оценку семи судей.",
    interviews:"Три вопроса без репетиции. Биография, мораль, причина участия — и первые трещины в масках.",
    swimwear:"Пластика и присутствие. Сексуальность от холодной до почти агрессивной; мета-способности как часть номера.",
    "evening-gowns":"Вечер в несколько актов. Концепция, силуэт и характер, обращённые в ткань и свет.",
    "faction-costumes":"Самый политический раунд. Каждая представляет державу или идеологию — а иные лишь себя.",
    "interlude-1":"Сутки без камер: шопинг, бар, сад, сёстры, столы по фракциям и те, кто приехал навестить. Здесь участницы впервые становятся живыми.",
    "top-20":"Первое большое сокращение. Пять предварительных раундов запечатаны, остаются двадцать.",
    manifesto:"Двадцать голосов расколотого мира. Власть, страх, вера, превосходство — без благотворительной повестки.",
    "top-10":"Полуфинал закрывается: 60% предварительных раундов и 40% манифеста решают, кто из двадцати остаётся.",
    "stage-questions":"Десять личных вопросов, бьющих в самое больное. Спрятаться за красивой фразой нельзя.",
    talent:"Десятка показывает не образ, а дар: голос, тело, разум, силу. Пять минут, чтобы доказать, что за внешностью есть содержание.",
    "top-5":"Пятеро выходят в финал. Кто-то проходит на десятые доли балла.",
    "interlude-2":"Общий ужин пятёрки без камер: какие они не на подиуме, а в жизни. Последний тихий вечер перед короной.",
    "final-looks":"Финальные образы: не повтор, а завещание вкуса каждой из пяти.",
    photo:"Пять финалисток перед объективом мировой трансляции. Чистый визуал и чувственность, которую ловит только камера.",
    "final-question":"Один вопрос на всех: чем ваш образ достоин стать символом эпохи. Пять разных голосов.",
    "top-3":"Собственная система финала выносит вердикт. Остаются трое.",
    "last-word":"Минута без вопроса. После третьей речи оценки блокируются навсегда.",
    coronation:"Специальные титулы, запечатанный топ-3 и корона «Разлом», нашедшая свою голову."
  };
  const items=(DW.timeline||[]).map(t=>{
    const cls=t.key==="coronation"?"tl-item crown":"tl-item";
    return `<a class="${cls}" href="${t.href}">`+
      `<div class="tl-top"><span class="tl-date">${esc(t.date)}</span><span class="tl-remain">осталось ${t.remaining}</span></div>`+
      `<div class="tl-title">${esc(t.title)}</div>`+
      `<div class="tl-desc">${esc(DESC[t.key]||"")}</div>`+
      `<span class="arrow">Читать главу →</span></a>`;
  }).join("");
  document.getElementById("main").innerHTML=
    `<div class="section"><div class="round-hero" style="border:none;padding:0 0 8px">`+
    `<div class="rn">17 глав · 8 дней</div><h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(34px,8vw,56px)">Хроника конкурса</h1>`+
    `<div class="sub">Читайте последовательно, как большой иллюстрированный репортаж: от подготовки и прибытия первой участницы до момента, когда корона оказалась на голове победительницы. Итоги сокращений скрыты, пока вы не откроете режим спойлеров.</div></div>`+
    `<div class="timeline">${items}</div>`+
    `<div class="center section"><a class="btn" href="chronology/prologue.html">▶ Начать с пролога</a></div></div>`;
})();
</script>
</body>
</html>
