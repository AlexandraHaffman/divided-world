<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Эпилог · Мисс Разделённый мир 2061</title>
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/rounds.css">
</head>
<body>
<div class="page">
  <div id="topbar"></div>
  <div class="wrap"><div id="main"></div></div>
  <div id="foot"></div>
</div>
<script src="data/data.js"></script>
<script>window.CB="";</script>
<script src="assets/js/main.js"></script>
<script>
(function(){
  if(!window.DWguard()) return;
  window.DWinit("epilogue.html");
  const DW=window.DWget(), esc=window.DWesc;
  const host=document.getElementById("main");
  const hero=`<div class="round-hero" style="border:none;padding:0 0 8px"><div class="rn">после эфира</div>`+
    `<h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(32px,7vw,52px)">Эпилог</h1>`+
    `<div class="sub">Что произошло сразу после трансляции и в последующие дни и недели — в рамках конкурсной хроники, не переписывая канон мира.</div></div>`;
  if(!window.DWspoilers()){
    host.innerHTML=`<div class="section">${hero}<div class="spoiler-shield">`+
      `<div class="serif" style="font-size:20px;color:var(--white)">Эпилог раскрывает исход</div>`+
      `<p class="muted" style="margin-top:8px">Он написан для тех, кто уже знает победительницу.</p>`+
      `<button class="btn" onclick="window.DWsetSpoilers(true);location.reload()">Показать эпилог</button></div></div>`;
    return;
  }
  const P=[
    `<b>Сигнал не выключили сразу.</b> Когда контур лица ${'Нимфеи Эленис'} погас, купол «эфирного неба» ещё несколько секунд держал над лагуной серебряную линию символа «Единого лица». По обе стороны Рубежа операторы позже признавались, что не решились обрывать кадр — расколотый мир впервые за десятилетие смотрел в одно лицо и не отводил взгляд.`,
    `<b>Реакция фракций.</b> Единая Америка встретила победу своей иконы триумфом государственного масштаба: «Голос Америки» вышел со спецвыпуском, а немногие понимающие аплодировали молча, осознав, что держава короновала собственного кукловода. Тихая гавань по КВ-радиосвязи передала со всех семи Домов один и тот же ленивый позывной одобрения — серебро Ульяны Спасской там сочли «достойным уловом при чужой погоде», и к утру хозяйка моря уже была у тёплой воды. Ракшасы объявили бронзу Валентины Блажек «признанием вечного величия» — и в Дакке в ту ночь крутили её довоенные плёнки на всех уцелевших экранах.`,
    `<b>Красота против слова — и против ложи.</b> Арифметика вечера ещё долго будет предметом разборов: Ульяна Спасская выиграла у будущей победительницы четыре визуальных раунда из пяти — представление, купальник, финальный образ и фотосессию — и вошла в тройку первой строкой финального этапа. Но корону считают по речам не меньше, чем по образу, а на словах Нимфея не знала равных весь конкурс. К этому прибавилось то, о чём в протоколах не пишут: за восемь дней «серый кардинал» по одному обошла судейскую ложу из семи первых лиц держав — и почти каждого чем-то к себе расположила. Итоговый разрыв в четыре десятых балла критики назвали «честным при нечестной ложе»: система оценок открыто учитывала, кто кому благоволит, — и всё равно свела всё к арифметике. «Красоту вечера звали Спасской, — записал кто-то из наблюдателей Мыса, — но корону, как всегда в этом мире, забрал тот, кто лучше умел говорить с теми, кто её вручает».`,
    `<b>Кто не признал результат.</b> Сама Валентина, разумеется. Вторая вице-мисс приняла ленту так, будто ей вручили чужое пальто, забрала «Выбор публики» и «Лучшую финальную речь» и объявила со ступеней амфитеатра: «Жюри выбрало символ. Публика выбрала звезду. История нас рассудит — а она всегда на моей стороне». Ушла под собственную овацию; свита не спорила. Вивиан Мерсер сочла, что «критерии жюри несовершенны, а не она». А Тенебриа, так и не дошедшая до тройки, досмотрела коронацию под куполом, болтая ногами в воздухе, и сотворила себе из света коронку «получше настоящей» — ей было почти всё равно, и это встревожило политтехнологов Остермана сильнее любого проигрыша.`,
    `<b>Вирусные речи.</b> Самым пересылаемым фрагментом по обе стороны Рубежа стал не финал, а манифест Кавиты Рао: пленница, которой позволили лишь стоять и молчать, произнесла имя своего почти исчезнувшего народа на весь мир. К утру запись было уже не изъять — её видели миллионы, и Дакка не смогла притвориться, что этого не было. Следом расходились «тихая измена» Ольги Гончаровой, признание Кассандры Стерлинг, что она «умирает стоя и судит стоя», кадр, на котором Анаиса Аскирион посреди своей боевой симфонии впервые снимает зеркальное забрало — солдаты Кадиса, говорят, пересматривали его молча, по одному, как письмо из дома, — и финальный ответ Лилии Спасской, отдавшей корону «той, кто останется» прямо в прямом эфире: фразу «держитесь так крепко, что руки заняты и обнять нечем» к утру писали на стенах в четырёх державах.`,
    `<b>Самый обсуждаемый образ.</b> Спорили долго. Кинематографисты выбрали финальный образ победительницы — «Единое лицо», где холодное серебро перетекало в тёплое золото по линии шва. Улица чаще вспоминала соляной лес Аши Наир и водяные стены Ульяны. А критики моды сошлись на том, что самым честным нарядом вечера был свиток-летопись Кавиты — единственный костюм, который был не одеждой, а свидетельством.`,
    `<b>Скандалы.</b> Пресс-центр несколько дней разбирал «нечестный приём» с ароматом в фракционном костюме Нимфеи; она парировала, что «духи — её флаг, а не оружие», и тема угасла сама, как всё, чего она касалась. Дольше держался тихий скандал вокруг того, что государственный эфир невольно дал трибуну и подпольщице Мириам Блум, и пленнице Ракшасов, и офицеру, признавшемуся в готовности предать присягу ради памяти. «Пакт одного вечера», впрочем, выдержал: ни одна делегация не сорвалась.`,
    `<b>Что получила победительница.</b> Формально — корону «Разлом», ленту эфирного серебра и титул лица расколотого мира на год. Фактически Нимфея Эленис получила то, ради чего и приезжала: сотни решающих людей в одном амфитеатре, каждого из которых она за вечер прочла и к каждому нашла подход. Её статус иконы не изменился — он лишь стал официальным. Те, кто понимает природу её силы, отметили тревожную деталь: мир только что добровольно выбрал своим символом женщину, которая никогда не повышает голос и всегда получает власть из чужих рук.`,
    `<b>Спустя недели.</b> Отношение публики к финалисткам разошлось по знакомым линиям раскола: одни увидели в короне Нимфеи доказательство, что мир устал от спасителей и выбрал ту, рядом с кем «не страшно, что всё расколото»; другие — предупреждение. Ульяна Спасская к результату вернулась ровно один раз, отсалютовав несуществующим бокалом. Анаиса, по слухам, надела шлем обратно только на трапе — и с тех пор снимает его чаще, чем за все восемь лет Кадиса. А Селеста Орсини перевела всё свалившееся на неё внимание на детские приюты — и, кажется, только она из всей хроники осталась в этой истории по-настоящему в выигрыше.`,
    `<b>Итог.</b> Конкурс «Мисс Разделённый мир — 2061» не примирил державы и не изменил канон мира. Он сделал другое: на восемь дней заставил расколотый мир смотреть в одно лицо — и признать, что даже собственный символ он способен выбрать лишь таким, каков он сам: прекрасным, опасным и держащимся на шве, который никто не решается назвать вслух.`,
  ];
  const THREADS=[
    ["Сёстры Спасские","Через месяц метеослужбы семи Домов зафиксировали «аномально устойчивый циклон» над главной гаванью Ульяны: Лилия гостила девять дней — рекорд за всю историю наблюдений. Халат так и не вернула. Ульяна заказала третий, «гостевой», и все в Доме знают, чей он."],
    ["Эва и Ольга","На прощание наёмница вернула майору заколки — все, кроме одной. Ольга не потребовала. Теперь по обе стороны Рубежа есть по заколке из одного набора, и обе владелицы считают это самым надёжным каналом связи из существующих."],
    ["Среда, как всегда","Катарина Меланье и Ирэн Штайнер вернулись в Тенебрион разными рейсами, но в первую же среду сели за свой стол. Спор о выправке истины открыт двадцать первый год. По слухам, теперь в нём появился новый аргумент: «а вот на Мысе…» — и это единственное, в чём они согласны."],
    ["Кухня Бьянки","Плитка с острова уехала в багаже, но адрес запомнили все. Марии Ждановой в Белую зону раз в месяц приходит посылка без обратного адреса: специи, соль, один раз — розмарин в горшке. Таможня трёх держав пропускает её, не вскрывая. Есть вещи святее протоколов."],
    ["Букет и датасеты","Изабелла Родригес получила от Абигейл Ли ответный подарок: датасет с полным разбором того букета — сорта, символика, вероятные поставщики, прогноз увядания. В сопроводительной строке значилось: «Проанализировано. Понравилось». Изабелла считает это лучшей рецензией в карьере."],
    ["Студия на двоих","Запись, о которой не знает ни один канал: последней ночью на острове Харпер Вэнс и Мириам Блум всё-таки спели дуэтом — один дубль, без имён на плёнке. Кассету разрезали пополам, по половине каждой. Если однажды мир перестанет делиться, они обещали её склеить."],
    ["Анкета по ветру","Вивиан Мерсер получила свою анкету обратно через три недели — потрёпанную, с песком в сгибах и одной галочкой в графе «свободное посещение». Лилия появляется в её школе без расписания, с попутным ветром. Посещаемость в эти дни стопроцентная."],
    ["Персики","Кристина Новак увезла с острова косточку. Посадила во дворе обители, никому не объясняя. Тенебриа знает. Иногда над этим двором стоит погода лучше, чем позволяет сезон, и садовники разводят руками. Дерево, говорят, взойдёт к следующему конкурсу."],
    ["Звездолёт, 1 шт.","Саманта Чен, вернувшись, нашла в отчётности новую смету Чэнь Вэй. Подписала не читая, как всегда. Что именно паялось ночами за стеной её номера — выяснится, по расчётам самой Чэнь, «к весне, если Айша одолжит гараж». Айша уже одолжила."],
    ["Окно Кавиты","Стихи, прочитанные на весь мир, вернулись к Кавите Рао эхом: в Дакку потекли письма — тонкой, но непересыхающей струйкой, на языке, который считали почти исчезнувшим. Ей по-прежнему нельзя многого. Но окно, у которого она обещала стоять, больше не закрывается изнутри."],
  ];
  const threadsHTML=`<div class="shead" style="margin-top:26px"><span class="n">Нити, которые не оборвались</span></div>`+
    `<p class="muted" style="margin-bottom:14px">Конкурс закончился. Истории, начавшиеся между этими женщинами, — нет. Десять нитей, за которыми хроника следила до самого конца.</p>`+
    `<div class="threads">`+THREADS.map(([t,b])=>`<div class="thread"><div class="tt">${t}</div><p>${b}</p></div>`).join("")+`</div>`;
  host.innerHTML=`<div class="section">${hero}`+
    `<div class="stage-scene chron">`+P.map(p=>`<p>${p}</p>`).join("")+`</div>`+
    threadsHTML+
    `<div class="center section"><a class="btn ghost" href="leaderboard.html">Полный рейтинг 1–35 →</a> `+
    `<a class="btn ghost" href="index.html">На главную</a></div></div>`;
})();
</script>
</body>
</html>
