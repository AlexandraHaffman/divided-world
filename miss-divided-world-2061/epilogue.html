<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Эпилог · Мисс Разделённый мир 2061</title>
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/rounds.css">
</head>
<body>
<div class="page">
  <div id="topbar"></div>
  <div class="wrap"><div id="main"></div></div>
  <div id="foot"></div>
</div>
<script src="data/data.js"></script>
<script>window.CB="";</script>
<script src="assets/js/main.js"></script>
<script>
(function(){
  if(!window.DWguard()) return;
  window.DWinit("epilogue.html");
  const DW=window.DWget(), esc=window.DWesc;
  const host=document.getElementById("main");
  const hero=`<div class="round-hero" style="border:none;padding:0 0 8px"><div class="rn">после эфира</div>`+
    `<h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(32px,7vw,52px)">Эпилог</h1>`+
    `<div class="sub">Что произошло сразу после трансляции и в последующие дни и недели — в рамках конкурсной хроники, не переписывая канон мира.</div></div>`;
  if(!window.DWspoilers()){
    host.innerHTML=`<div class="section">${hero}<div class="spoiler-shield">`+
      `<div class="serif" style="font-size:20px;color:var(--white)">Эпилог раскрывает исход</div>`+
      `<p class="muted" style="margin-top:8px">Он написан для тех, кто уже знает победительницу.</p>`+
      `<button class="btn" onclick="window.DWsetSpoilers(true);location.reload()">Показать эпилог</button></div></div>`;
    return;
  }
  const P=[
    `<b>Сигнал не выключили сразу.</b> Когда контур лица ${'Нимфеи Эленис'} погас, купол «эфирного неба» ещё несколько секунд держал над лагуной серебряную линию символа «Единого лица». По обе стороны Рубежа операторы позже признавались, что не решились обрывать кадр — расколотый мир впервые за десятилетие смотрел в одно лицо и не отводил взгляд.`,
    `<b>Реакция фракций.</b> Единая Америка встретила победу своей иконы триумфом государственного масштаба: «Голос Америки» вышел со спецвыпуском, а немногие понимающие аплодировали молча, осознав, что держава короновала собственного кукловода. Тихая гавань по КВ-радиосвязи передала со всех семи Домов один и тот же ленивый позывной одобрения — Ульяна Спасская к утру уже была у тёплой воды. Ракшасы восприняли третье место Амели Бертран сдержанно; в Бастионе, по слухам, той ночью впервые за годы не проверяли плитку на трещины.`,
    `<b>Кто не признал результат.</b> Валентина Блажек, забрав «Выбор публики», объявила зрительский титул важнее короны жюри и покинула остров под собственную овацию — свита не спорила. Вивиан Мерсер сочла, что «критерии жюри несовершенны, а не она». А Тенебриа, не прошедшая в пятёрку, досмотрела финал под куполом, болтая ногами в воздухе, и сотворила себе из света коронку «получше настоящей» — ей было почти всё равно, и это встревожило политтехнологов Остермана сильнее любого проигрыша.`,
    `<b>Вирусные речи.</b> Самым пересылаемым фрагментом по обе стороны Рубежа стал не финал, а манифест Кавиты Рао: пленница, которой позволили лишь стоять и молчать, произнесла имя своего почти исчезнувшего народа на весь мир. К утру запись было уже не изъять — её видели миллионы, и Дакка не смогла притвориться, что этого не было. Следом расходились «тихая измена» Ольги Гончаровой, признание Кассандры Стерлинг, что она «умирает стоя и судит стоя», и последнее слово Амели, закончившееся возвращённой на руку перчаткой.`,
    `<b>Самый обсуждаемый образ.</b> Спорили долго. Кинематографисты выбрали финальный образ победительницы — «Единое лицо», где холодное серебро перетекало в тёплое золото по линии шва. Улица чаще вспоминала соляной лес Аши Наир и водяные стены Ульяны. А критики моды сошлись на том, что самым честным нарядом вечера был свиток-летопись Кавиты — единственный костюм, который был не одеждой, а свидетельством.`,
    `<b>Скандалы.</b> Пресс-центр несколько дней разбирал «нечестный приём» с ароматом в фракционном костюме Нимфеи; она парировала, что «духи — её флаг, а не оружие», и тема угасла сама, как всё, чего она касалась. Дольше держался тихий скандал вокруг того, что государственный эфир невольно дал трибуну и подпольщице Мириам Блум, и пленнице Ракшасов, и офицеру, признавшемуся в готовности предать присягу ради памяти. «Пакт одного вечера», впрочем, выдержал: ни одна делегация не сорвалась.`,
    `<b>Что получила победительница.</b> Формально — корону «Разлом», ленту эфирного серебра и титул лица расколотого мира на год. Фактически Нимфея Эленис получила то, ради чего и приезжала: сотни решающих людей в одном амфитеатре, каждого из которых она за вечер прочла и к каждому нашла подход. Её статус иконы не изменился — он лишь стал официальным. Те, кто понимает природу её силы, отметили тревожную деталь: мир только что добровольно выбрал своим символом женщину, которая никогда не повышает голос и всегда получает власть из чужих рук.`,
    `<b>Спустя недели.</b> Отношение публики к финалисткам разошлось по знакомым линиям раскола: одни увидели в короне Нимфеи доказательство, что мир устал от спасителей и выбрал ту, рядом с кем «не страшно, что всё расколото»; другие — предупреждение. Ульяна Спасская к результату вернулась ровно один раз, отсалютовав несуществующим бокалом. Амели, по слухам, той ночью долго смотрела на свои руки без перчаток. А Селеста Орсини направила всё призовое внимание «Главного прорыва» на детские приюты — и, кажется, только она из всего топа осталась в этой истории по-настоящему в выигрыше.`,
    `<b>Итог.</b> Конкурс «Мисс Разделённый мир — 2061» не примирил державы и не изменил канон мира. Он сделал другое: на восемь дней заставил расколотый мир смотреть в одно лицо — и признать, что даже собственный символ он способен выбрать лишь таким, каков он сам: прекрасным, опасным и держащимся на шве, который никто не решается назвать вслух.`,
  ];
  host.innerHTML=`<div class="section">${hero}`+
    `<div class="stage-scene chron">`+P.map(p=>`<p>${p}</p>`).join("")+`</div>`+
    `<div class="center section"><a class="btn ghost" href="leaderboard.html">Полный рейтинг 1–35 →</a> `+
    `<a class="btn ghost" href="index.html">На главную</a></div></div>`;
})();
</script>
</body>
</html>
