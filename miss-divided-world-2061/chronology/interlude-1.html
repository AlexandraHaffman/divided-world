<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Закулисье · Свободный день · Мисс Разделённый мир 2061</title>
<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="../assets/css/rounds.css">
</head>
<body>
<div class="page">
  <div id="topbar"></div>
  <div class="wrap"><div id="main"></div></div>
  <div id="foot"></div>
</div>
<script src="../data/data.js"></script>
<script>window.CB="../";</script>
<script src="../assets/js/main.js"></script>
<script>
(function(){
  if(!window.DWguard()) return;
  window.DWinit("chronology.html");
  const DW=window.DWget(), esc=window.DWesc;
  const t=(DW.timeline||[]).find(x=>x.key==="interlude-1")||{};
  const S=(title,body)=>`<div class="section"><div class="shead"><span class="n">${esc(title)}</span></div><div class="stage-scene chron">${body}</div></div>`;
  const P=arr=>arr.map(p=>`<p>${p}</p>`).join("");
  document.getElementById("main").innerHTML=
    `<div class="round-hero"><div class="rn">${esc(t.date||"")} · до первого сокращения</div>`+
    `<h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(30px,7vw,52px)">Закулисье · Свободный день</h1>`+
    `<div class="sub">Между фракционным костюмом и первым сокращением — сутки без камер главного эфира. Именно здесь, а не на подиуме, тридцать пять женщин впервые становятся живыми: ссорятся, флиртуют, скучают, мирятся и ждут тех, кто приехал их навестить.</div>`+
    window.DWprogress("interlude-1")+`</div>`+

    S("Жилой ярус", P([
      `Резиденции «Нейтраль-Ат» разведены по кольцу над лагуной, но перегородки тонкие, а балконы общие — и к вечеру расколотый мир, который на сцене держит «Пакт одного вечера», в быту сбивается в компании по старым линиям симпатий и вражды. Организаторы расселили участниц нарочито вперемешку, «ради дружбы народов»; вышло, как всегда, ради сплетен.`,
      `Соседство сложилось анекдотичное. Аша Наир, которой полагались покои владычицы Патны, к обеду превратила номер в свалку из подушек и бокалов и переселилась спать на балкон соседки. Кассандра Стерлинг потребовала отдельный этаж «из соображений акустики» — на деле чтобы никто не слышал, как по ночам её лекарство даёт сбой. А Лилия Спасская вообще не взяла номер: её видели спящей на кровле, свернувшись под ветром, и портье перестал предлагать ей постель.`,
    ]))+

    S("Трио у витрин · Нимфея, Харпер, Вивиан", P([
      `Свободный день Нимфея Эленис провела так, как провела бы любой: превратила его в работу, которая выглядит как удовольствие. Она увела «за покупками» на торговую палубу острова двух женщин из своей орбиты — Харпер Вэнс и Вивиан Мерсер, — и обе были счастливы, не заметив, что их выбрали.`,
      `Харпер, тайная любовница и послушный рупор Нимфеи, весь день ловила на себе её тёплый взгляд и оживала от него, как от кислорода; к вечеру она уже была готова в эфире сказать что угодно и о ком угодно — достаточно намёка. Вивиан примеряла спортивные линии будущего сезона и всерьёз рассуждала о «новом человечестве», не подозревая, что сама давно стала подопытной в чужом эксперименте. Нимфея не купила почти ничего. Она весь день покупала людей — расплачиваясь вниманием, и это обходилось ей дешевле всего.`,
      `«Она держит их за руку и ведёт к обрыву, а они думают, что гуляют», — обронила наблюдавшая издалека Далия Морэ, репортёр. И тут же добавила: «И, боже, как красиво она это делает».`,
    ]))+

    S("Ночь в баре «Мыс» · Александра, Эва, Вероника — и снова Нимфея", P([
      `Поздно вечером в прибрежном баре Маркуса Кросса собралась компания поопаснее. Вероника Рин пришла первой, заняла место спиной к стене и просчитала выходы. Эва Найт материализовалась у стойки так, что бармен вздрогнул. Александра Вегас явилась «случайно», с той же милой историей про сломанную машину, — и Эва, единственная, кто её узнал, молча подняла бокал: два хищника, признавшие друг друга.`,
      `Разговор шёл вполголоса, о контрактах, маршрутах и о том, кто из делегаций врёт громче. Потом заглянула Нимфея — без свиты, будто мимоходом, — и села к ним, и даже эти четверо, каждая из которых умеет убивать, на час поверили, что просто выпивают со «своими». Лилия Спасская покружила у входа сквозняком, стащила чью-то оливку и исчезла, так и не сев: скука в баре показалась ей менее интересной, чем ветер снаружи.`,
      `Расходились под утро. «Полезный вечер», — сказала Эва, ни к кому не обращаясь. У неё за спиной уже было три нужных разговора. Возможно, за этим она на конкурс и приехала.`,
    ]))+

    S("Сад среди стали · Элари и Мария", P([
      `Пока одни ходили по барам, Элари Уолш и Мария Жданова затеяли то, чего от конкурса красоты не ждут. Элари, задыхающаяся от резкого света прожекторов, нашла отдушину в тени служебных ярусов и вместе с Марией, лидером гуманитарного «Ковчега», за день превратила заброшенную террасу для персонала в маленький сад: земля в ящиках, рассада, поливальные жёлобы.`,
      `К ним тихо присоединилась Айша Хан — та самая, что когда-то восстанавливала школы на выжженной земле; втроём они накрыли ужин для обслуги острова, которую весь конкурс не замечает. Никаких камер, никакой «благотворительной повестки для баллов» — Мария вообще не знала, что где-то идут оценки. «Жизнь стоит посвящать кому-то рядом», — сказала она, и Элари, дочь самого влиятельного человека мира, впервые за конкурс улыбнулась по-настоящему.`,
    ]))+

    S("Две сестры · Ульяна и Лилия", P([
      `Их встречи всегда похожи на сквозняк: лёгкие, короткие, слишком сильные, чтобы исчезнуть, и слишком лёгкие, чтобы стать привязанностью. Ульяна Спасская — воплощённая роскошь, тёплая вода, семь дворцов — и Лилия, её сестра-близнец, — ветер, пыль и рваные лоскуты. Они сидели на кровле над лагуной, и Ульяна, как всегда, велела принести два халата; Лилия, как всегда, свой не надела.`,
      `Говорили мало. Ульяна предлагала сестре остаться «хоть на неделю, в тепле». Лилия смотрела на воду и молчала, а потом сказала: «Тебе постелили весь мир. Мне — открыли». Ульяна засмеялась, не обидевшись: они давно поделили катастрофу пополам и обе остались довольны своей половиной. На рассвете Лилия растворилась в порыве ветра, а Ульяна ушла в море. Родственная нить, слишком лёгкая, чтобы удержать, и слишком крепкая, чтобы порваться, снова провисла до следующего раза.`,
    ]))+

    S("Столы по фракциям", P([
      `За общим ужином расколотый мир расселся по своим — и это было красноречивее любого протокола.`,
      `<b>Тенебрион</b> собрался вокруг Селесты Орсини, как паства вокруг Великой Матери; Кристина Новак тихо лечила кому-то сорванный на репетициях голос. К их столу, нарушив все протоколы безопасности, спустилась инкогнито сама Тенебриа — «просто поболтать», как обычно, не думая, что богине нельзя сидеть с людьми; Кристина накрыла её плечи шалью и увела раньше, чем это заметили. Чуть в стороне Ольга Гончарова и Лилит Блэквуд ели молча, следя друг за другом: две тени державы, каждая знающая, что другая знает слишком много.`,
      `<b>Forge</b> держался теснее всех — почти семья. Изабелла Родригес рассказывала истории, Чэнь Вэй чинила заклинивший кофейный автомат вместо того чтобы отдыхать, а Саманта Чен в уме считала бюджет вечера. Но главным за этим столом было тихое: Клара Уолш сидела рядом со своей дочерью Элари, и хронистка человеческих судеб, привыкшая записывать чужие потери, весь ужин просто держала дочь за руку — редкая для неё роскошь.`,
      `<b>Ракшасы</b> сидели порознь и страшно. Валентину Блажек окружала стайка Обликов-поклонников, привезённых как «свита»; она купалась в их обожании и мрачнела, стоило кому-то за соседним столом не обернуться. Аша Наир дремала прямо за столом. А Кавита Рао ела под приглядом «почётного сопровождения» — стражи, следящей, чтобы пленница не сказала лишнего, — и всё равно умудрилась передать хлеб голодной девочке из обслуги.`,
    ]))+

    S("Кто к кому приехал", P([
      `Свободный день — это ещё и день приездов. У кого-то они были нежными, у кого-то — жуткими.`,
      `К Ирэн Штайнер приехал Артур Остерман — тот единственный человек, рядом с которым Апостол может перестать быть Апостолом. Их видели на дальнем причале: он говорил, она слушала и изредка возражала — не подчинённая, а равная. Ради этих часов тишины он отложил дела целой державы.`,
      `К Амели Бертран явился Эмиль Грант — приграничный хозяин Ракшасов, чья одержимость ею давно перешла границы приличия: он держит у себя женщин, отобранных по сходству с ней, и живёт ради её сухой похвалы. Он привёз ей выверенно-симметричный подарок и застыл в дверях, как проситель. Амели окинула и подарок, и его самого одним холодным взглядом на предмет пыли, обронила «уберите вот это» — и было непонятно, о подарке речь или о нём. Он ушёл счастливым: она хотя бы посмотрела.`,
      `К Эмили Грей ненадолго вырвался с задания её жених Юлиан Грей — редкие часы вдвоём между её вылазками и его службой. А над Кавитой Рао весь день висела тень Дариана Сореля: он не приехал, но прислал «напоминание» — и она стала ещё осторожнее в словах, потому что дома её ребёнок.`,
      `Бьянка Скардино навещающих не ждала, но по Белой зоне поползли слухи, что где-то у периметра видели Маро — и организаторы всю ночь не спали. Он не показался. Но Бьянка спала спокойнее обычного.`,
    ]))+

    S("Сводка прессы к утру", P([
      `К рассвету пресс-центр подвёл итог не баллам, а симпатиям. «Главная героиня закулисья — Нимфея Эленис: за один свободный день она, кажется, подружилась со всеми и не сблизилась ни с кем». Самой обсуждаемой парой назвали сестёр Спасских. Самым трогательным моментом — сад Элари и Марии. Самым тревожным — визит Эмиля к Амели. А букмекеры Мыса впервые сдвинули котировки: те, кого весь мир считал «возрастными фаворитками», после ночи живого общения вдруг стали казаться публике куда менее интересными, чем юные, у которых, как выяснилось, есть характер.`,
    ]))+

    window.DWchapnav("interlude-1");
})();
</script>
</body>
</html>
