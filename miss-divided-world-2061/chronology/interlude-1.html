<script>
(function(){
  if(!window.DWguard()) return;
  window.DWinit("chronology.html");
  const DW=window.DWget(), esc=window.DWesc;
  const t=(DW.timeline||[]).find(x=>x.key==="interlude-1")||{};
  const S=(title,body)=>`<div class="section"><div class="shead"><span class="n">${esc(title)}</span></div><div class="stage-scene chron">${body}</div></div>`;
  const P=arr=>arr.map(p=>`<p>${p}</p>`).join("");
  document.getElementById("main").innerHTML=
    `<div class="round-hero"><div class="rn">${esc(t.date||"")} · до первого сокращения</div>`+
    `<h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(30px,7vw,52px)">Закулисье · Свободный день</h1>`+
    `<div class="sub">Между фракционным костюмом и первым сокращением — сутки без камер главного эфира. Именно здесь, а не на подиуме, тридцать пять женщин впервые становятся живыми: ссорятся, флиртуют, скучают, мирятся и ждут тех, кто приехал их навестить.</div>`+
    window.DWprogress("interlude-1")+`</div>`+

    S("Жилой ярус", P([
      `Резиденции «Нейтраль-Ат» разведены по кольцу над лагуной, но перегородки тонкие, а балконы общие — и к вечеру расколотый мир, который на сцене держит «Пакт одного вечера», в быту сбивается в компании по старым линиям симпатий и вражды. Организаторы расселили участниц нарочито вперемешку, «ради дружбы народов»; вышло, как всегда, ради сплетен.`,
      `Соседство сложилось анекдотичное. Аша Наир, которой полагались покои владычицы Патны, к обеду превратила номер в свалку из подушек и бокалов и переселилась спать на балкон соседки. Кассандра Стерлинг потребовала отдельный этаж «из соображений акустики» — на деле чтобы никто не слышал, как по ночам её лекарство даёт сбой. А Лилия Спасская вообще не взяла номер: её видели спящей на кровле, свернувшись под ветром, и портье перестал предлагать ей постель.`,
    ]))+

    S("Трио у витрин · Нимфея, Харпер, Вивиан", P([
      `Свободный день Нимфея Эленис провела так, как провела бы любой: превратила его в работу, которая выглядит как удовольствие. Она увела «за покупками» на торговую палубу острова двух женщин из своей орбиты — Харпер Вэнс и Вивиан Мерсер, — и обе были счастливы, не заметив, что их выбрали.`,
      `Харпер, тайная любовница и послушный рупор Нимфеи, весь день ловила на себе её тёплый взгляд и оживала от него, как от кислорода; к вечеру она уже была готова в эфире сказать что угодно и о ком угодно — достаточно намёка. Вивиан примеряла спортивные линии будущего сезона и всерьёз рассуждала о «новом человечестве», не подозревая, что сама давно стала подопытной в чужом эксперименте. Нимфея не купила почти ничего. Она весь день покупала людей — расплачиваясь вниманием, и это обходилось ей дешевле всего.`,
      `«Она держит их за руку и ведёт к обрыву, а они думают, что гуляют», — обронил наблюдавший издалека Элиас Дорн, Спаситель Аркадии. И тут же добавил: «И, боже, как красиво она это делает».`,
    ]))+

    S("Ночь в баре «Мыс» · Александра, Эва, Вероника — и снова Нимфея", P([
      `Поздно вечером в прибрежном баре Маркуса Кросса собралась компания поопаснее. Вероника Рин пришла первой, заняла место спиной к стене и просчитала выходы. Эва Найт материализовалась у стойки так, что бармен вздрогнул. Александра Вегас явилась «случайно», с той же милой историей про сломанную машину, — и Эва, единственная, кто её узнал, молча подняла бокал: два хищника, признавшие друг друга.`,
      `Разговор шёл вполголоса, о контрактах, маршрутах и о том, кто из делегаций врёт громче. Потом заглянула Нимфея — без свиты, будто мимоходом, — и села к ним, и даже эти четверо, каждая из которых умеет убивать, на час поверили, что просто выпивают со «своими». Лилия Спасская покружила у входа сквозняком, стащила чью-то оливку и исчезла, так и не сев: скука в баре показалась ей менее интересной, чем ветер снаружи.`,
      `Расходились под утро. «Полезный вечер», — сказала Эва, ни к кому не обращаясь. У неё за спиной уже было три нужных разговора. Возможно, за этим она на конкурс и приехала.`,
    ]))+

    S("Сад среди стали · Элари и Мария", P([
      `Пока одни ходили по барам, Элари Уолш и Мария Жданова затеяли то, чего от конкурса красоты не ждут. Элари, задыхающаяся от резкого света прожекторов, нашла отдушину в тени служебных ярусов и вместе с Марией, лидером гуманитарного «Ковчега», за день превратила заброшенную террасу для персонала в маленький сад: земля в ящиках, рассада, поливальные жёлобы.`,
      `К ним тихо присоединилась Айша Хан — та самая, что когда-то восстанавливала школы на выжженной земле; втроём они накрыли ужин для обслуги острова, которую весь конкурс не замечает. Никаких камер, никакой «благотворительной повестки для баллов» — Мария вообще не знала, что где-то идут оценки. «Жизнь стоит посвящать кому-то рядом», — сказала она, и Элари, дочь самого влиятельного человека мира, впервые за конкурс улыбнулась по-настоящему.`,
    ]))+

    S("Две сестры · Ульяна и Лилия", P([
      `Их встречи всегда похожи на сквозняк: лёгкие, короткие — и самые тёплые из всех, что случаются на этой планете. Ульяна Спасская — воплощённая роскошь, тёплая вода, семь дворцов — и Лилия, её сестра-близнец, — ветер, пыль и рваные лоскуты. Они сидели на кровле над лагуной, и Ульяна, как всегда, велела принести два халата; Лилия, как всегда, свой не надела — а потом всё равно завернулась в сестрин, вторым слоем, потому что он пах домом.`,
      `Говорили мало — близнецам слова нужны меньше всех. Ульяна предлагала сестре остаться «хоть на неделю, в тепле». Лилия смотрела на воду и молчала, а потом сказала: «Тебе постелили весь мир. Мне — открыли». Ульяна засмеялась и поцеловала её в макушку: они давно поделили катастрофу пополам и обе выбрали бы половину сестры, если бы той было надо.`,
      `А под утро горничная, принёсшая воду, тихо попятилась из спальни: громадная кровать хозяйки моря, на которой уместился бы совет всех семи Домов, была занята целиком — две одинаковые женщины спали валетом, как в детстве в отцовской каюте, накрытые одним халатом на двоих. Лилия, которая не спит под крышами, спала под крышей. Ульяна, которая никому не позволяет себя обнимать, спала, вцепившись в сестрин локоть, как в спасательный круг. Стихия и империя, тридцать лет делившие мир, на одну ночь снова поделили одну подушку.`,
      `На рассвете Лилия растворилась в порыве ветра, унеся халат, — Ульяна сделала вид, что не заметила, и до завтрака улыбалась морю. Родственная нить, слишком лёгкая, чтобы её было видно, и слишком крепкая, чтобы порваться, натянулась и тихо звенела до следующего раза.`,
    ]))+

    S("Столы по фракциям", P([
      `За общим ужином расколотый мир расселся по своим — и это было красноречивее любого протокола.`,
      `<b>Тенебрион</b> собрался вокруг Селесты Орсини, как паства вокруг Великой Матери; Кристина Новак тихо лечила кому-то сорванный на репетициях голос. К их столу, нарушив все протоколы безопасности, спустилась инкогнито сама Тенебриа — «просто поболтать», как обычно, не думая, что богине нельзя сидеть с людьми; Кристина накрыла её плечи шалью и увела раньше, чем это заметили. Чуть в стороне Ольга Гончарова и Лилит Блэквуд ели молча, следя друг за другом: две тени державы, каждая знающая, что другая знает слишком много.`,
      `<b>Forge</b> держался теснее всех — почти семья. Изабелла Родригес рассказывала истории, Чэнь Вэй чинила заклинивший кофейный автомат вместо того чтобы отдыхать, а Саманта Чен в уме считала бюджет вечера. Но главным за этим столом было тихое: Клара Уолш сидела рядом со своей дочерью Элари, и хронистка человеческих судеб, привыкшая записывать чужие потери, весь ужин просто держала дочь за руку — редкая для неё роскошь.`,
      `<b>Ракшасы</b> сидели порознь и страшно. Валентину Блажек окружала стайка Обликов-поклонников, привезённых как «свита»; она купалась в их обожании и мрачнела, стоило кому-то за соседним столом не обернуться. Аша Наир дремала прямо за столом. А Кавита Рао ела под приглядом «почётного сопровождения» — стражи, следящей, чтобы пленница не сказала лишнего, — и всё равно умудрилась передать хлеб голодной девочке из обслуги.`,
    ]))+

    S("Кто к кому приехал", P([
      `Свободный день — это ещё и день приездов. У кого-то они были нежными, у кого-то — жуткими.`,
      `К Ирэн Штайнер приехал Артур Остерман — тот единственный человек, рядом с которым Апостол может перестать быть Апостолом. Их видели на дальнем причале: он говорил, она слушала и изредка возражала — не подчинённая, а равная. Ради этих часов тишины он отложил дела целой державы.`,
      `К Амели Бертран явился Эмиль Грант — приграничный хозяин Ракшасов, чья одержимость ею давно перешла границы приличия: он держит у себя женщин, отобранных по сходству с ней, и живёт ради её сухой похвалы. Он привёз ей выверенно-симметричный подарок и застыл в дверях, как проситель. Амели окинула и подарок, и его самого одним холодным взглядом на предмет пыли, обронила «уберите вот это» — и было непонятно, о подарке речь или о нём. Он ушёл счастливым: она хотя бы посмотрела.`,
      `К Эмили Грей ненадолго вырвался с задания её жених Юлиан Грей — редкие часы вдвоём между её вылазками и его службой. А над Кавитой Рао весь день висела тень Дариана Сореля: он не приехал, но прислал «напоминание» — и она стала ещё осторожнее в словах, потому что дома её ребёнок.`,
      `Бьянка Скардино навещающих не ждала, но по Белой зоне поползли слухи, что где-то у периметра видели Маро — и организаторы всю ночь не спали. Он не показался. Но Бьянка спала спокойнее обычного.`,
    ]))+

    S("Игры за кулисами · и семеро мужчин, которые всё решают", P([
      `В этом году организаторы сделали то, чего не делали никогда: посадили в судейскую ложу не экспертов, а власть — семерых первых лиц держав. Апостол Тенебриона Артур Остерман. Председатель Единой Америки Адриан Гилберт. Директор Forge Ричард Уолш. «Бог тьмы и света» Ракшасов Дариан Сорель. И трое Спасителей Аркадии — Курт Вистнер, Элиас Дорн и Юлиан Грей. Семеро мужчин, привыкших решать судьбы держав, сели решать, какая женщина красивее. Каждый привёз в ложу свои симпатии — и никто даже не подумал их прятать.`,
      `Это меняло правила подковёрной игры. Раньше жюри уговаривали разговором о крое; теперь — тем, что действует на мужчину, который может всё. И чем опаснее участница, тем тоньше — или горячее — была её партия.`,
      `<b>Нимфея Эленис</b> провела вечер, «случайно» оказываясь наедине с каждым — по одному, будто расписание само сводило её то с одним, то с другим. Она не соблазняла в лоб; она делала хуже — давала каждому именно ту его версию, в которую он всю жизнь хотел поверить. Холодному рационалисту <b>Вистнеру</b> она возражала про его же «Изумруд» так точно, что он впервые за годы спорил с удовольствием — и всё равно остался при своём: этот лёд не растопить взглядом. С <b>Уолшем</b> она говорила об архитектуре образа, стоя чуть ближе, чем нужно, и к полуночи директор Forge смотрел на неё уже не как на конструкцию. <b>Дорна</b>, который читает ложь по паузе, она обезоружила единственным доступным ему способом — не солгав ни разу; Спаситель ушёл, поймав себя на уважении, а уважение у Дорна дороже страсти. А с <b>Сорелем</b>… с Сорелем всё было проще и жарче: стареющему «богу тьмы и света», привыкшему, что женское внимание берут силой, впервые за десятилетия внимание подарили — и он поплыл, как мальчишка. Наутро каждый из шести был уверен, что понял эту женщину как никто. Седьмой, <b>Остерман</b>, всё видел насквозь — сам такой — и оценил работу с холодным профессиональным восхищением, не сдвинув балл ни на десятую. Нимфея и не рассчитывала на него: шести из семи более чем достаточно.`,
      `<b>Валентина Блажек</b> пошла грубее — так, как умела в свою золотую эпоху, когда продюсеры сами всё понимали. Наряд, от которого нечем дышать, полумрак, «случайно» оброненная бретель и прямой, тяжёлый взгляд дивы. На <b>Сореля</b> это подействовало безотказно: лецер узнал родственную породу и был совершенно счастлив завысить всё, что она ему покажет. Зато <b>Гилберт</b>, которому она отправила тех же Обликов с «подарками», вернул коробки нераспечатанными и вынес ей первое предупреждение о поведении — на грани снятия. Председатель не берёт и не смотрит; в этом весь его вес. Валентина закатила истерику, расплакалась, объявила, что «он просто завидует моей эпохе», — и к утру верила в это сама.`,
      `Были и те, кто ничего не делал — а эффект был. <b>Аша Наир</b> просто существовала, лениво и роскошно, и <b>Сорель</b> заглядывался на неё сам, без единого её усилия; её это забавляло меньше, чем его. <b>Вивиан Мерсер</b> позволяла собой любоваться как совершенным изделием — и тот же Сорель охотно любовался. А <b>Александра Вегас</b> обворожила <b>Дорна</b> той самой «случайной» историей про сломанную машину — и Спаситель, читающий людей насквозь, так и не понял, что его аккуратно прочитали первым.`,
      `<b>Эва Найт</b> не соблазняла и не дарила. Она слушала, запоминала и к концу вечера знала о каждой делегации — и о каждом судье — на одну неудобную деталь больше, чем те хотели бы. Никто не видел как; просто на столе у одного распорядителя наутро оказалась тонкая папка без подписи, и человек стал очень сговорчивым.`,
      `Самую тихую партию разыграли двое. <b>Нимфея</b> за бокалом мимоходом напомнила <b>Кассандре Стерлинг</b>, кто ежемесячно поставляет ей лекарство, без которого не простоять и недели. Ни угрозы, ни условия — просто «как ваше здоровье, дорогая?». Кассандра, привыкшая быть неотвратимой, впервые за вечер отвела взгляд.`,
      `А <b>Ольга Гончарова</b>, лучший следователь Тенебриона, весь вечер просто пила чай в углу — и видела всё: как Остерман теплеет к своим тенебрионкам и мрачнеет на Ракшасов, как Уолш не может судить свою дочь Элари и её мать Клару беспристрастно, как Грей отводит глаза от собственной невесты Эмили, как Сорель тянет вверх всё, что молодо и дышит. Ничего не сказала. Просто занесла в память, как заносит в свой тайный архив: эта ложа честна ровно настолько, насколько нечестен каждый в ней по отдельности. Кому-то из этих игр однажды предъявят счёт — и Ольга будет знать точные даты.`,
      `Не все играли. <b>Мария Жданова</b> вообще не поняла, что идёт вторая программа, и весь вечер кормила обслугу. <b>Кристина Новак</b>, когда ей намекнули «подружиться с нужным судьёй», мягко ответила, что дружит только с теми, кому нужна помощь. А <b>Айша Хан</b>, застав чужую попытку испортить сопернице костюм, молча всё починила и сказала виновнице пару слов, после которых та до финала обходила Forge стороной.`,
    ]))+

    S("Кухня после отбоя · Бьянка, Мария — и неожиданные гости", P([
      `Официальный ужин закончился в десять. Настоящий начался в полночь: в номере Бьянки Скардино, где вопреки всем правилам пожарной безопасности живёт походная плитка, прошедшая две осады. Мария Жданова пришла первой — с ведром льда, собранным после банкета («у нас за такое ведро зимой недельный паёк отдают»), и они молча, слаженно, как два ветерана одной войны, принялись готовить бульон для девочек, которых мутит от нервов перед сокращением.`,
      `К часу ночи на запах подтянулись гости, которых здесь никто не ждал. Ольга Гончарова села чистить овощи — руки следователя: ничего лишнего, ничего мимо. А потом в дверях возникла Тенебриа — босая, инкогнито, с наволочкой вместо шали — и попросилась «просто посидеть у плиты». Ей дали лук. Богиня резала его, как заговорённая, и плакала над ним честно, по-человечески, и была за это благодарна: над чем ещё богине можно поплакать без последствий для мироздания?`,
      `«У огня не спрашивают, почему к нему приходят», — только и сказала Бьянка. К трём часам бульон разошёлся по этажу анонимно, под дверь, как контрабанда. Наутро половина участниц гадала, кого благодарить. Вторая половина уже знала — и молчала, потому что такие святилища не выдают.`,
    ]))+

    S("Полночь у бассейна · Картер и Ли", P([
      `Подсвеченная вода, два шезлонга, министр и технократ. Спор Эмили Картер и Абигейл Ли о том, могут ли алгоритмы заменить политиков, начался днём как пикировка — а к полуночи превратился в то, чего обе не планировали: в разговор, который жалко заканчивать.`,
      `Абигейл строила модели, Эмили разбирала их живыми примерами из восьми лет у власти; счёт шёл ровно, и обе втайне этому радовались. В два часа ночи Абигейл, поколебавшись, показала ей на планшете личный проект, который не видел никто в Forge. Эмили посмотрела долго и сказала: «Вот поэтому вас и нельзя заменить алгоритмом — он бы такое постеснялся показать». Это был лучший комплимент за карьеру обеих. Продолжение назначили, не сговариваясь: следующая ничья — после купальников.`,
    ]))+

    S("Студия в четыре утра · Харпер и Мириам", P([
      `Островная студия звукозаписи ночью принадлежит техникам — и тем, кому не спится. Харпер Вэнс пришла снять с плёнки свой завтрашний эфирный голос. Мириам Блум — записать на волну голос для своих, подпольный, живой. Они столкнулись в дверях аппаратной: официальный тембр Единой Америки и голос её улиц, нос к носу, без свидетелей.`,
      `Минуту молчали. Потом Харпер молча подвинулась у пульта. Работали параллельно, не глядя друг на друга, — но техник, дремавший за стеклом, клянётся, что под конец слышал, как два голоса, каждый сам по себе, вполголоса вели одну и ту же старую песню — в терцию, случайно, конечно же случайно. На пульте остались две кассеты. Подписаны не были.`,
    ]))+

    S("Чтение при спящей Аше · Кавита и Валентина", P([
      `В покоях делегации Ракшасов — свой ритуал, о котором не знает даже «почётное сопровождение» Кавиты. Поздно ночью, когда стража меняется, Валентина Блажек приходит к поэтессе «на пять минут» и остаётся на два часа: Кавита читает ей вполголоса новое, Валентина рассказывает про старое кино — империю, которой больше нет, премьеры, которых не вернуть. Аша Наир приходит тоже — и засыпает на плече Кавиты ровно на третьей строфе, каждый раз, как по нотам.`,
      `«Ты пишешь так, что старая хищница плачет в подушку из настоящего шёлка», — сказала в ту ночь Валентина, и это была самая честная рецензия в жизни Кавиты. Клетка не перестала быть клеткой. Но в ней, оказывается, можно читать вслух — и тебя слушают те, кто прекрасно смотрится на её прутьях.`,
    ]))+

    S("Среда на чужой территории · Катарина и Ирэн", P([
      `Двадцать лет подряд, каждую среду, Верховная Наставница Катарина Меланье и философ Ирэн Штайнер садятся в Тенебрионе за один и тот же стол и спорят об одном и том же: нужна ли смыслу выправка. Свободный день конкурса выпал на среду. Стола не было. Они нашли ящики из-под реквизита на служебной палубе, накрыли их скатертью, позаимствованной у банкетной службы, и в семь вечера — по домашнему времени — спор был открыт, как всегда.`,
      `«Сутулая истина не доходит до строя», — начала Катарина, разливая чай. «Строй, которому нужна выправка истины, слушает каблуки», — отозвалась Ирэн, пододвигая сахар. Мимо прошла Лилит Блэквуд, замерла, посмотрела на двух самых страшных женщин своей державы, мирно воюющих над ящиками, — и впервые за конкурс улыбнулась. Некоторые традиции держат мир крепче армий. Счёт по-прежнему не открыт.`,
    ]))+

    S("Сводка прессы к утру", P([
      `К рассвету пресс-центр подвёл итог не баллам, а симпатиям. «Главная героиня закулисья — Нимфея Эленис: за один свободный день она, кажется, подружилась со всеми и не сблизилась ни с кем». Самой обсуждаемой парой назвали сестёр Спасских. Самым трогательным моментом — сад Элари и Марии. Самым тревожным — визит Эмиля к Амели. А букмекеры Мыса впервые сдвинули котировки: те, кого весь мир считал «возрастными фаворитками», после ночи живого общения вдруг стали казаться публике куда менее интересными, чем юные, у которых, как выяснилось, есть характер.`,
    ]))+

    window.DWchapnav("interlude-1");
})();
