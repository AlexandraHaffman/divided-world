<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Персонажи | Разделённый мир</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
:root{--bg:#05080f;--text:#b8cfe0;--dim:#4a6a80;--white:#e8f4ff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,20,40,0.12) 2px,rgba(0,20,40,0.12) 4px);pointer-events:none;z-index:1000;}
.dossier-overlay::before{display:none;}
.dossier-overlay::after{display:none;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(30,60,100,0.15) 1px,transparent 1px),linear-gradient(90deg,rgba(30,60,100,0.15) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

.header{position:relative;z-index:10;padding:20px 16px 14px;border-bottom:1px solid rgba(30,100,180,0.2);}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.back-btn{color:var(--dim);text-decoration:none;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0.1em;border:1px solid rgba(30,100,180,0.3);padding:4px 10px;border-radius:3px;transition:all 0.2s;}
.back-btn:hover{color:#4fc3f7;border-color:#4fc3f7;}
.sys-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:0.12em;}
.sys-label span{color:#4fc3f7;}
.page-title{font-size:26px;font-weight:700;color:var(--white);letter-spacing:0.08em;text-transform:uppercase;}
.page-title::before{content:'// ';color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:13px;}
.stats-row{display:flex;gap:16px;margin-top:6px;}
.stat-pill{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:0.1em;}
.stat-pill b{color:#4fc3f7;}

.filters{position:relative;z-index:10;padding:10px 16px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid rgba(30,100,180,0.15);}
.filter-btn{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.06em;padding:4px 10px;background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--dim);border-radius:3px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.filter-btn:hover{color:var(--white);border-color:rgba(255,255,255,0.3);}
.filter-btn.active{color:var(--white);border-color:var(--fc,#4fc3f7);background:rgba(var(--fr,79,195,247),0.08);box-shadow:0 0 8px rgba(var(--fr,79,195,247),0.15);}

.grid{position:relative;z-index:10;display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px;}

/* КАРТОЧКА БЕЗ ФОТО */
.char-card{position:relative;background:linear-gradient(135deg,rgba(8,13,24,0.95),rgba(5,8,15,0.98));border:1px solid rgba(var(--cr),0.25);border-radius:6px;cursor:pointer;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;animation:cardIn 0.4s both;}
.char-card:hover{transform:translateY(-3px);border-color:rgba(var(--cr),0.6);box-shadow:0 6px 20px rgba(var(--cr),0.15);}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-top-bar{height:2px;background:linear-gradient(90deg,transparent,rgb(var(--cr)),transparent);opacity:0.7;}
.card-body{padding:10px 12px 12px;}
.card-faction{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.12em;color:rgb(var(--cr));text-transform:uppercase;margin-bottom:4px;opacity:0.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-name{font-size:15px;font-weight:700;color:var(--white);letter-spacing:0.03em;line-height:1.1;margin-bottom:2px;}
.card-role{font-size:10px;color:var(--dim);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-radar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.threat-num{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:900;color:rgb(var(--cr));line-height:1;text-shadow:0 0 10px rgba(var(--cr),0.5);}
.threat-label{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--dim);letter-spacing:0.1em;}
.card-quote{font-style:italic;font-size:10px;color:rgba(var(--cr),0.7);border-left:2px solid rgba(var(--cr),0.3);padding-left:6px;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-footer{display:flex;justify-content:space-between;align-items:center;}
.status-dot{display:flex;align-items:center;gap:4px;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.08em;text-transform:uppercase;}
.status-dot::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--sc,#4a6a80);box-shadow:0 0 5px var(--sc,#4a6a80);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.card-arrow{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--dim);opacity:0;transition:opacity 0.2s;}
.char-card:hover .card-arrow{opacity:1;}

/* КАРТОЧКА С ФОТО */
.char-card.has-photo .card-body{padding:0;}
.card-photo-wrap{position:relative;width:100%;aspect-ratio:4/5;overflow:hidden;}
.card-photo-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s;}
.char-card.has-photo:hover .card-photo-wrap img{transform:scale(1.03);}
.card-photo-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(5,8,15,0.7) 65%,rgba(5,8,15,0.97) 100%);}
.card-photo-info{position:absolute;bottom:0;left:0;right:0;padding:10px 12px 12px;z-index:2;}
.card-photo-faction{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:0.12em;color:rgb(var(--cr));text-transform:uppercase;margin-bottom:3px;opacity:0.85;}
.card-photo-name{font-size:15px;font-weight:700;color:var(--white);line-height:1.1;margin-bottom:1px;}
.card-photo-role{font-size:9px;color:rgba(255,255,255,0.45);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-photo-bottom{display:flex;justify-content:space-between;align-items:center;}
.card-photo-threat{display:flex;align-items:baseline;gap:3px;}
.card-photo-threat-num{font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:900;color:rgb(var(--cr));text-shadow:0 0 10px rgba(var(--cr),0.5);}
.card-photo-threat-lbl{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--dim);}

.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;font-family:'Share Tech Mono',monospace;color:var(--dim);font-size:12px;letter-spacing:0.1em;}
.loading{position:relative;z-index:10;text-align:center;padding:60px 20px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:0.15em;}

/* ── ДОСЬЕ (полный экран) ── */
.dossier-overlay{position:fixed;inset:0;z-index:500;overflow-y:auto;background:var(--bg);opacity:0;pointer-events:none;transition:opacity 0.3s;}
.dossier-overlay.open{opacity:1;pointer-events:all;}

/* Шапка — арт */
.dossier-art{position:relative;width:100%;height:100vh;overflow:hidden;flex-shrink:0;}
.dossier-art-bg{width:100%;height:100%;background:linear-gradient(160deg,#0d1020,#05080f);display:flex;align-items:center;justify-content:center;}
.dossier-art-bg img{width:100%;height:100%;object-fit:cover;display:block;}
.dossier-art-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,8,15,0.15) 0%,transparent 25%,transparent 50%,rgba(5,8,15,0.65) 72%,rgba(5,8,15,1) 100%);pointer-events:none;}
.dossier-close{position:absolute;top:14px;left:14px;z-index:20;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.5);background:rgba(5,8,15,0.6);border:1px solid rgba(255,255,255,0.1);padding:5px 12px;border-radius:3px;cursor:pointer;letter-spacing:0.1em;backdrop-filter:blur(4px);}
.dossier-faction-bar{position:absolute;top:0;left:0;right:0;height:3px;z-index:10;}
.dossier-art-info{position:absolute;bottom:0;left:0;right:0;padding:20px 18px 28px;z-index:10;}
.dossier-sys{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(var(--dr),0.5);letter-spacing:0.2em;margin-bottom:5px;}
.dossier-faction-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgb(var(--dr));letter-spacing:0.15em;text-transform:uppercase;margin-bottom:3px;}
.dossier-name{font-size:34px;font-weight:700;color:#fff;letter-spacing:0.04em;line-height:1;margin-bottom:3px;text-shadow:0 2px 20px rgba(0,0,0,0.8);}
.dossier-role{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:14px;}
.dossier-hero-row{display:flex;align-items:center;gap:16px;}
.dossier-threat-big{display:flex;align-items:baseline;gap:4px;}
.dossier-threat-num{font-family:'Share Tech Mono',monospace;font-size:40px;font-weight:900;color:rgb(var(--dr));line-height:1;text-shadow:0 0 20px rgba(var(--dr),0.5);}
.dossier-threat-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(var(--dr),0.5);letter-spacing:0.12em;}
.dossier-status{display:flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.1em;background:rgba(var(--sc-rgb,93,217,138),0.08);border:1px solid rgba(var(--sc-rgb,93,217,138),0.2);padding:4px 10px;border-radius:3px;}
.dossier-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--sc2,#5dd98a);box-shadow:0 0 8px var(--sc2,#5dd98a);animation:pulse 2s infinite;}
.dossier-scroll-hint{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:14px;}
.dossier-scroll-hint span{font-family:'Share Tech Mono',monospace;font-size:7px;color:rgba(255,255,255,0.2);letter-spacing:0.15em;}
.scroll-arrow{width:16px;height:16px;border-right:1px solid rgba(var(--dr),0.4);border-bottom:1px solid rgba(var(--dr),0.4);transform:rotate(45deg);animation:bounce 1.5s infinite;margin-top:-6px;}
@keyframes bounce{0%,100%{transform:rotate(45deg) translate(0,0);opacity:0.4}50%{transform:rotate(45deg) translate(3px,3px);opacity:1}}

/* Данные досье */
.dossier-data{background:var(--bg);position:relative;z-index:10;}
.dossier-data-line{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--dr),0.3),transparent);}
.dossier-meta{display:grid;grid-template-columns:1fr 1fr 1.5fr;gap:6px;padding:14px 16px 0;}
.dossier-meta-cell{background:rgba(var(--dr),0.04);border:1px solid rgba(var(--dr),0.1);border-radius:4px;padding:6px 9px;}
.dossier-meta-label{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--dim);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:2px;}
.dossier-meta-val{font-size:12px;font-weight:600;color:var(--white);}
.dossier-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--dr),0.15),transparent);margin:12px 16px;}
.dossier-section{padding:0 16px 12px;}
.dossier-section-title{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.2em;color:rgba(var(--dr),0.6);text-transform:uppercase;margin-bottom:8px;}
.dossier-stats-row{display:flex;gap:10px;align-items:flex-start;}
.dossier-radar{flex-shrink:0;padding:0;}
.dossier-quote{font-style:italic;font-size:14px;color:rgba(var(--dr),0.85);border-left:2px solid rgba(var(--dr),0.4);padding-left:10px;line-height:1.6;}
.dossier-bio{font-size:13px;color:var(--text);line-height:1.7;}
.stat-bars{display:flex;flex-direction:column;gap:7px;flex:1;justify-content:center;}
.stat-row{display:flex;align-items:center;gap:5px;}
.stat-name{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--dim);width:68px;flex-shrink:0;letter-spacing:0.04em;text-transform:uppercase;}
.stat-track{flex:1;height:3px;background:rgba(var(--dr),0.1);border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;background:linear-gradient(90deg,rgba(var(--dr),0.5),rgb(var(--dr)));border-radius:2px;box-shadow:0 0 6px rgba(var(--dr),0.4);}
.stat-val{font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:700;color:rgb(var(--dr));width:14px;text-align:right;flex-shrink:0;}
.abilities{display:flex;flex-wrap:wrap;gap:5px;}
.chip{font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 8px;border:1px solid rgba(var(--dr),0.25);border-radius:3px;color:rgb(var(--dr));background:rgba(var(--dr),0.05);}
.dossier-bottom{height:40px;}

/* Плейсхолдер без фото */
.art-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#0d1020,#05080f);}
.art-placeholder-text{font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(var(--dr),0.15);letter-spacing:3px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <a href="../index.html" class="back-btn">← АРХИВ</a>
    <span class="sys-label">SYS.<span>PERSONNEL_DB</span> // CLEARANCE: OMNI</span>
  </div>
  <div class="page-title">Персонажи</div>
  <div class="stats-row">
    <div class="stat-pill">ЗАПИСЕЙ: <b id="count-total">—</b></div>
    <div class="stat-pill">ОТОБРАЖЕНО: <b id="count-shown">—</b></div>
    <div class="stat-pill">СТАТУС: <b style="color:#5dd98a">АКТИВНО</b></div>
  </div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-faction="all" style="--fc:#4fc3f7;--fr:79,195,247">ВСЕ</button>
</div>

<div class="grid" id="grid"><div class="loading">ЗАГРУЗКА АРХИВА...</div></div>

<!-- ДОСЬЕ -->
<div class="dossier-overlay" id="dossier">
  <div id="dossier-inner"></div>
</div>

<script>
const FACTION_COLORS = {
  "Тенебрион":{hex:"#ff9d00",rgb:"255,157,0"},
  "Единая Америка":{hex:"#4a9eff",rgb:"74,158,255"},
  "Ракшасы":{hex:"#a55eea",rgb:"165,94,234"},
  "Аркадия":{hex:"#2ecc71",rgb:"46,204,113"},
  "Forge":{hex:"#a8d8ff",rgb:"168,216,255"},
  "Тихая гавань":{hex:"#38bdf8",rgb:"56,189,248"},
  "Белая зона":{hex:"#94a3b8",rgb:"148,163,184"},
  "Независимые":{hex:"#a3e635",rgb:"163,230,53"},
  "Экваториальная сеть":{hex:"#d4a843",rgb:"212,168,67"},
  "Гарнизон":{hex:"#aaaaaa",rgb:"170,170,170"},
  "Ковчег":{hex:"#8899bb",rgb:"136,153,187"},
  "Джамахирия Нар":{hex:"#B8540A",rgb:"184,84,10"},
  "Австралийский протекторат":{hex:"#a0522d",rgb:"160,82,45"},
  "Отражение бездны":{hex:"#3d5a3e",rgb:"61,90,62"},
};
const DEFAULT_COLOR={hex:"#4fc3f7",rgb:"79,195,247"};
const STATUS_COLORS={"Активен":"#5dd98a","Мёртв":"#f87171","Неизвестно":"#64748b"};

function hexToRgb(h){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:null;}
function getFactionColor(c){if(c.faction_color){const r=hexToRgb(c.faction_color);if(r)return{hex:c.faction_color,rgb:r};}return FACTION_COLORS[c.faction]||DEFAULT_COLOR;}

function buildRadar(stats,rgb,size=70){
  const vals=[stats.intelligence||0,stats.combat||0,stats.influence||0,stats.cruelty||0,stats.will||0,stats.stealth||0,stats.unpredictability||0];
  const EMOJI=["🧠","⚔","👑","🔪","🛡","🌑","🎲"];
  const n=7,cx=size/2,cy=size/2,R=size*0.33;
  const angles=Array.from({length:n},(_,i)=>(Math.PI*2*i/n)-Math.PI/2);
  const pt=arr=>arr.map(p=>p.map(v=>v.toFixed(1)).join(",")).join(" ");
  const poly=r=>angles.map(a=>[cx+r*Math.cos(a),cy+r*Math.sin(a)]);
  const rings=[0.33,0.66,1].map(f=>`<polygon points="${pt(poly(R*f))}" fill="none" stroke="rgba(${rgb},${f===1?0.25:0.1})" stroke-width="0.8"/>`).join("");
  const spokes=angles.map(a=>`<line x1="${cx}" y1="${cy}" x2="${(cx+R*Math.cos(a)).toFixed(1)}" y2="${(cy+R*Math.sin(a)).toFixed(1)}" stroke="rgba(${rgb},0.12)" stroke-width="0.8"/>`).join("");
  const dp=angles.map((a,i)=>{const r=(Math.min(vals[i],10)/10)*R;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];});
  const labels=size>90?angles.map((a,i)=>{const lx=cx+(R+13)*Math.cos(a),ly=cy+(R+13)*Math.sin(a);return`<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" text-anchor="middle" font-size="9">${EMOJI[i]}</text><text x="${lx.toFixed(1)}" y="${(ly+14).toFixed(1)}" text-anchor="middle" font-size="7" fill="rgba(${rgb},0.7)" font-family="Share Tech Mono,monospace" font-weight="700">${vals[i]}</text>`;}).join(""):"";
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="overflow:visible"><defs><filter id="rg${size}"><feGaussianBlur stdDeviation="1.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>${rings}${spokes}<polygon points="${pt(dp)}" fill="rgba(${rgb},0.12)" stroke="none"/><polygon points="${pt(dp)}" fill="none" stroke="rgba(${rgb},0.8)" stroke-width="1.2" stroke-linejoin="round"/>${dp.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2" fill="rgba(${rgb},1)" filter="url(#rg${size})"/>`).join("")}${labels}</svg>`;
}

const REPO="AlexandraHaffman/divided-world";
let allChars=[],currentFiltered=[];

async function loadCharacters(){
  try{
    const files=await(await fetch(`https://api.github.com/repos/${REPO}/contents/data/characters`)).json();
    allChars=(await Promise.all(files.filter(f=>f.name.endsWith(".json")&&f.name!==".keep").map(async f=>(await fetch(f.download_url)).json()))).sort((a,b)=>(b.threat_level||0)-(a.threat_level||0));
    currentFiltered=[...allChars];
    buildFilters();
    renderGrid(allChars);
    document.getElementById("count-total").textContent=allChars.length;
  }catch(e){
    document.getElementById("grid").innerHTML=`<div class="empty-state">ОШИБКА: ${e.message}</div>`;
  }
}

function buildFilters(){
  const factions=[...new Set(allChars.map(c=>c.faction).filter(Boolean))].sort();
  const wrap=document.getElementById("filters");
  factions.forEach(f=>{
    const col=FACTION_COLORS[f]||DEFAULT_COLOR;
    const btn=document.createElement("button");
    btn.className="filter-btn";btn.dataset.faction=f;btn.textContent=f.toUpperCase();
    btn.style.cssText=`--fc:${col.hex};--fr:${col.rgb}`;
    btn.onclick=()=>setFilter(f);wrap.appendChild(btn);
  });
}

function setFilter(faction){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.faction===faction));
  currentFiltered=faction==="all"?allChars:allChars.filter(c=>c.faction===faction);
  renderGrid(currentFiltered);
}
document.querySelector(".filter-btn[data-faction='all']").onclick=()=>setFilter("all");

function renderGrid(chars){
  document.getElementById("count-shown").textContent=chars.length;
  const grid=document.getElementById("grid");
  if(!chars.length){grid.innerHTML=`<div class="empty-state">НЕ НАЙДЕНО</div>`;return;}
  grid.innerHTML=chars.map((c,i)=>{
    const col=getFactionColor(c);
    const sc=STATUS_COLORS[c.status]||STATUS_COLORS["Неизвестно"];
    const hasPhoto=!!c.avatar_web;
    const delay=Math.min(i*0.04,0.8);

    if(hasPhoto){
      return`<div class="char-card has-photo" style="--cr:${col.rgb};animation-delay:${delay}s" data-idx="${i}">
        <div class="card-top-bar"></div>
        <div class="card-body">
          <div class="card-photo-wrap">
            <img src="${c.avatar_web}" alt="${c.name}" loading="lazy">
            <div class="card-photo-info">
              <div class="card-photo-faction">${c.faction||'—'}</div>
              <div class="card-photo-name">${c.name}</div>
              <div class="card-photo-role">${c.role||''}</div>
              <div class="card-photo-bottom">
                <div class="card-photo-threat">
                  <div class="card-photo-threat-num">${c.threat_level||0}</div>
                  <div class="card-photo-threat-lbl">THREAT</div>
                </div>
                <div class="status-dot" style="--sc:${sc};color:${sc}">${c.status||'—'}</div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }

    const radar=buildRadar(c.stats||{},col.rgb,70);
    return`<div class="char-card" style="--cr:${col.rgb};animation-delay:${delay}s" data-idx="${i}">
      <div class="card-top-bar"></div>
      <div class="card-body">
        <div class="card-faction">${c.faction||'—'}</div>
        <div class="card-name">${c.name}</div>
        <div class="card-role">${c.role||''}</div>
        <div class="card-radar-row">${radar}<div><div class="threat-num">${c.threat_level||0}</div><div class="threat-label">THREAT</div></div></div>
        ${c.card_quote?`<div class="card-quote">«${c.card_quote}»</div>`:''}
        <div class="card-footer"><div class="status-dot" style="--sc:${sc};color:${sc}">${c.status||'—'}</div><div class="card-arrow">→</div></div>
      </div>
    </div>`;
  }).join("");
  document.querySelectorAll(".char-card").forEach((el,i)=>{el.onclick=()=>openDossier(allChars.indexOf(currentFiltered[i]));});
}

function openDossier(idx){
  const c=allChars[idx];
  const col=getFactionColor(c);
  const sc=STATUS_COLORS[c.status]||STATUS_COLORS["Неизвестно"];
  const scRgb=sc==="#5dd98a"?"93,217,138":sc==="#f87171"?"248,113,113":"100,116,139";
  const artUrl=c.avatar_web_full||c.avatar_web||"";
  const stats=c.stats||{};
  const statRows=[["Интеллект",stats.intelligence],["Боевые",stats.combat],["Влияние",stats.influence],["Мета-сила",stats.meta_power],["Жестокость",stats.cruelty],["Воля",stats.will],["Скрытность",stats.stealth],["Непредсказуемость",stats.unpredictability]];
  const radar=buildRadar(stats,col.rgb,150);

  document.getElementById("dossier-inner").innerHTML=`
    <div class="dossier-art" style="--dr:${col.rgb}">
      <div class="dossier-faction-bar" style="background:linear-gradient(90deg,transparent,rgb(${col.rgb}),transparent)"></div>
      <button class="dossier-close" onclick="closeDossier()">← АРХИВ</button>
      <div class="dossier-art-bg">
        ${artUrl
          ? `<img src="${artUrl}" alt="${c.name}">`
          : `<div class="art-placeholder"><span class="art-placeholder-text" style="--dr:${col.rgb}">[ ПОРТРЕТ ЗАСЕКРЕЧЕН ]</span></div>`
        }
      </div>
      <div class="dossier-art-gradient"></div>
      <div class="dossier-art-info">
        <div class="dossier-sys">SYS.RECORD // ПЕРСОНАЖ #${String(idx+1).padStart(3,"0")} // CLEARANCE: ALPHA</div>
        <div class="dossier-faction-label">${c.faction||'—'}${c.subfaction&&c.subfaction!==c.faction?` · ${c.subfaction}`:''}</div>
        <div class="dossier-name">${c.name}</div>
        <div class="dossier-role">${c.role||''}</div>
        <div class="dossier-hero-row">
          <div class="dossier-threat-big">
            <div class="dossier-threat-num">${c.threat_level||0}</div>
            <div class="dossier-threat-lbl">THREAT</div>
          </div>
          <div class="dossier-status" style="--sc2:${sc};--sc-rgb:${scRgb};color:${sc}">${c.status||'—'}</div>
        </div>
        <div class="dossier-scroll-hint"><span>ДОСЬЕ</span><div class="scroll-arrow" style="--dr:${col.rgb}"></div></div>
      </div>
    </div>
    <div class="dossier-data" style="--dr:${col.rgb}">
      <div class="dossier-data-line"></div>
      <div class="dossier-meta">
        <div class="dossier-meta-cell"><div class="dossier-meta-label">Пол</div><div class="dossier-meta-val">${c.gender||'—'}</div></div>
        <div class="dossier-meta-cell"><div class="dossier-meta-label">Дата рождения</div><div class="dossier-meta-val">${c.birthdate||'—'}</div></div>
        <div class="dossier-meta-cell"><div class="dossier-meta-label">Локация</div><div class="dossier-meta-val">${c.location||'—'}</div></div>
      </div>
      <div class="dossier-divider"></div>
      <div class="dossier-section">
        <div class="dossier-section-title">Характеристики</div>
        <div class="dossier-stats-row">
          <div class="dossier-radar">${radar}</div>
          <div class="stat-bars">${statRows.filter(([l,v])=>v!==undefined&&!(l==="Мета-сила"&&(v||0)===0)).map(([l,v])=>`<div class="stat-row"><div class="stat-name">${l}</div><div class="stat-track"><div class="stat-fill" style="width:${Math.min((v||0)/10*100,100)}%"></div></div><div class="stat-val">${v||0}</div></div>`).join("")}</div>
        </div>
      </div>
      ${c.card_quote?`<div class="dossier-divider"></div><div class="dossier-section"><div class="dossier-quote">«${c.card_quote}»</div></div>`:''}
      ${c.biography?`<div class="dossier-divider"></div><div class="dossier-section"><div class="dossier-section-title">Биография</div><div class="dossier-bio">${c.biography.replace(/\n/g,"<br>")}</div></div>`:''}
      ${c.current_status?`<div class="dossier-divider"></div><div class="dossier-section"><div class="dossier-section-title">Текущий статус</div><div class="dossier-bio">${c.current_status.replace(/\n/g,"<br>")}</div></div>`:''}
      ${c.abilities?.length?`<div class="dossier-divider"></div><div class="dossier-section"><div class="dossier-section-title">Способности</div><div class="abilities">${c.abilities.map(a=>`<div class="chip">${a}</div>`).join("")}</div></div>`:''}
      <div class="dossier-bottom"></div>
    </div>
  `;
  const overlay=document.getElementById("dossier");
  overlay.classList.add("open");
  overlay.scrollTop=0;
  document.body.style.overflow="hidden";
}

function closeDossier(){
  document.getElementById("dossier").classList.remove("open");
  document.body.style.overflow="";
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDossier();});
loadCharacters();
</script>
</body>
</html>
