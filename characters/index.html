<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Персонажи | Разделённый мир</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="dossier-landscape.css">
<link rel="stylesheet" href="desktop.css">
</head>
<body>

<div class="bg-art"></div>
<div class="bg-overlay"></div>

<div class="header">
  <div class="header-top">
    <a href="../index.html" class="back-btn">← АРХИВ</a>
    <span class="sys-label">SYS.<span>PERSONNEL_DB</span> // CLEARANCE: OMNI</span>
  </div>
  <div class="page-title">Персонажи</div>
  <div class="stats-row">
    <div class="stat-pill">ЗАПИСЕЙ: <b id="count-total">—</b></div>
    <div class="stat-pill">ОТОБРАЖЕНО: <b id="count-shown">—</b></div>
    <div class="search-wrap" id="search-wrap">
      <input type="text" id="search-input" class="search-input" placeholder="Поиск по имени…" autocomplete="off">
      <button class="search-clear" id="search-clear" aria-label="Очистить">✕</button>
      <div class="search-suggestions" id="search-suggestions"></div>
    </div>
  </div>
</div>

<div class="view-controls">
  <span class="cols-label">РЕЖИМ</span>
  <div class="cols-slider" id="cols-slider">
    <button class="cols-opt" data-cols="1" data-mode="ПОДБОРКИ" title="Подборки — карточки по тирам и фракциям">1</button>
    <button class="cols-opt active" data-cols="2" data-mode="ГАЛЕРЕЯ" title="Галерея и досье — основной режим">2</button>
    <button class="cols-opt" data-cols="3" data-mode="СРАВНЕНИЕ" title="Режим сравнения персонажей">3</button>
    <button class="cols-opt" data-cols="5" data-mode="СВЯЗИ" title="Отображение связей — скоро">5</button>
  </div>
  <button class="sort-toggle" id="sort-toggle">СОРТ: <span id="sort-label">УГРОЗА ↓</span></button>
</div>

<!-- строка кнопок-фильтров: ФРАКЦИИ · ТИРЫ · МЕТА-ЛЮДИ -->
<div class="filter-toggles-row">
  <button class="filters-toggle" id="filters-toggle">ФРАКЦИИ <span class="chev">▾</span></button>
  <button class="filters-toggle" id="tier-toggle">ТИРЫ <span class="chev">▾</span></button>
  <button class="sort-toggle" id="meta-toggle">МЕТА-ЛЮДИ</button>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-faction="all" style="--fc:#4fc3f7;--fr:79,195,247">ВСЕ</button>
</div>

<div class="filters" id="tier-filters">
  <button class="filter-btn active" data-tier="all" style="--fc:#4fc3f7;--fr:79,195,247">ВСЕ</button>
</div>

<div class="grid" id="grid" data-cols="2">
  <div class="loading">ЗАГРУЗКА АРХИВА...</div>
</div>

<div class="dossier-overlay" id="dossier">
  <div id="dossier-inner"></div>
</div>

<!-- панель выбора для режима сравнения (3 колонки) -->
<div class="compare-bar" id="compare-bar">
  <div class="compare-bar-count" id="compare-bar-count">Выбрано: <b>0</b></div>
  <div class="compare-bar-actions">
    <button class="compare-bar-btn" onclick="clearCompareSelection()">Очистить</button>
    <button class="compare-bar-btn primary" id="compare-bar-go" onclick="openCompare()" disabled>Сравнить →</button>
  </div>
</div>

<!-- полноэкранный оверлей сравнения -->
<div class="compare-overlay" id="compare-overlay">
  <div id="compare-inner"></div>
</div>

<script src="dossier.js"></script>
<script src="compare-mode.js"></script>
<script src="carousel-mode.js"></script>

</body>
</html>
