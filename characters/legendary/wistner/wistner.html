<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Курт Вистнер · Разделённый мир</title>
<link rel="icon" href="crest.webp">
<style>
/* ═══════════════════════════════════════════════
   КУРТ ВИСТНЕР — вертикальная лента
   ИСТОРИЯ: свет коридора гаснет по мере прокрутки (свет → тьма).
   НАСТОЯЩЕЕ: отдельный тёмный фон, опись построенного.
   ═══════════════════════════════════════════════ */
:root{
  --edge:#0b9b73; --edge-br:#00d493; --ink:#0d1714;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Inter,system-ui,sans-serif;
  --bar:56px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100%;background:#050a08;font-family:var(--sans);color:var(--ink);
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow-x:hidden}

/* ── ФОНЫ ── */
#bg{position:fixed;inset:0;z-index:0;overflow:hidden;
  background:radial-gradient(120% 70% at 50% 100%,rgba(11,155,115,.16),transparent 60%),
             linear-gradient(180deg,#050a08 0%,#0a1a15 55%,#0d221b 100%)}
#bg img{position:absolute;top:50%;left:50%;height:110%;min-width:110%;object-fit:cover;
  transform:translate(-50%,-50%);will-change:opacity;transition:opacity .4s linear}
#bgDark{opacity:0}
#bgPresent{position:absolute;inset:0;opacity:0;transition:opacity 1s;
  background:radial-gradient(130% 80% at 50% 0%,rgba(11,155,115,.20),transparent 55%),
             radial-gradient(100% 60% at 50% 100%,rgba(0,60,45,.35),transparent 60%),
             linear-gradient(180deg,#04100c 0%,#08201a 60%,#0a2a20 100%)}
body.present #bgLight,body.present #bgDark{opacity:0!important}
body.present #bgPresent{opacity:1}
#veil{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity .4s linear;
  background:radial-gradient(80% 60% at 50% 40%,transparent 20%,rgba(3,8,6,.7) 100%)}
#grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}

/* ── ВЕРХНИЙ БАР ── */
#bar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;gap:10px;
  height:calc(var(--bar) + env(safe-area-inset-top));padding:env(safe-area-inset-top) 12px 0;
  background:linear-gradient(180deg,rgba(4,10,8,.72),rgba(4,10,8,.32) 70%,transparent);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
#bar a,#bar button{font-family:var(--mono);color:#fff;background:transparent;border:none;cursor:pointer}
#back{font-size:10px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;
  padding:7px 10px;border:1px solid rgba(255,255,255,.18);border-radius:16px;white-space:nowrap;flex:none}
#modesw{display:flex;gap:2px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);
  border-radius:18px;padding:3px;margin:0 auto}
#modesw button{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.6);
  padding:7px 13px;border-radius:14px;transition:.25s;white-space:nowrap}
#modesw button.on{background:var(--edge-br);color:#04150f;font-weight:600}
#tools{display:flex;align-items:center;gap:8px;flex:none}
#cctv{display:flex;align-items:center;gap:6px;font-size:9.5px;letter-spacing:.06em;color:rgba(255,255,255,.85)}
#cctv .dot{width:6px;height:6px;border-radius:50%;background:#ff5252;box-shadow:0 0 8px #ff5252;
  animation:pulse 1.6s ease-in-out infinite}
#soundBtn{width:30px;height:30px;border-radius:50%;font-size:13px;
  border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.08)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@media(max-width:640px){#cctv .date,#cctv .clk-date{display:none}#back span{display:none}
  #back::before{content:"←"}}

/* ── ЛЕНТА ── */
.feed{position:relative;z-index:2;max-width:720px;margin:0 auto;
  padding:calc(var(--bar) + env(safe-area-inset-top) + 20px) 20px 18vh}
.feed[hidden]{display:none}

/* ── КАРТОЧКА ── */
.card{position:relative;background:rgba(255,255,255,.72);
  backdrop-filter:blur(20px) saturate(1.1);-webkit-backdrop-filter:blur(20px) saturate(1.1);
  border:1px solid rgba(255,255,255,.85);border-radius:14px;
  box-shadow:0 30px 80px -40px rgba(6,18,14,.6);
  padding:30px 28px 32px;margin-bottom:clamp(28px,7vh,72px);color:var(--ink);
  transition:background 1.1s,color 1.1s,border-color 1.1s,box-shadow 1.1s}
.card::before{content:"";position:absolute;left:24px;right:24px;bottom:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--edge),transparent);opacity:.7}
body.night .card{background:rgba(13,24,20,.72);color:#e6efec;border-color:rgba(120,165,150,.24);
  box-shadow:0 30px 80px -40px rgba(0,0,0,.9)}
.card:last-child{margin-bottom:0}

/* ── ТИПОГРАФИКА ── */
.kicker{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--edge);margin-bottom:14px}
body.night .kicker{color:var(--edge-br)}
.no{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--edge);display:flex;justify-content:space-between;gap:12px;margin-bottom:18px}
.no .g{opacity:.6;display:inline-flex;align-items:center;gap:5px}
.no .g::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;
  box-shadow:0 0 6px currentColor;animation:pulse 2.4s ease-in-out infinite}
body.night .no{color:var(--edge-br)}
h1{font-size:clamp(34px,9vw,52px);font-weight:200;letter-spacing:-.02em;line-height:.98}
h1 em{display:block;font-style:normal;font-weight:500}
h2{font-size:clamp(24px,6vw,30px);font-weight:200;letter-spacing:-.01em;line-height:1.12;margin-bottom:18px}
.card p{font-size:16px;font-weight:300;line-height:1.75;color:#2c3a35;margin-bottom:14px}
body.night .card p{color:#b6c8c1}
.card p:last-child{margin-bottom:0}
.lede{font-size:18px;color:#1c2926;line-height:1.6}
body.night .lede{color:#cddbd5}
.role{font-family:var(--mono);font-size:12px;letter-spacing:.05em;color:var(--edge);
  line-height:1.7;margin-top:10px}
body.night .role{color:var(--edge-br)}
.meta{font-family:var(--mono);font-size:11.5px;letter-spacing:.05em;color:var(--edge);
  line-height:1.7;margin-bottom:18px}
body.night .meta{color:var(--edge-br)}
.quote{font-size:18px;font-weight:300;line-height:1.55;color:#16241f;margin-bottom:20px;
  padding-left:16px;border-left:2px solid var(--edge)}
body.night .quote{color:#d7e4de;border-left-color:var(--edge-br)}
.hook{font-size:17px;font-weight:400;line-height:1.55;color:#12332a;
  margin-top:20px;padding-top:18px;border-top:1px solid rgba(11,155,115,.25)}
body.night .hook{color:var(--edge-br)}
.stamp-line{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;
  color:rgba(196,70,70,.7);margin-bottom:16px}
body.night .stamp-line{color:rgba(255,130,130,.6)}

/* ── ИЗОБРАЖЕНИЯ ── */
.art{position:relative;margin-bottom:22px;border-radius:10px;overflow:hidden;
  border:1px solid rgba(11,155,115,.22);background:rgba(255,255,255,.25)}
body.night .art{border-color:rgba(11,155,115,.4);background:rgba(0,0,0,.35)}
.art img{display:block;width:100%;height:auto}
.art.photo img{aspect-ratio:3/2;object-fit:cover}
.art.bp{background:transparent;border:none}
.art.bp img{max-height:70vh;object-fit:contain;margin:0 auto;
  mix-blend-mode:multiply;filter:contrast(2.3)}
body.night .art.bp img{filter:invert(1) contrast(2.3) sepia(.6) hue-rotate(100deg) saturate(3);
  mix-blend-mode:screen}
.art::before,.art::after{content:"";position:absolute;width:16px;height:16px;
  border:1.5px solid var(--edge-br);opacity:.55;pointer-events:none;z-index:2}
.art::before{top:8px;left:8px;border-right:none;border-bottom:none}
.art::after{bottom:8px;right:8px;border-left:none;border-top:none}
.art .scan{position:absolute;left:0;right:0;top:-30%;height:20%;pointer-events:none;z-index:1;
  background:linear-gradient(rgba(255,255,255,0),rgba(190,225,212,.22),rgba(255,255,255,0));
  animation:scan 6s linear infinite}
body.night .art .scan{background:linear-gradient(rgba(0,0,0,0),rgba(0,212,147,.16),rgba(0,0,0,0))}
@keyframes scan{0%{top:-30%}100%{top:110%}}
.art.missing img{display:none}
.art.missing{min-height:200px;display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(135deg,rgba(11,155,115,.07) 0 2px,transparent 2px 14px),rgba(255,255,255,.25)}
body.night .art.missing{background:repeating-linear-gradient(135deg,rgba(0,212,147,.09) 0 2px,transparent 2px 14px),rgba(0,0,0,.35)}
.art.missing .sig{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:#5c6f68;text-align:center;padding:16px;z-index:2}
body.night .art.missing .sig{color:#8fa39c}
.art.missing .sig::before{content:"нет сигнала";display:block;font-size:8px;opacity:.55;
  margin-bottom:6px;letter-spacing:.22em}

/* ── ГЕРОЙ ── */
.hero{margin-bottom:clamp(28px,7vh,72px)}
.hero .frame{position:relative;border-radius:14px;overflow:hidden;
  border:1px solid rgba(11,155,115,.25);box-shadow:0 30px 80px -40px rgba(6,18,14,.6)}
.hero .frame img{display:block;width:100%;height:auto;max-height:74vh;object-fit:cover}
.hero .frame.missing{min-height:60vh;display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(135deg,rgba(11,155,115,.08) 0 2px,transparent 2px 16px),rgba(8,20,16,.6)}
.hero .frame.missing img{display:none}
.hero .frame.missing .sig{font-family:var(--mono);font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:#8fa39c;text-align:center;padding:16px}
.hero .frame.missing .sig::before{content:"нет сигнала";display:block;font-size:8px;opacity:.55;
  margin-bottom:6px;letter-spacing:.22em}
.hero .frame::before,.hero .frame::after{content:"";position:absolute;width:22px;height:22px;
  border:1.5px solid var(--edge-br);opacity:.6;pointer-events:none;z-index:3}
.hero .frame::before{top:12px;left:12px;border-right:none;border-bottom:none}
.hero .frame::after{bottom:12px;right:12px;border-left:none;border-top:none}
.hero .scrim{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(4,10,8,.45) 0%,transparent 28%,transparent 45%,rgba(4,10,8,.9) 100%)}
.hero .head{position:absolute;left:0;right:0;bottom:0;padding:24px 22px;z-index:2}
.hero .head .kicker{color:#9fe9cf;margin-bottom:10px}
.hero .head h1{color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.6)}
.hero .head .role{color:#bfeadd;margin-top:12px}

/* ── ЗАМЕТКИ / РЕДАКЦИИ ── */
.note{margin:16px 0 0;padding-left:14px;border-left:1px solid var(--edge);
  font-size:14px;font-weight:300;line-height:1.65;color:#4a5c56;
  opacity:0;transform:translateY(8px);transition:opacity .7s ease,transform .7s ease}
.note.in{opacity:1;transform:none}
.note::before{content:"на полях";display:block;font-family:var(--mono);font-size:8.5px;
  letter-spacing:.18em;text-transform:uppercase;opacity:.6;margin-bottom:6px}
body.night .note{color:#89a89c;border-left-color:var(--edge-br)}
.rd{background:currentColor;color:transparent;border-radius:2px;padding:0 3px;cursor:help;transition:.5s}
.rd:hover,.rd:active{background:transparent;color:inherit;transition:.15s}
body.night .rd{background:transparent;color:inherit;border-bottom:1px solid var(--edge-br)}

/* ── СПИСКИ (Реестр, Разведсеть) ── */
.row{display:flex;gap:14px;align-items:baseline;padding:14px 0;
  border-top:1px solid rgba(11,155,115,.16)}
.row:last-of-type{border-bottom:1px solid rgba(11,155,115,.16)}
.rows{margin:8px 0 4px}
.row b{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--edge-br);flex:none;width:46px}
.row .who{font-size:15px;font-weight:400;line-height:1.45}
.row .who i{display:block;font-style:normal;font-size:13px;font-weight:300;opacity:.62;margin-top:4px}
.row .who u{display:block;text-decoration:none;font-family:var(--mono);font-size:10.5px;
  letter-spacing:.04em;color:var(--edge-br);margin-top:6px}

/* ── ДВЕРЬ ── */
.door .q{font-size:22px;font-weight:300;line-height:1.4;margin-top:24px;color:#0a8a66;text-align:center}
body.night .door .q{color:var(--edge-br)}
.door .scold{font-size:14px;font-style:italic;line-height:1.6;color:#5a6c66;
  margin-top:20px;padding-top:18px;border-top:1px solid rgba(11,155,115,.3);text-align:center}
body.night .door .scold{color:#8fa8a0}

/* ── ПЕЧАТЬ НАСТОЯЩЕГО ── */
.seal{display:flex;align-items:center;gap:14px;margin-bottom:20px;
  padding-bottom:18px;border-bottom:1px solid rgba(11,155,115,.22)}
.seal img{width:52px;height:52px;object-fit:cover;border-radius:50%;flex:none;
  border:1px solid rgba(11,155,115,.4);box-shadow:0 6px 18px -6px rgba(0,0,0,.5)}
.seal span{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:#8fa39c;line-height:1.5}

#boot{position:fixed;inset:0;z-index:60;background:#000;pointer-events:none;
  animation:bootFlicker 1.1s ease-out forwards}
@keyframes bootFlicker{0%{opacity:1}8%{opacity:.15}13%{opacity:.85}19%{opacity:.05}
  27%{opacity:1}38%{opacity:0}100%{opacity:0}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}
  #boot{display:none}.note{opacity:1;transform:none}}
</style>
</head>
<body>

<div id="boot"></div>

<div id="bg">
  <img id="bgLight" src="hall-light.webp" alt="">
  <img id="bgDark" data-src="hall-dark.webp" alt="">
  <div id="bgPresent"></div>
</div>
<div id="veil"></div>
<div id="grain"></div>

<header id="bar">
  <a id="back" href="../../index.html"><span>← назад</span></a>
  <div id="modesw">
    <button data-mode="history" class="on">История</button>
    <button data-mode="present">Настоящее</button>
  </div>
  <div id="tools">
    <span id="cctv"><span class="dot"></span><span class="date">CAM · </span><span id="clock"></span></span>
    <button id="soundBtn" aria-label="Звук" title="Звук">🔇</button>
  </div>
</header>

<!-- ═══════════ ИСТОРИЯ ═══════════ -->
<main id="history" class="feed">

  <section class="hero">
    <div class="frame">
      <img src="hero-history.webp" data-fallback="portrait-2016.webp" alt="Курт Вистнер">
      <div class="scrim"></div>
      <div class="head">
        <p class="kicker" data-t="intro.kicker"></p>
        <h1 data-t="name"></h1>
        <p class="role" data-t="intro.role"></p>
      </div>
    </div>
    <div class="card">
      <p class="stamp-line" data-t="intro.stamp"></p>
      <p class="quote" data-t="intro.quote"></p>
      <p data-t="intro.p1"></p>
      <p data-t="intro.p2"></p>
      <p class="hook" data-t="intro.hook"></p>
      <p class="note" data-t="intro.note"></p>
    </div>
  </section>

  <section class="chap">
    <div class="card">
      <div class="no"><span>Правота</span><span class="g">открыто</span></div>
      <h2 data-t="cam2.h2"></h2>
      <p class="lede" data-t="cam2.lede"></p>
      <p data-t="cam2.p1"></p>
      <p data-t="cam2.p2"></p>
      <p data-t="cam2.p3"></p>
      <p class="note" data-t="cam2.note1"></p>
    </div>
  </section>

  <section class="chap">
    <div class="card">
      <div class="no"><span>Метод</span><span class="g">открыто</span></div>
      <div class="art photo"><img src="specblock.webp" alt="Спецблок" loading="lazy"></div>
      <h2 data-t="cam3.h2"></h2>
      <div class="meta" data-t="cam3.meta"></div>
      <p data-t="cam3.p1"></p>
      <p data-t="cam3.p2"></p>
      <p data-t="cam3.p3"></p>
      <p data-t="cam3.p4"></p>
      <p class="note" data-t="cam3.note1"></p>
      <p class="note" data-t="cam3.note2"></p>
    </div>
  </section>

  <section class="chap">
    <div class="card">
      <div class="no"><span>Реестр</span><span class="g">содержавшиеся лица</span></div>
      <h2 data-t="cam4.h2"></h2>
      <div class="meta" data-t="cam4.meta"></div>
      <p class="lede" data-t="cam4.lede"></p>
      <div class="rows">
        <div class="row"><b>04</b><span class="who" data-t="cam4.row1"></span></div>
        <div class="row"><b>09</b><span class="who" data-t="cam4.row2"></span></div>
        <div class="row"><b>11</b><span class="who" data-t="cam4.row3"></span></div>
        <div class="row"><b>14</b><span class="who" data-t="cam4.row4"></span></div>
        <div class="row"><b>—</b><span class="who" data-t="cam4.row5"></span></div>
        <div class="row"><b>—</b><span class="who" data-t="cam4.row6"></span></div>
      </div>
      <p class="note" data-t="cam4.note1"></p>
      <p class="note" data-t="cam4.note2"></p>
    </div>
  </section>

  <section class="chap door" id="doorSection">
    <div class="card">
      <div class="no"><span>Дверь</span><span class="g" data-t="door.meta"></span></div>
      <h2 data-t="door.h2"></h2>
      <p data-t="door.p1"></p>
      <p data-t="door.p2"></p>
      <p data-t="door.p3"></p>
      <p data-t="door.p4"></p>
      <p class="note" data-t="door.note1"></p>
      <p class="note" data-t="door.note2"></p>
      <p class="q" data-t="door.q"></p>
      <p class="scold" data-t="door.scold"></p>
    </div>
  </section>

</main>

<!-- ═══════════ НАСТОЯЩЕЕ ═══════════ -->
<main id="present" class="feed" hidden>

  <section class="hero">
    <div class="frame">
      <img src="hero-present.webp" data-fallback="portrait.webp" alt="Курт Вистнер сегодня">
      <div class="scrim"></div>
      <div class="head">
        <p class="kicker" data-t="present.seal"></p>
        <h1 data-t="present.title"></h1>
        <p class="role" data-t="present.role"></p>
      </div>
    </div>
    <div class="card">
      <div class="seal"><img src="crest.webp" alt="Герб Аркадии"><span data-t="present.seal"></span></div>
      <p data-t="present.p1"></p>
      <p data-t="present.p2"></p>
    </div>
  </section>

  <section class="chap">
    <div class="card">
      <div class="no"><span>Досье · 01</span><span class="g">открыто</span></div>
      <div class="art bp"><img src="bp-dome.webp" alt="Купол" loading="lazy"></div>
      <h2 data-t="dome.h2"></h2>
      <p data-t="dome.p1"></p>
      <p class="note" data-t="dome.note1"></p>
    </div>
  </section>

  <section class="chap">
    <div class="card">
      <div class="no"><span>Досье · 02</span><span class="g">открыто</span></div>
      <div class="art bp"><img src="bp-reactor.webp" alt="Изумруд" loading="lazy"></div>
      <h2 data-t="reactor.h2"></h2>
      <div class="meta" data-t="reactor.meta"></div>
      <p data-t="reactor.p1"></p>
    </div>
  </section>

  <section class="chap">
    <div class="card">
      <div class="no"><span>Досье · 03</span><span class="g">открыто</span></div>
      <div class="art bp"><img src="bp-atlant.webp" alt="Атлант" loading="lazy"></div>
      <h2 data-t="atlant.h2"></h2>
      <div class="meta" data-t="atlant.meta"></div>
      <p data-t="atlant.p1"></p>
      <p data-t="atlant.p2"></p>
      <p class="note" data-t="atlant.note1"></p>
    </div>
  </section>

<script src="wistner-content.js"></script>
<script>
(function(){
  const body=document.body;

  // ── контент ──
  if(typeof CONTENT!=='undefined'){
    document.querySelectorAll('[data-t]').forEach(el=>{
      const v=CONTENT[el.dataset.t];
      if(v!=null) el.innerHTML=v;
    });
  }

  // ── битые изображения → fallback → «нет сигнала» ──
  document.querySelectorAll('.art,.hero .frame').forEach(box=>{
    const img=box.querySelector('img'); if(!img)return;
    const onFail=()=>{
      if(img.dataset.fallback){ const f=img.dataset.fallback; delete img.dataset.fallback; img.src=f; return; }
      box.classList.add('missing');
      if(!box.querySelector('.sig')){
        const s=document.createElement('div'); s.className='sig'; s.textContent=img.alt||''; box.appendChild(s);
      }
    };
    img.addEventListener('error',onFail);
    // изображение могло упасть ещё до навешивания обработчика
    if(img.complete && img.naturalWidth===0) onFail();
  });
  document.querySelectorAll('.art').forEach(b=>b.insertAdjacentHTML('beforeend','<div class="scan"></div>'));

  // ── CCTV-часы ──
  const clockEl=document.getElementById('clock'), pad=n=>String(n).padStart(2,'0');
  (function tick(){const d=new Date();
    clockEl.innerHTML='<span class="clk-date">'+pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear()+' </span>'
      +pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
    setTimeout(tick,1000);})();

  // ── проявление заметок при прокрутке ──
  if('IntersectionObserver' in window){
    const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.2});
    document.querySelectorAll('.note').forEach(n=>io.observe(n));
  } else { document.querySelectorAll('.note').forEach(n=>n.classList.add('in')); }

  // ── свет → тьма по прокрутке (Истории) ──
  const bgLight=document.getElementById('bgLight'), bgDark=document.getElementById('bgDark'),
        veil=document.getElementById('veil'), door=document.getElementById('doorSection');
  if(bgDark.dataset.src){ bgDark.src=bgDark.dataset.src; delete bgDark.dataset.src; }
  let mode='history', endY=1, ticking=false;
  const measure=()=>{ endY=Math.max(1, door.getBoundingClientRect().top + window.scrollY - innerHeight*0.5); };
  function paint(){
    ticking=false;
    if(mode!=='history')return;
    const p=Math.max(0,Math.min(1, window.scrollY/endY));
    bgLight.style.opacity=(1-p); bgDark.style.opacity=p; veil.style.opacity=p*0.75;
    body.classList.toggle('night', p>0.55);
  }
  addEventListener('scroll',()=>{if(!ticking){ticking=true;requestAnimationFrame(paint);}},{passive:true});
  addEventListener('resize',()=>{measure();paint();});

  // ── переключатель режимов ──
  const histFeed=document.getElementById('history'), presFeed=document.getElementById('present');
  function setMode(m){
    mode=m;
    document.querySelectorAll('#modesw button').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));
    if(m==='present'){
      histFeed.hidden=true; presFeed.hidden=false;
      body.classList.add('present'); body.classList.add('night');
      window.scrollTo(0,0);
    } else {
      presFeed.hidden=true; histFeed.hidden=false;
      body.classList.remove('present');
      window.scrollTo(0,0);
      measure(); paint();
    }
  }
  document.querySelectorAll('#modesw button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));

  // ── звук ──
  const theme=document.getElementById('theme'), soundBtn=document.getElementById('soundBtn');
  let soundOn=false;
  soundBtn.onclick=()=>{ soundOn=!soundOn;
    if(soundOn){ theme.play().then(()=>soundBtn.textContent='🔊').catch(()=>{soundOn=false;soundBtn.textContent='🔇';}); }
    else { theme.pause(); soundBtn.textContent='🔇'; } };
  theme.addEventListener('error',()=>console.log('Audio failed to load. Check theme.mp3 exists next to wistner.html.'));

  // ── старт ──
  addEventListener('load',()=>{measure();paint();});
  measure(); paint();
})();
</script>
</body>
</html>
