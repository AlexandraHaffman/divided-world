on": "Тенебрион\n\nПодфракция: Капитул Причащения", "color": "#8A96A3", "role": "", "status": "Активен", "gender": "Женский", "birth": "15.05.2016", "location": "Тенебрион", "threat": 24, "stats": {"Интеллект": 6, "Боевые возможности": 1, "Влияние": 4, "Мета-сила": 4, "Жестокость": 3, "Воля": 7, "Скрытность": 2, "Непредсказуемость": 1}, "abilities": ["Абсолютное зрение", "Предвидение", "Управление погодой (шторма, туманы)", "Ментальная связь с флотом"], "aliases": ["Хранительница Атлантики", "Верховная Провидица Атлантического пояса", "Марина Геррера"], "quote": "Я вижу ваши секреты еще до того, как вы решите ими поделиться", "bio": "Верховная провидица Атлантики, чей взор пронзает мили океанских просторов и туманы будущего. После сакрального ритуала она лишилась человеческих потребностей, став живым маяком в своей хрустальной башне. Марина — это вечный часовой, чье сознание неразрывно связано с ритмами моря, а её глаза, дарованные самой богиней, видят тайные намерения врагов задолго до того, как их корабли покажутся на горизонте.\n\n---"}, {"name": "Джо", "faction": "Единая Америка\n\nПодфракция: Сопротивление", "color": "#8A96A3", "role": "Повстанец", "status": "Активен", "gender": "Мужской", "birth": "05.11.2035", "location": "Нью-Йорк", "threat": 24, "stats": {"Интеллект": 2, "Боевые возможности": 4, "Влияние": 1, "Мета-сила": 0, "Жестокость": 5, "Воля": 6, "Скрытность": 3, "Непредсказуемость": 3}, "abilities": ["Механические знания (работа на складе)", "Пение", "Лояльность", "Физическая сила"], "aliases": [], "quote": "Нахаляву устроить переворот ну никак бы не вышло, извини\n\n---", "bio": ""}, {"name": "Селеста Орсини", "faction": "Тенебрион\n\nПодфракция: Капитул Причащения", "color": "#8A96A3", "role": "Глава Капитула Причащения", "status": "Активен", "gender": "Женский", "birth": "12.05.1980", "location": "Тенебрион", "threat": 24, "stats": {"Интеллект": 6, "Боевые возможности": 2, "Влияние": 5, "Мета-сила": 6, "Жестокость": 4, "Воля": 5, "Скрытность": 1, "Непредсказуемость": 1}, "abilities": ["Духовное наставничество", "Исповедь", "Убеждение", "Предвидение"], "aliases": ["Великая Мать"], "quote": "Закрой глаза, дитя. Исповедь — это не наказание, это возвращение домой.", "bio": "Селеста Орсини — Великая Мать, духовная вершина Церкви Тенебрии и глава Капитула Причащения. Её влияние пронизывает все слои государства, от высших эшелонов власти до самых отдалённых общин. Под её руководством ритуалы Исповеди стали ключевым инструментом консолидации общества, а её слово — непререкаемым законом для тысяч верующих. Селеста — воплощение идеологического единства Тенебриона, её фигура символизирует не только духовную власть, но и абсолютную преданность догматам Апостола Остермана и божественности Тенебрии. За внешним обликом ласковой наставницы скрывается холодный и беспощадный механизм идеологической обработки. Селеста искренне верит в то, что её действия — это акт милосердия, возвращение заблудших душ к истинному свету. Её сознание, перестроенное ритуалом Исповеди, лишено тени сомнения, что делает её методы особенно эффективными и пугающими. Она представляет собой уникальную угрозу для мира, так как её вера — это не просто убеждение, а абсолютная константа, превращающая любое сопротивление в бессмысленный акт противления божественной воле. Селеста Орсини — это не просто человек, это инструмент, воплощение мрачной механики Тенебриона, где каждый шаг направлен на уничтожение свободы воли во имя иллюзорного порядка.\n\n---"}, {"name": "Валерий Воронцов", "faction": "Титаны", "color": "#C0563A", "role": "Лидер группировки", "status": "Активен", "gender": "Мужской", "birth": "04.05.1995", "location": "Белая зона", "threat": 24, "stats": {"Интеллект": 3, "Боевые возможности": 5, "Влияние": 3, "Мета-сила": 0, "Жестокость": 5, "Воля": 6, "Скрытность": 1, "Непредсказуемость": 1}, "abilities": ["Тактическое планирование", "Командование крупными военными формированиями", "Дипломатическое давление"], "aliases": ["Генерал (самопровозглашенный)"], "quote": "Мы тут люди дела. Давайте четко поставим задачу\n\n---", "bio": ""}, {"name": "Кавита Рао", "faction": "Ракшасы", "color": "#E2353A", "role": "Летописец гибели / Пленница", "status": "Пленница", "gender": "Женский", "birth": "15.05.2039", "location": "Куньмин", "threat": 16, "stats": {"Интеллект": 6, "Боевые возможности": 0, "Влияние": 1, "Мета-сила": 0, "Жестокость": 0, "Воля": 6, "Скрытность": 1, "Непредсказуемость": 2}, "abilities": ["Высокий интеллект", "Лингвистические способности", "Сопереживание", "Творчество (поэзия и живопись)"], "aliases": ["Пленница Света и Тьмы", "Жена Дариана Сореля"], "quote": "Я не творю историю. Я лишь записываю наш бесконечный конец", "bio": "Кавита Рао — воплощение сломленной стойкости и увядающего достоинства. Когда-то она была яркой и умной девушкой из семьи интеллектуалов, но Дариан Сорель уничтожил её прежнюю жизнь, забрав её в плен в шестнадцать лет. Сейчас она вынуждена играть роль покорной жены в Куньмине, нося нарочито эротичные наряды и тяжелые украшения, сковывающие её движения. Её дух надломлен, но она всё ещё находит в себе силы тайно помогать другим жертвам Ракшаса и изливать свою боль через стихи.\n\n---"}, {"name": "Итан Уолш", "faction": "Forge", "color": "#FF7A1A", "role": "Неформальный ассистент инженерно-строительного блока", "status": "Активен", "gender": "Мужской", "birth": "10.10.2046", "location": "Восточный регион", "threat": 14, "stats": {"Интеллект": 1, "Боевые возможности": 1, "Влияние": 1, "Мета-сила": 0, "Жестокость": 1, "Воля": 5, "Скрытность": 2, "Непредсказуемость": 3}, "abilities": ["Высокая концентрация и внимание к техническим деталям", "Диагностика неисправностей механизмов на слух и ощупь", "Первичный ремонт и обслуживание узлов тяжелой техники"], "aliases": [], "quote": "«Дверь скрипит. Если не смазать, заклинит к вечеру».", "bio": "Тринадцатилетний сын Ричарда и Клары Уолш, выросший в условиях непрекращающейся стройки и прифронтовой атмосферы Азии. В отличие от старшего покол const T = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
if(T){ try{ T.ready(); T.expand(); }catch(e){} }
function haptic(){ try{ T && T.HapticFeedback && T.HapticFeedback.impactOccurred('light'); }catch(e){} }
const app = document.getElementById('app');
const esc = s => (s||'').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

// normalization maxima
const STAT_KEYS=["Интеллект","Боевые возможности","Влияние","Мета-сила","Жестокость","Воля","Скрытность","Непредсказуемость"];
const statMax={}; STAT_KEYS.forEach(k=>statMax[k]=Math.max(1,...DATA.characters.map(c=>c.stats[k]||0)));
const threatMax=Math.max(1,...DATA.characters.map(c=>c.threat||0));
const SEG=12;

let view={name:'home'};
function go(v){ view=v; render(); window.scrollTo({top:0,behavior:'instant'}); syncBack(); }
function syncBack(){
  if(!T||!T.BackButton) return;
  if(view.name==='home'){ T.BackButton.hide(); }
  else { T.BackButton.show(); T.BackButton.offClick(); T.BackButton.onClick(back); }
}
function back(){
  if(view.name==='char') go({name:'chars', q:view.q||'', f:view.f||'ALL'});
  else if(view.name==='faction') go({name:'factions'});
  else go({name:'home'});
}
if(T&&T.BackButton){ T.BackButton.onClick(back); }

const tapHandlers={};
let _tap=0;
function tile(idx,name,meta,cls,fn){
  const id='t'+(_tap++); tapHandlers[id]=fn;
  return `<div class="panel tile live-tile" data-tap="${id}">
    <div class="accent"></div><div class="idx">${idx}</div>
    <div class="nm">${name}</div><div class="meta">${meta} →</div></div>`;
}
function tileSoon(idx,name,meta){
  return `<div class="panel tile soon"><div class="accent" style="background:#c9a23a"></div>
    <div class="idx">${idx}</div><div class="nm">${name}</div>
    <div class="meta">⊘ ${meta}</div></div>`;
}
function counter(n,lab,suf=''){
  return `<div class="panel counter"><div class="num" data-to="${n}">0</div><div class="lab">${lab}${suf?' '+suf:''}</div></div>`;
}
function animateCounters(){
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  app.querySelectorAll('.num[data-to]').forEach(el=>{
    const to=+el.dataset.to; const suf=el.parentElement.querySelector('.lab').textContent.includes('+')?'':'';
    if(reduce){ el.textContent=to; return; }
    let s=null, dur=900;
    function step(t){ if(!s)s=t; const p=Math.min(1,(t-s)/dur);
      el.textContent=Math.round(to*(1-Math.pow(1-p,3))); if(p<1)requestAnimationFrame(step); }
    requestAnimationFrame(step);
  });
}

/* ---------- CHARACTERS LIST ---------- */
function chars(){
  const q=(view.q||'').toLowerCase(); const f=view.f||'ALL';
  const facs=[...new Set(DATA.characters.map(c=>c.faction).filter(Boolean))];
  // order chips by member count
  const facCount={}; DATA.characters.forEach(c=>facCount[c.faction]=(facCount[c.faction]||0)+1);
  facs.sort((a,b)=>facCount[b]-facCount[a]);
  let list=DATA.characters.filter(c=>{
    const mq=!q || c.name.toLowerCase().includes(q) || (c.role||'').toLowerCase().includes(q)
      || (c.aliases||[]).join(' ').toLowerCase().includes(q);
    const mf=f==='ALL'||c.faction===f; return mq&&mf;
  });
  app.innerHTML = `
  <div class="vhead"><span class="back" data-back>← НАЗАД</span>
    <span class="vtitle">Персонажи <small>· ${list.length}</small></span></div>
  <input class="search" id="q" placeholder="поиск по имени, роли, алиасу…" value="${esc(view.q||'')}">
  <div class="chips" id="chips">
    ${chip('ALL','Все','var(--sys)',f==='ALL')}
    ${facs.map(fc=>chip(fc,fc,colorOf(fc),f===fc)).join('')}
  </div>
  <div class="rows">${ list.length? list.map(rowChar).join('') : '<div class="empty">Ничего не найдено. Сбрось фильтр.</div>'}</div>`;
  const qi=document.getElementById('q');
  qi.addEventListener('input',()=>{ view.q=qi.value; const pos=qi.selectionStart;
    renderRowsOnly(); });
  bindList();
}
function renderRowsOnly(){ // re-render only rows to keep input focus
  const q=(view.q||'').toLowerCase(); const f=view.f||'ALL';
  const list=DATA.characters.filter(c=>{
    const mq=!q||c.name.toLowerCase().includes(q)||(c.role||'').toLowerCase().includes(q)||(c.aliases||[]).join(' ').toLowerCase().includes(q);
    return (f==='ALL'||c.faction===f)&&mq;});
  const rowsEl=app.querySelector('.rows');
  rowsEl.innerHTML = list.length? list.map(rowChar).join('') : '<div class="empty">Ничего не найдено.</div>';
  app.querySelector('.vtitle').innerHTML=`Персонажи <small>· ${list.length}</small>`;
  bindRows();
}
function chip(id,label,color,on){
  const style = on? `background:${color};border-color:${color}` : '';
  return `<span class="chip ${on?'on':''}" data-chip="${esc(id)}" style="${style}"><span class="d" style="background:${color}"></span>${esc(label)}</span>`;
}
function rowChar(c){
  return `<div class="panel row" data-char="${esc(c.name)}">
    <div class="bar" style="background:${c.color}"></div>
    <div class="main"><div class="nm">${esc(c.name)}</div>
    <div class="sub">${esc(c.role||c.faction||'—')}</div></div>
    <div class="rt"><span class="tn" style="color:${c.color};border-color:${c.color}">${esc(shortFac(c.faction))}</span>
    <div class="thr">ИРУ <b>${c.threat}</b></div></div></div>`;
}
function bindList(){
  app.querySelector('[data-back]').addEventListener('click',()=>{haptic();back();});
  app.querySelectorAll('[data-chip]').forEach(el=>el.addEventListener('click',()=>{
    haptic(); view.f=el.dataset.chip; chars();
  }));
  bindRows();
}
function bindRows(){
  app.querySelectorAll('[data-char]').forEach(el=>el.addEventListener('click',()=>{
    haptic(); const c=DATA.characters.find(x=>x.name===el.dataset.char);
    go({name:'char', data:c, q:view.q, f:view.f});
  }));
}

function statRow(k,v,color){
  const on=Math.max(0,Math.min(SEG,Math.round(v/statMax[k]*SEG)));

    <div class="segs" data-on="${on}">${Array.from({length:SEG}).map(()=>'<i></i>').join('')}</div></div>`;
}

/* ---------- FACTIONS LIST ---------- */
function factions(){
  app.innerHTML = `
  <div class="vhead"><span class="back" data-back>← НАЗАД</span>
    <span class="vtitle">Фракции <small>· ${DATA.factions.length}</small></span></div>
  <div class="rows">${DATA.factions.map(rowFac).join('')}</div>`;
  app.querySelector('[data-back]').addEventListener('click',()=>{haptic();back();});
  app.querySelectorAll('[data-fac]').forEach(el=>el.addEventListener('click',()=>{
    haptic(); const f=DATA.factions.find(x=>x.name===el.dataset.fac); go({name:'faction',data:f});
  }));
}
function rowFac(f){
  return `<div class="panel row" data-fac="${esc(f.name)}">
    <div class="bar" style="background:${f.color}"></div>
    <div class="main"><div class="nm">${esc(f.name)}</div>
    <div class="sub">${esc(f.ideology||'—')}</div></div>
    <div class="rt"><span class="tn" style="color:${f.color};border-color:${f.color}">ВЛ ${f.influence}</span>
    <div class="thr"><b>${f.members}</b> чел.</div></div></div>`;
}

/* ---------- FACTION DETAIL ---------- */
function facDetail(){
  const f=view.data;
  const members=DATA.characters.filter(c=>c.faction===f.name).sort((a,b)=>b.threat-a.threat);
  app.innerHTML = `
  <div class="vhead"><span class="back" data-back>← НАЗАД</span><span class="vtitle">Держава</span></div>
  <div class="panel dband fade" style="--c:${f.color}">
    <span class="ftag" style="color:${f.color};border-color:${f.color}">Уровень влияния ${f.influence}/15</span>
    <div class="nm">${esc(f.name)}</div>
    <div class="st">${esc(f.status||'')}</div>
  </div>
  ${f.ideology?`<div class="quote" style="--c:${f.color}">${esc(f.ideology)}</div>`:''}
  <div class="panel block" style="--c:${f.color}">
    <div class="thr-hero"><span class="v">${f.influence}</span><span class="l">Влияние · из 15</span></div>
    <div class="meter"><i id="thrbar"></i></div>
  </div>
  <div class="panel block">
    ${f.leadership&&f.leadership.length?`<div class="fac-line"><span class="k">Руководство</span><span>${esc(f.leadership.join(', '))}</span></div>`:''}
    ${f.location?`<div class="fac-line"><span class="k">Локация</span><span>${esc(f.location)}</span></div>`:''}
    ${f.enemies&&f.enemies.length?`<div class="fac-line"><span class="k">Противники</span><span>${esc(f.enemies.join(', '))}</span></div>`:''}
    <div class="fac-line"><span class="k">Персонажей</span><span>${members.length}</span></div>
  </div>
  ${members.length?`<div class="panel block" style="--c:${f.color}"><h4>Ключевые лица</h4>
    <div class="rows">${members.slice(0,8).map(rowChar).join('')}</div></div>`:''}`;
  app.querySelector('[data-back]').addEventListener('click',()=>{haptic();back();});
  app.querySelectorAll('[data-char]').forEach(el=>el.addEventListener('click',()=>{
    haptic(); const c=DATA.characters.find(x=>x.name===el.dataset.char);
    go({name:'char',data:c});
  }));
  requestAnimationFrame(()=>{const tb=document.getElementById('thrbar'); if(tb)tb.style.width=Math.round(f.influence/15*100)+'%';});
}

/* helpers */
function colorOf(fac){ const c=DATA.characters.find(x=>x.faction===fac); return c?c.color:'#8A96A3'; }
function shortFac(f){ if(!f)return '—'; return f.length>12? f.slice(0,11)+'…' : f; }

function render(){
  if(view.name==='home') home();
  else if(view.name==='chars') chars();
  else if(view.name==='char') charDetail();
  else if(view.name==='factions') factions();
  else if(view.name==='faction') facDetail();
}
render(); syncBack();
</script>
</body>
</html>
