<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>РАЗДЕЛЁННЫЙ МИР · 2061</title>
<style>
  :root{
    --bg:#07090C; --bg2:#0B0F14; --panel:#0E141B; --panel2:#121A22;
    --line:rgba(130,150,170,.16); --line2:rgba(130,150,170,.28);
    --txt:#D7E0E8; --dim:#728492; --dim2:#46566333; --sys:#2FD3E0;
    --r:10px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
    font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;}
  body{min-height:100vh; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  #app{max-width:560px; margin:0 auto; padding:0 14px 40px;}
  a{color:inherit;}
  ::selection{background:var(--sys); color:#04181b;}

  /* scanlines + vignette overlay */
  .crt{position:fixed; inset:0; pointer-events:none; z-index:60;
    background:repeating-linear-gradient(180deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.16) 3px, rgba(0,0,0,0) 4px);
    mix-blend-mode:multiply; opacity:.5;}
  .crt::after{content:""; position:absolute; inset:0;
    background:radial-gradient(120% 80% at 50% 0%, transparent 55%, rgba(0,0,0,.45) 100%);}
  .sweep{position:fixed; left:0; right:0; height:120px; z-index:61; pointer-events:none;
    background:linear-gradient(180deg, transparent, rgba(47,211,224,.10), transparent);
    animation:sweep 2.6s ease-out 1 forwards;}
  @keyframes sweep{0%{top:-120px} 100%{top:110vh}}

  /* clipped panel */
  .panel{background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line); position:relative;
    clip-path:polygon(0 0, calc(100% - 11px) 0, 100% 11px, 100% 100%, 11px 100%, 0 calc(100% - 11px));}
  .panel::before{content:""; position:absolute; top:0; right:0; width:11px; height:11px;
    border-left:1px solid var(--line2); border-bottom:1px solid var(--line2);
    transform:translate(-0px,0); }

  /* top status bar */
  .statusbar{display:flex; justify-content:space-between; align-items:center;
    font-size:11px; letter-spacing:.06em; color:var(--dim); padding:14px 2px 12px;
    border-bottom:1px solid var(--line); margin-bottom:18px; text-transform:uppercase;}
  .statusbar b{color:var(--sys); font-weight:600;}
  .live{display:inline-flex; align-items:center; gap:6px;}
  .dot{width:7px; height:7px; border-radius:50%; background:#39d98a; box-shadow:0 0 8px #39d98a;
    animation:blink 1.6s steps(1) infinite;}
  @keyframes blink{50%{opacity:.25}}

  /* hero */
  .hero{padding:6px 2px 4px;}
  .eyebrow{font-size:11px; letter-spacing:.34em; color:var(--dim); text-transform:uppercase;}
  .title{font-size:38px; line-height:.98; font-weight:700; letter-spacing:.01em; margin:10px 0 0;
    text-transform:uppercase; text-shadow:0 0 24px rgba(47,211,224,.18);}
  .title span{display:block;}
  .title .b{color:var(--sys);}
  .tagline{color:var(--dim); font-size:13px; margin:14px 0 0; max-width:42ch;}

  /* counters */
  .counters{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:22px 0 10px;}
  .counter{padding:12px 10px; text-align:left;}
  .counter .num{font-size:24px; font-weight:700; color:var(--txt); letter-spacing:.02em;}
  .counter .lab{font-size:9.5px; letter-spacing:.12em; color:var(--dim); text-transform:uppercase; margin-top:4px;}

  /* section tiles */
  .sec-h{display:flex; align-items:center; gap:10px; margin:26px 2px 12px; color:var(--dim);
    font-size:11px; letter-spacing:.2em; text-transform:uppercase;}
  .sec-h .ln{height:1px; background:var(--line); flex:1;}
  .tiles{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .tile{padding:16px 14px 14px; cursor:pointer; transition:transform .12s ease, border-color .2s;
    min-height:108px; display:flex; flex-direction:column; justify-content:space-between;}
  .tile:active{transform:scale(.975);}
  .tile.live-tile{border-color:var(--line2);}
  .tile .idx{font-size:11px; color:var(--dim); letter-spacing:.1em;}
  .tile .nm{font-size:17px; font-weight:600; margin-top:auto; text-transform:uppercase; letter-spacing:.02em;}
  .tile .meta{font-size:11px; color:var(--dim); margin-top:6px;}
  .tile.soon{opacity:.5;}
  .tile.soon .meta{color:#c9a23a;}
  .tile .accent{position:absolute; left:0; top:14px; bottom:14px; width:3px; background:var(--sys);}
  .tile{position:relative;}

  /* generic view header */
  .vhead{display:flex; align-items:center; gap:12px; padding:14px 2px; margin-bottom:8px;
    border-bottom:1px solid var(--line);}
  .back{font-size:12px; letter-spacing:.08em; color:var(--dim); cursor:pointer; padding:6px 10px;
    border:1px solid var(--line); border-radius:3px; text-transform:uppercase;}
  .back:active{color:var(--sys); border-color:var(--sys);}
  .vtitle{font-size:14px; letter-spacing:.18em; text-transform:uppercase;}
  .vtitle small{color:var(--dim); letter-spacing:.05em;}

  /* search + chips */
  .search{width:100%; background:var(--panel); border:1px solid var(--line); color:var(--txt);
    font:inherit; font-size:14px; padding:11px 12px; margin:6px 0 12px; outline:none;
    clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));}
  .search:focus{border-color:var(--sys);}
  .search::placeholder{color:var(--dim2-,#5a6b78);}
  .chips{display:flex; gap:7px; overflow-x:auto; padding:2px 0 12px; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto; font-size:11px; letter-spacing:.05em; padding:6px 11px; cursor:pointer;
    border:1px solid var(--line); color:var(--dim); white-space:nowrap; text-transform:uppercase;
    border-radius:2px; transition:.15s;}
  .chip.on{color:#04140f; font-weight:600;}
  .chip .d{display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:-1px;}

  /* list rows */
  .rows{display:flex; flex-direction:column; gap:7px;}
  .row{display:flex; align-items:center; gap:12px; padding:11px 12px; cursor:pointer;
    transition:transform .1s, border-color .2s; position:relative;}
  .row:active{transform:scale(.99);}
  .row .bar{width:3px; align-self:stretch; flex:0 0 3px;}
  .row .main{flex:1; min-width:0;}
  .row .nm{font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row .sub{font-size:11px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}
  .row .rt{text-align:right; flex:0 0 auto;}
  .row .rt .tn{font-size:9px; letter-spacing:.08em; text-transform:uppercase; padding:2px 7px; border:1px solid; border-radius:2px;}
  .row .rt .thr{font-size:12px; color:var(--dim); margin-top:5px;}
  .row .rt .thr b{color:var(--txt);}
  .empty{padding:30px 10px; text-align:center; color:var(--dim); font-size:13px;}

  /* detail */
  .dband{padding:18px 16px; margin-bottom:14px; position:relative; overflow:hidden;}
  .dband::after{content:""; position:absolute; inset:0;
    background:linear-gradient(180deg, var(--c,#2FD3E0)22, transparent 70%); opacity:.18; pointer-events:none;}
  .dband .ftag{font-size:10px; letter-spacing:.14em; text-transform:uppercase; display:inline-block;
    padding:3px 9px; border:1px solid; border-radius:2px;}
  .dband .nm{font-size:27px; font-weight:700; margin:12px 0 4px; text-transform:uppercase; letter-spacing:.01em;}
  .dband .al{font-size:12px; color:var(--dim);}
  .dband .rl{font-size:13px; margin-top:8px; color:var(--txt);}
  .dband .st{font-size:11px; color:var(--dim); margin-top:8px; letter-spacing:.05em; text-transform:uppercase;}

  .quote{padding:14px 16px; margin:0 0 14px; border-left:3px solid var(--c,#2FD3E0);
    font-style:italic; color:#c2cdd6; font-size:14px; background:rgba(255,255,255,.015);}

  .block{padding:16px; margin-bottom:14px;}
  .block h4{margin:0 0 14px; font-size:11px; letter-spacing:.2em; color:var(--dim); text-transform:uppercase; font-weight:600;}

  .thr-hero{display:flex; align-items:baseline; gap:10px; margin-bottom:8px;}
  .thr-hero .v{font-size:40px; font-weight:700; color:var(--c,#2FD3E0); line-height:1;}
  .thr-hero .l{font-size:11px; color:var(--dim); letter-spacing:.1em; text-transform:uppercase;}
  .meter{height:8px; background:rgba(255,255,255,.05); position:relative; overflow:hidden;}
  .meter i{position:absolute; left:0; top:0; bottom:0; background:var(--c,#2FD3E0); width:0; transition:width .9s cubic-bezier(.2,.7,.2,1);}

  .stat{margin-bottom:13px;}
  .stat .sl{display:flex; justify-content:space-between; font-size:11px; letter-spacing:.04em; margin-bottom:5px; text-transform:uppercase;}
  .stat .sl span:first-child{color:var(--dim);}
  .stat .sl span:last-child{color:var(--txt); font-weight:600;}
  .segs{display:flex; gap:3px;}
  .segs i{flex:1; height:9px; background:rgba(255,255,255,.06); transition:background .5s;}
  .segs i.on{background:var(--c,#2FD3E0);}

  .chiplist{display:flex; flex-wrap:wrap; gap:7px;}
  .ab{font-size:12px; padding:6px 10px; border:1px solid var(--line2); color:#c2cdd6; border-radius:2px;}

  .bio p{margin:0 0 12px; font-size:14px; color:#bcc8d1; line-height:1.62;}
  .bio p:last-child{margin-bottom:0;}

  .meta-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .meta-grid .mi{font-size:12px;}
  .meta-grid .mi .k{color:var(--dim); font-size:10px; letter-spacing:.08em; text-transform:uppercase;}
  .meta-grid .mi .v{color:var(--txt); margin-top:3px;}

  .fac-line{display:flex; justify-content:space-between; align-items:center; font-size:12px; padding:9px 0; border-bottom:1px solid var(--line);}
  .fac-line:last-child{border-bottom:0;}
  .fac-line .k{color:var(--dim); text-transform:uppercase; letter-spacing:.06em;}
  .footer{margin-top:30px; padding-top:16px; border-top:1px solid var(--line); font-size:10px;
    color:var(--dim2-,#566); text-align:center; letter-spacing:.08em; line-height:1.8;}
  .footer b{color:var(--dim);}
  @media (prefers-reduced-motion:reduce){
    .sweep,.dot{animation:none!important;} .meter i,.search,.tile{transition:none!important;}
  }
  .fade{animation:fade .35s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
</style>
</head>

const DATA = {"world": "РАЗДЕЛЁННЫЙ МИР", "year": 2061, "counts": {"characters": 91, "factions": 35, "locations": 36, "events": 200}, "characters": [{"name": "Тенебриа", "faction": "Тенебрион", "color": "#E6B422", "role": "Верховное божество и покровительница державы", "status": "Активен", "gender": "Женский", "birth": "12.12.1999", "location": "Парящая резиденция Тенебрии", "threat": 130, "stats": {"Интеллект": 4, "Боевые возможности": 100, "Влияние": 9, "Мета-сила": 100, "Жестокость": 7, "Воля": 5, "Скрытность": 1, "Непредсказуемость": 4}, "abilities": ["Искажение реальности", "Сотворение материи (одежда, предметы)", "Ментальная связь с миллионами подданных", "Левитация и телепортация", "Поглощение ментальной энергии"], "aliases": ["Натали Рут", "Богиня Тенебриона"], "quote": "Они так забавно молятся! Надеюсь, сегодня будет что-то интересное, а то мне скучно", "bio": "Тенебриа, когда-то известная как Натали Рут, является живым сердцем и духовным фундаментом Тенебриона. Обладая внешностью вечно юной шестнадцатилетней девушки с золотистыми кудрями и пронзительными зелеными глазами, она воплощает собой высший порядок, установленный после великого хаоса. Её сила способна воздвигать нерушимые стены и менять ландшафты, но за божественным сиянием скрывается личность, сохранившая подростковую непосредственность, страсть к изысканным нарядам и глубокую потребность в искреннем общении.\n\nИстория её вознесения — это путь от брошенного ребенка из американского приюта до владычицы европейских земель. Пройдя через предательство близких и пламя Американского кризиса, она нашла убежище и новое предназначение в Европе под руководством Артура Остермана. Сегодня она живет в недосягаемой хрустальной пирамиде, парящей над облаками, принимая молитвы миллионов и даруя им 'чудеса', которые на самом деле являются сложной симбиотической связью между божеством и её верующими.\n\n---"}, {"name": "Нимфея Эленис", "faction": "Единая Америка\n\nПодфракция: Парфюмерная компания «Эленис»", "colo ветром. Слияние, невидимость, погодные явления, сверхскорость", "Неуязвимость в форме ветра", "Телекинез с помощью ветра"], "aliases": ["Спасская"], "quote": "Откуда я? Ветром принесло!", "bio": "Лилия Спасская — воплощение непредсказуемой стихии. Девушка с болезненной, хрупкой, но притягательной внешностью и силой всесокрушающего урагана, для которой крах человечества стал лишь забавным зрелищем. Она бродит по пустошам Белой Зоны, рисует загадочные геоглифы из ветра и пыли, и играет чужими жизнями, не испытывая ни капли привязанности или жалости.\n\n---"}, {"name": "Артур Остерман", "faction": "Тенебрион\n\nПодфракция: Церковь Тенебрии", "color": "#8A96A3", "role": "", "status": "Активен", "gender": "Мужской", "birth": "15.01.1995", "location": "Резиденция Артура Остермана", "threat": 53, "stats": {"Интеллект": 10, "Боевые возможности": 4, "Влияние": 10, "Мета-сила": 5, "Жестокость": 7, "Воля": 8, "Скрытность": 9, "Непредсказуемость": 5}, "abilities": ["Стратегическое планирование", "Манипуляция", "Идеологическая обработка"], "aliases": ["Апостол"], "quote": "Ложь становится правдой, если в неё верят миллионы", "bio": "Великий архитектор и истинный разум, стоящий за троном Тенебриона. Прагматичный мастер манипуляций, который превратил стихийную мощь напуганной девушки в основу новой мировой религии. Он не верит в богов, но виртуозно управляет государством, используя театральные эффекты и сеть собственных двойников, чтобы казаться подданным вездесущим и бессмертным воплощением воли Апостола.\n\n---"}, {"name": "Валентина Блажек", "faction": "Ракшасы\n\nПодфракция: Лидер культа Обликов", "color": "#8A96A3", "role": "Лидер Ракшасов, верховная жрица хаоса", "status": "Активен", "gender": "Женский", "birth": "25.12.2005", "location": "Дакка", "threat": 53, "stats": {"Интеллект": 5, "Боевые возможности": 10, "Влияние": 7, "Мета-сила": 10, "Жестокость": 10, "Воля": 7, "Скрытность": 4, "Непредсказуемость": 10}, "abilities": ["Энергетический вампиризм (поглощение жизненной силы)", "Создание \"Обликов\" через кровную связь", "Сверхчеловеческая физиология"], "aliases": ["Диди"], "quote": "Ты так дрожишь… Можно, я попробую на вкус твой страх?", "bio": "Абсолютная владычица Дакки, превратившая целый мегаполис в гигантскую ферму для утоления своего голода. Она не просто правит — она питается самим существованием окружающих, превращая преданных слуг в искаженные подобия людей.\n\n---"}, {"name": "Курт Вистнер", "faction": "Аркадия", "color": "#36C28B", "role": "Спаситель", "status": "Активен", "gender": "Мужской", "birth": "13.11.1965", "location": "Аркадия", "threat": 52, "stats": {"Интеллект": 11, "Боевые возможности": 2, "Влияние": 8, "Мета-сила": 0, "Жестокость": 8, "Воля": 8, "Скрытность": 8, "Непредсказуемость": 7}, "abilities": ["Научные исследования", "Тактическое планирование", "Лидерство", "Боевое управление"], "aliases": ["Спаситель"], "quote": "Пока вы молитесь своим выдуманным богам, мои технологии держат этот мир от падения", "bio": "Курт Вистнер — один из трёх Спасителей Аркадии, гениальный ученый и создатель энергетической системы «Изумруд». Именно его разработки, включая силовой купол над Британскими островами, позволили государству сохранить независимость и технологическое превосходство после Великого Коллапса. Вистнер — прагматик до мозга костей, одержимый рациональным использованием ресурсов и глубоко презирающий политические игры и религиозный фанатизм, которые он считает признаками деградации человечества. За маской кабинетного теоретика скрывается расчетливый манипулятор, выстроивший сложную сеть промышленного шпионажа и внешнего влияния. Он лично курирует операции по внедрению агентов в крупнейшие корпорации противников, такие как «Эленис» в Единой Америке, используя их для сбора критически важных данных и саботажа. Курт рассматривает конфликт с Тенебрионом не как войну за выживание, а как уникальную возможность для изучения и апроприации чужих технологий, не гнушаясь использовать тела павших врагов в качестве лабораторных образцов. В управлении Вистнер полагается на строгую иерархию и эффективность, часто вступая в конфликты с Юлианом Греем из-за вопросов оборонного бюджета. Его «Боевое управление» осуществляется через высокотехнологичных андроидов и паломников, которые заменяют живых солдат в самых грязных и опасных миссиях. Для него Аркадия — это глобальный научный эксперимент, а любой прорыв в куполе — лишь повод для создания еще более совершенного средства изоляции и контроля.\n\n---"}, {"name": "Дариан Сорель", "faction": "Ракшасы\n\nПодфракция: Неизвестно", "color": "#8A96A3", "role": "Лидер Ракшасов, Стратег", "status": "Активен", "gender": "Мужской", "birth": "01.03.2000", "location": "Куньмин", "threat": 51, "stats": {"Интеллект": 7, "Боевые возможности": 10, "Влияние": 7, "Мета-сила": 10, "Жестокость": 10, "Воля": 9, "Скрытность": 2, "Непредсказуемость": 6}, "abilities": ["Управление солнечным светом и спектрами", "Создание температурных и световых аномалий", "Психологическая дезориентация через визуальные искажения"], "aliases": ["Бог Тьмы", "Мастер Спектра"], "quote": "Я — тот, кто решает, увидите ли вы завтрашний день.", "bio": "Дариан Сорель — 48-летний стратег Ракшасов, способный превращать само солнце в инструмент невыносимой пытки. Он правит Городом Забвения, наслаждаясь хаосом и деградацией своих подданных, которых он лишает зрения и рассудка в своих световых лабиринтах.\n\n---"}, {"name": "Ольга Гончарова", "faction": "Тенебрион", "color": "#E6B422", "role": "Начальник особого отдела полиции", "status": "Активен", "gender": "Женский", "birth": "18.09.1985", "location": "Тенебрион", "threat": 50, "stats": {"Интеллект": 7, "Боевые возможности": 8, "Влияние": 4, "Мета-сила": 6, "Жестокость": 6, "Воля": 9, "Скрытность": 10, "Непредсказуемость": 6}, "abilities": ["Профессиональный следователь", "Манипуляция материей", "Манипуляция температурой", "Ментальная стойкость", "Высокотехнологичная экипировка", "Боевые навыки"], "aliases": ["Майор Гончарова"], "quote": "Пусть молятся. Богов не существует. Все решат люди.", "bio": "Ольга Гончарова занимает пост начальника особого отдела Тенебриона в звании майора и обладает полным карт-бланшем на поиск и обезвреживание опаснейших преступников. До Коллапса она с отличием окончила полицейскую академию и вместе с Артуром Остерманом пыталась остановить криминального авторитета Элиаса Дорна. Сейчас, будучи окруженной религиозными фанатиками, она остается прагматичным детективом, для которой работа всегда стояла превыше всего. За вежливой маской лояльности скрывается человек, глубоко ненавидящий устройство Тенебриона и местную инквизицию — Капитул Пресечения. Ольга сохранила свободу воли и ежедневно лжет всему государству, сопротивляясь психологическому подавлению через Исповеди. Свою главную миссию она видит в сохранении правды: девушка тайно надиктовывает мемуары о реальных событиях прошлого, чтобы оставить эти записи будущим поколениям после неизбежного падения режима.\n\n---"}, {"name": "Амели Бертран", "faction": "Ракшасы\n\nПодфракция: Координаторы", "color": "#8A96A3", "role": "Хозяйка культа порядка и энтропии, негласный лидер квартета Ракшасов", "status": "Активен", "gender": "Женский", "birth": "13.10.2001", "location": "Бастион", "threat": 50, "stats": {"Интеллект": 7, "Боевые возможности": 10, "Влияние": 7, "Мета-сила": 10, "Жестокость": 10, "Воля": 9, "Скрытность": 4, "Непредсказуемость": 3}, "abilities": ["Тотальный контроль процессов гниения", "Формирование локальных участков распада"], "aliases": ["Богиня смерти"], "quote": "В мире полно мусора. Мне приходится его утилизировать", "bio": "Одна из предводительниц Ракшасов. Это бледнолицая, пугающе хрупкая на вид женщина, неизменно облачённая в строгий винтажный костюм. Она страдает маниакальной жаждой систематизировать любую энтропию. Её пугающий дар — многократное ускорение разложения любой материи. В её извращенном разуме смерть является единственной формой истинной гармонии.\n\n---"}, {"name": "Элиас Дорн", "faction": "Аркадия", "color": "#36C28B", "role": "Спаситель", "status": "Активен", "gender": "Мужской", "birth": "12.02.1975", "location": "Аркадия", "threat": 49, "stats": {"Интеллект": 9, "Боевые возможности": 4, "Влияние": 8, "Мета-сила": 0, "Жестокость": 6, "Воля": 10, "Скрытность": 7, "Непредсказуемость": 5}, "abilities": ["Лидерство", "Переговоры", "Стратегическое планирование", "Криминальный опыт", "Ментальная стойкость"], "aliases": ["Спаситель"], "quote": "Враг нам только тот, кто первым открыл огонь. До тех пор стоит относиться с осторожностью ко всем гостям. И я повторюсь, с осторожностью, а не с ненавистью", "bio": "Элиас Дорн — один из трёх Спасителей Аркадии, человек, обладающий непоколебимым спокойствием и внутренней силой. Его прошлое неразрывно связано с криминальным миром старой Европы, что наложило отпечаток на его методы управления: Элиас знает цену предательству и умеет видеть трещины в людях раньше, чем они сами их осознают. Вместе с Куртом Вистнером он стоял у истоков создания бастиона в Британии, обеспечивая политическую и социальную стабильность в условиях мировой катастрофы. В отличие от своих коллег, Дорн придерживается философии прагматичного пацифизма. Он верит в возможность диалога даже с внешними врагами и выступает за гуманную интеграцию пленников, что часто приводит к конфликтам с прямолинейным Юлианом Греем. Именно Дорн стал целью покушения со стороны обезумевшего Грея, но даже после ранения он проявил милосердие, настояв на лечении, а не на казни своего боевого товарища. Элиас — интеллектуал с колючим взглядом, неизменно опирающийся на свою черную трость, которая является не столько опорой, сколько символом его скрытой угрозы. Его «Криминальный опыт» позволяет ему эффективно пресекать панику среди населения и выстраивать сложнейшие теневые схемы защиты. Для Дорна Аркадия — это место, где разум должен возобладать над инстинктами, даже если ради этого Спасителю приходится самому становиться воплощением холодного и расчетливого порядка.\n\n---"}, {"name": "Итон Грант", "faction": "Ракшасы\n\nПодфракция: Владыка Гравитационного Разлома", "color": "#8A96A3", "role": "Стратег, архитектор аномалий", "status": "Активен", "gender": "Мужской", "birth": "14.07.2014", "location": "Пинсян", "threat": 48, "stats": {"Интеллект": 5, "Боевые возможности": 10, "Влияние": 7, "Мета-сила": 10, "Жестокость": 8, "Воля": 8, "Скрытность": 3, "Непредсказуемость": 7}, "abilities": ["Гравитационные манипуляции", "Создание пространственных аномалий", "Интуитивное понимание сопромата"], "aliases": ["Мастер Гравитации", "Скульптор Коллапса"], "quote": "Взгляни, как рушится этот мир под собственной тяжестью", "bio": "Младший из Ракшасов, воспринимающий разрушение как форму высокого искусства. Он превращает реальность в текучую глину, заставляя целые города застывать в невозможных позах бесконечного падения.\n\n---"}, {"name": "Сергей Курчатов", "faction": "Наемники", "color": "#B0B6BD", "role": "Наемник", "status": "Активен", "gender": "Мужской", "birth": "15.03.2030", "location": "Наемники", "threat": 47, "stats": {"Интеллект": 7, "Боевые возможности": 7, "Влияние": 3, "Мета-сила": 0, "Жестокость": 9, "Воля": 7, "Скрытность": 6, "Непредсказуемость": 8}, "abilities": ["Владение футуристическим оружием", "боевые навыки"], "aliases": ["Янычар"], "quote": "У такого отморозка, как я, появился плазменный пистолет! Да они за километр меня будут обходить!\n\n---", "bio": ""}, {"name": "Юлиан Грей", "faction": "Аркадия", "color": "#36C28B", "role": "Спаситель", "status": "Активен", "gender": "Мужской", "birth": "22.01.1990", "location": "Аркадия", "threat": 47, "stats": {"Интеллект": 8, "Боевые возможности": 8, "Влияние": 8, "Мета-сила": 0, "Жестокость": 7, "Воля": 5, "Скрытность": 5, "Непредсказуемость": 6}, "abilities": ["Боевые навыки", "Тактическое планирование", "Боевое управление", "Управление тяжелой броней", "Лидерство"], "aliases": ["Спаситель"], "quote": "Преторианцы всё ещё стоят на страже вашего спокойствия, и ни они, ни я не дрогнем. Аркадия выстоит", "bio": "Юлиан Грей — один из трёх Спасителей и верховный главнокомандующий вооруженными силами Аркадии. Будучи основателем и лидером элитного корпуса «Преторианцев», он является главным гарантом безопасности страны, годами сдерживающим натиск Тенебриона на границах Уайтхолла. В отличие от своих коллег-правителей, Грей — человек дела и абсолютной искренности; он не терпит политических игр и привык полагаться на сухие факты и железную дисциплину, рассматривая защиту граждан не как работу, а как смысл существования. Прошлое Юлиана обременено тяжелым военным опытом и неутихающим чувством вины за гибель подчиненных, что вылилось в глубокое посттравматическое расстройство и регулярные кошмары. Его внутренняя честность и прямолинейность сделали его уязвимым перед ментальными атаками Тенебрии: в условиях распространяющегося «божественного» безумия он поддался паранойе, что в итоге привело к покушению на жизнь Спасителя Дорна. В результате этого инцидента Грей был вынужден покинуть пост правителя и отправиться на принудительную реабилитацию. В бою Грей представляет собой несокрушимую силу, сочетающую тактическую выучку с выдающимися физическими навыками. Облаченный в тяжелый бронекостюм «Преторианец», он мастерски использует широкий арсенал высокотехнологичного вооружения — от плазменных пушек и ракетных установок до массивного меча, способного разрубать доспехи высших ангелов. Его готовность идти на крайние меры ради спасения других, вплоть до активации режима самоуничтожения брони, делает его одним из самых опасных и уважаемых воинов Аркадии.\n\n---"}, {"name": "Эва Найт", "faction": "Независимые\n\nПодфракция: Крыло нового дня", "color": "#8A96A3", "role": "", "status": "Неизвестно", "gender": "Женский", "birth": "05.08.2035", "location": "Крыло нового дня", "threat": 47, "stats": {"Интеллект": 8, "Боевые возможности": 8, "Влияние": 2, "Мета-сила": 7, "Жестокость": 9, "Воля": 7, "Скрытность": 6, "Непредсказуемость": 7}, "abilities": ["Манипуляция кровью", "Сверхчеловеческая ловкость и скорость", "Боевые навыки", "Интеллект"], "aliases": ["Эва Найт", "Красный демон", "Охотница Тенебриона"], "quote": "Я дала уйти живыми. Решила, что одумаетесь. Теперь вы снова здесь. Почему?\n\n---", "bio": ""}, {"name": "Уильям Купер", "faction": "Аркадия\n\nПодфракция: Единая Америка", "color": "#8A96A3", "role": "Агент", "status": "Активен", "gender": "Мужской", "birth": "17.03.2015", "location": "Единая Америка", "threat": 46, "stats": {"Интеллект": 10, "Боевые возможности": 7, "Влияние": 3, "Мета-сила": 0, "Жестокость": 6, "Воля": 8, "Скрытность": 7, "Непредсказуемость": 5}, "abilities": ["Инженерное проектирование", "Взлом систем", "Рукопашный бой", "Психологическая манипуляция", "Сбор разведданных"], "aliases": ["Уильям Купер"], "quote": "Такие рискованные вещи не делаются по чужой указке. Верно?", "bio": "Уильям Купер — ведущий инженер концерна «Юпитер», официально участвующий в крупных государственных проектах, таких как строительство химического завода компании «Эленис» в регионе Уругвай. Его профессиональная деятельность служит идеальным прикрытием для истинной миссии: промышленного шпионажа и дестабилизации политической обстановки в Единой Америке. Купер — высококвалифицированный специалист в области инженерного проектирования и взлома систем, чьи навыки рукопашного боя и психологической манипуляции делают его идеальным агентом для выполнения самых деликатных операций. Его лояльность принадлежит Аркадии, чьи интересы он защищает с холодной расчетливостью.\n\nЗа маской вежливого инженера скрывается хладнокровный профессионал, готовый на крайние меры ради достижения своих целей. Купер методичен и циничен, его действия всегда продуманы до мелочей. Он не брезгует расчленением тел для сокрытия следов и манипуляцией журналистами для дискредитации своих врагов. Его истинная цель — сбор компромата на верхушку власти и уничтожение репутации компании «Эленис» по заказу своего покровителя Вистнера. Купер представляет собой уникальную угрозу, сочетая в себе технический гений и безжалостность профессионального убийцы, что делает его одним из самых опасных агентов в мире киберпанка, где божественное безумие переплетается с технологическим хаосом.\n\n---"}, {"name": "Смотрящий в бездну", "faction": "Отражение бездны", "color": "#7A5CFF", "role": "Верховный правитель и пророк культа", "status": "Активен", "gender": "Мужской", "birth": "21.12.1995", "location": "Сибирские леса", "threat": 46, "stats": {"Интеллект": 7, "Боевые возможности": 5, "Влияние": 6, "Мета-сила": 9, "Жестокость": 8, "Воля": 8, "Скрытность": 5, "Непредсказуемость": 7}, "abilities": ["Генерация массовых галлюцинаций", "Сверхмощное ментальное воздействие", "Эмпатическое сканирование («Взор сквозь покровы»)"], "aliases": ["Тот, кто видит сквозь покровы", "Лидер Отражения Бездны"], "quote": "Тот, кто долго смотрит в лес, рано или поздно обнаружит, что лес смотрит в него. И у леса нет глаз, только голод.", "bio": "Загадочный лидер сибирского культа, сумевший подчинить себе волю тысяч последователей. Изгнанник из Европы, ставший живым богом в заснеженной тайге.\n\n---"}, {"name": "Адриан Гилберт", "faction": "Единая Америка\n\nПодфракция: Единая Америка", "color": "#8A96A3", "role": "Председатель правительства", "status": "Активен", "gender": "Мужской", "birth": "04.07.1995", "location": "Единая Америка", "threat": 45, "stats": {"Интеллект": 8, "Боевые возможности": 4, "Влияние": 10, "Мета-сила": 0, "Жестокость": 5, "Воля": 10, "Скрытность": 7, "Непредсказуемость": 1}, "abilities": ["Политическое лидерство", "Стратегическое мышление", "Манипуляция общественным мнением", "Гиревой спорт"], "aliases": ["Верховный Председатель", "Адриан Гилберт"], "quote": "Порядок —  это ежедневная работа. И я не привык бросать дела на полпути\n\n---", "bio": ""}, {"name": "Деймон Мур", "faction": "Единая Америка", "color": "#3FA7FF", "role": "Председатель правительства", "status": "Мёртв", "gender": "Мужской", "birth": "04.07.1985", "location": "Единая Америка", "threat": 45, "stats": {"Интеллект": 8, "Боевые возможности": 1, "Влияние": 10, "Мета-сила": 0, "Жестокость": 6, "Воля": 6, "Скрытность": 7, "Непредсказуемость": 7}, "abilities": ["Харизма", "политическое лидерство"], "aliases": ["Основатель Единой Америки", "Мур"], "quote": "Сверхлюди — это не угроза. Это просто новый ресурс, который ждал своего архитектора\n\n---", "bio": ""}, {"name": "Александра Вегас", "faction": "Единая Америка\n\nПодфракция: Крыло нового дня", "color": "#8A96A3", "role": "Агент", "status": "Мёртв", "gender": "Женский", "birth": "01.05.2002", "location": "Крыло нового дня", "threat": 44, "stats": {"Интеллект": 5, "Боевые возможности": 7, "Влияние": 1, "Мета-сила": 7, "Жестокость": 8, "Воля": 9, "Скрытность": 8, "Непредсказуемость": 6}, "abilities": ["Вождение и механика", "Спокойствие и собранность в экстремальных ситуациях", "Неясные мотивы и принадлежность", "Воинское мастерство", "Стирание памяти"], "aliases": ["Алекс"], "quote": "Невинная улыбка и яркий костюм —  тоже оружие. Причем, бьет без промаха!\n\n---", "bio": ""}, {"name": "Николас Тёрнер", "faction": "Единая Америка\n\nПодфракция: Революционеры", "color": "#8A96A3", "role": "Лидер радикалов", "status": "Активен", "gender": "Мужской", "birth": "28.08.2005", "location": "Единая Америка", "threat": 44, "stats": {"Интеллект": 6, "Боевые возможности": 7, "Влияние": 3, "Мета-сила": 0, "Жестокость": 9, "Воля": 7, "Скрытность": 5, "Непредсказуемость": 7}, "abilities": ["Мастерское владение огнестрельным оружием", "тактическое планирование", "лидерские качества", "диверсионная деятельность", "высокая физическая выносливость", "Сверхчеловеческая сила"], "aliases": ["Стрелок"], "quote": "У вас своя цель, у меня своя. Вы забирайте свою бумагу, а я разожгу костер революции!\n\n---", "bio": ""}, {"name": "Люцифер", "faction": "Пищевая цепь", "color": "#8A96A3", "role": "Лидер группировки", "status": "Активен", "gender": "Мужской", "birth": "06.06.2006", "location": "Белая зона", "threat": 43, "stats": {"Интеллект": 4, "Боевые возможности": 6, "Влияние": 3, "Мета-сила": 0, "Жестокость": 10, "Воля": 6, "Скрытность": 5, "Непредсказуемость": 9}, "abilities": ["рукопашный бой", "высокая выносливость"], "aliases": ["Люцифер"], "quote": "Мы вас всех на ремни порежем! А тебя в первую очередь! Активист, сука!\n\n---", "bio": ""}, {"name": "Эрик Сэнд", "faction": "Тенебрион\n\nПодфракция: Церковь Тенебрии", "color": "#8A96A3", "role": "Святой", "status": "Активен", "gender": "Мужской", "birth": "21.08.1995", "location": "Тенебрион", "threat": 43, "stats": {"Интеллект": 3, "Боевые возможности": 8, "Влияние": 8, "Мета-сила": 7, "Жестокость": 8, "Воля": 8, "Скрытность": 3, "Непредсказуемость": 5}, "abilities": ["Боевые навыки", "Излучение сияния", "Полет", "Лидерство", "Генерация силовых щитов"], "aliases": ["Первый из Святых", "Верный клинок"], "quote": "Я просто делаю то, что она хочет. И попробуй мне помешать", "bio": "Эрик Сэнд — Первый Святой Тенебриона, верный клинок и защитник Богини Тенебрии. Его история началась задолго до вознесения Натали Рут: в старом мире он был обычным бандитом, признающим только право силы, но именно он спас раненую Натали во время Американского кризиса и перевез её в Европу. В награду за безусловную преданность Тенебриа наделила его божественной мощью, превратив грубого наемника в ослепительного воина света. Эрик возглавляет «Крыло Возрождения» — ветвь религии, основанную на идее медитативного очищения через битву и глубоких эмоциональных связях. Под его руководством воины не ищут смерти, а стремятся прожить достойную жизнь ради своих избранных духовных наставниц — служительниц Церкви. Сэнд лично ввел ритуал «Марджана», согласно которому прах павших в бою героев превращается в алмазы, становясь символом вечного возвышения духа в служении Богине. В бою Эрик представляет собой величественное и пугающее зрелище: облаченный в золотые доспехи с массивными металлическими крыльями, он способен источать сияние, выжигающее любую угрозу. Его «Боевые навыки» дополняются использованием уникальных силовых щитов, которые защищают его последователей в самых опасных миссиях в «белых зонах». Несмотря на статус Святого, Эрик остается человеком действия, предпочитающим лично вести свои легионы в атаку и доказывать свою веру делом, а не молитвой.\n\n---"}, {"name": "Максимилиан Варнер", "faction": "Единая Америка\n\nПодфракция: Полиция Национальных Интересов", "color": "#8A96A3", "role": "Куратор Управления по борьбе с коррупцией ПНИ", "status": "Активен", "gender": "Мужской", "birth": "15.10.1980", "location": "Единая Америка", "threat": 43, "stats": {"Интеллект": 7, "Боевые возможности": 5, "Влияние": 5, "Мета-сила": 0, "Жестокость": 7, "Воля": 8, "Скрытность": 6, "Непредсказуемость": 5}, "abilities": ["Оперативный розыск", "Сокрытие и уничтожение улик", "Внутренние расследования"], "aliases": ["Железный Варнер", "Замдиректора ПНИ"], "quote": "Чистота рядов ПНИ — залог выживания нации. И я лично вырву любой сорняк, пустивший здесь корни.", "bio": "Гроза коррупционеров и первый заместитель директора Полиции Национальных Интересов. Для всех он «Железный Варнер», безупречный страж закона, примерный муж и отец, чей авторитет в силовых структурах абсолютен.\n\nВ действительности же этот непреклонный офицер — сломленный раб своих тайных желаний. Загнанный в ловушку шантажом и сексуальной одержимостью, он использует ресурсы внутренней безопасности, чтобы заметать следы преступлений серого кардинала.\n\n---"}, {"name": "Ричард Уолш", "faction": "Forge", "color": "#FF7A1A", "role": "Генеральный директор", "status": "Активен", "gender": "Мужской", "birth": "01.03.1985", "location": "Forge", "threat": 42, "stats": {"Интеллект": 8, "Боевые возможности": 2, "Влияние": 8, "Мета-сила": 0, "Жестокость": 5, "Воля": 8, "Скрытность": 5, "Непредсказуемость": 6}, "abilities": ["Стратегическое планирование", "Лидерство", "Управление ресурсами", "Визионерство"], "aliases": ["Архитектор Нового Мира", "CEO Forge", "Председатель Совета Директоров Forge"], "quote": "Мы не восстанавливаем старое. Мы строим то, что прежний мир не смог даже вообразить\n\n---", "bio": ""}, {"name": "Джулиан Восс", "faction": "Единая Америка\n\nПодфракция: Министерство здравоохранения", "color": "#8A96A3", "role": "Главный судмедэксперт и консультант Минздрава", "status": "Активен", "gender": "Мужской", "birth": "18.01.1985", "location": "Восточный регион", "threat": 42, "stats": {"Интеллект": 8, "Боевые возможности": 1, "Влияние": 4, "Мета-сила": 0, "Жестокость": 8, "Воля": 7, "Скрытность": 8, "Непредсказуемость": 6}, "abilities": ["Создание невидимых ядов", "Фальсификация медицинских экспертиз", "Биохимическая инженерия"], "aliases": ["Доктор Восс", "Личный токсиколог"], "quote": "Смерть не бывает случайной. Это всегда лишь вопрос правильной дозировки и слабости организма.", "bio": "Главный судебно-медицинский эксперт Восточного региона и непререкаемый авторитет в области токсикологии. Утонченный, тихий доктор с манерами аристократа, источающий аромат дорогого антисептика.\n\nЗа его пугающей элегантностью скрывается гениальный и безжалостный убийца. Восс использует свои подпольные лаборатории для создания препаратов, вызывающих «естественные смерти» неугодных Нимфее лиц, и лично закрывает эти дела официальными патологоанатомическими заключениями.\n\n---"}, {"name": "Халиф Абдулла Аль-Нар", "faction": "Джамахирия Нар\n\nПодфракция: Джамахирия Нар", "color": "#8A96A3", "role": "Верховный правитель и духовный лидер Джамахирии Нар", "status": "Активен", "gender": "Мужской", "birth": "16.03.1990", "location": "Ан-Нафт", "threat": 42, "stats": {"Интеллект": 7, "Боевые возможности": 6, "Влияние": 5, "Мета-сила": 0, "Жестокость": 7, "Воля": 8, "Скрытность": 4, "Непредсказуемость": 5}, "abilities": ["Харизматическое лидерство", "Ораторское искусство", "Стратегическое планирование партизанской войны", "Знание законов шариата"], "aliases": ["Абдулла Аль-Нар", "Халиф Огня", "Халиф Аль-Нара"], "quote": "Мир будет очищен огнем и верой, ибо только в пламени сгорает скверна прошлого.", "bio": "Харизматичный и беспощадный лидер теократического государства Джамахирия Нар. Сын бедуинского шейха, сумевший объединить разрозненные племена вокруг идеи великого очищения и контроля над нефтяными ресурсами.\n\n---"}, {"name": "Рафаэль Монтальво", "faction": "Единая Америка\n\nПодфракция: Корпус «Луна»", "color": "#8A96A3", "role": "Командующий корпусом «Земля»", "status": "Активен", "gender": "Мужской", "birth": "13.06.2015", "location": "Единая Америка", "threat": 42, "stats": {"Интеллект": 6, "Боевые возможности": 5, "Влияние": 6, "Мета-сила": 0, "Жестокость": 6, "Воля": 7, "Скрытность": 6, "Непредсказуемость": 6}, "abilities": ["Холодный прагматизм", "Тактическое планирование"], "aliases": ["Генерал-полковник Монтальво"], "quote": "Сверхлюди — это не боги и не демоны. Это инструменты, которые нужно просто правильно откалибровать и воспитать во благо нации", "bio": "Генерал-полковник Рафаэль Монтальво — командующий Экспедиционным корпусом «Луна», ключевая фигура в системе внешнего влияния Единой Америки. Рожденный в Медельине в семье биолога и офицера спецназа, он с детства сочетал в себе страсть к точным наукам и железную военную выправку. Монтальво сделал блестящую карьеру, специализируясь на нейтрализации паранормальных сущностей, и стал одним из немногих, кто безоговорочно поддержал режим Гилберта ради возможности реализовать свои научные амбиции в масштабе всей державы. Его характер — это триумф холодного расчета над эмоциями. Рафаэль рассматривает мир как глобальное уравнение, где каждое действие должно иметь доказанную эффективность. В качестве командующего «Луной» он внедрил инновационную, но пугающую доктрину: вместо уничтожения Одаренных, он захватывает их для «перевоспитания» и последующей интеграции в армию Америки в качестве живого оружия. Монтальво глубоко презирает интуицию и чувства, предпочитая опираться на факты, отчеты и результаты экспериментов. Внешне генерал Монтальво воплощает бесстрастную уверенность: атлетичное телосложение, пронзительный взгляд карих глаз и шрам на лице — память о суровых операциях в Белой Зоне. Под его руководством корпус разделен на пять специализированных направлений — от «Новолуния» до «Лунного Серпа», каждое из которых оснащено по последнему слову техники для работы в экстремальных условиях. Для Рафаэля нет ничего святого, кроме прогресса нации, и он готов пойти на любые жертвы, чтобы превратить хаос сверхспособностей в упорядоченную мощь Единой Америки.\n\n---"}, {"name": "Дух леса", "faction": "Отражение бездны", "color": "#7A5CFF", "role": "Хранитель ресурсов и защитник территорий", "status": "Активен", "gender": "Мужской", "birth": "21.12.2000", "location": "Сибирские леса", "threat": 42, "stats": {"Интеллект": 5, "Боевые возможности": 3, "Влияние": 5, "Мета-сила": 8, "Жестокость": 8, "Воля": 8, "Скрытность": 6, "Непредсказуемость": 7}, "abilities": ["Биологический хлорокинез", "Создание органических ловушек", "Очистка почвы от токсинов"], "aliases": ["Лесной Страж"], "quote": "Лес — это не тишина. Это гул миллионов голосов, и я слышу каждый из них.", "bio": "Второй лидер культа, мета-человек с уникальным даром прямого нейронного взаимодействия с растительностью. Прагматичный координатор, обеспечивающий выживание общины в суровой сибирской тайге за счет контроля экосистемы.\n\n---"}, {"name": "Кристиан Фогель", "faction": "Ракшасы\n\nПодфракция: Каста Адаптированных", "color": "#8A96A3", "role": "Наместник сектора, тактический разрушитель логистики Forge", "status": "Активен", "gender": "Мужской", "birth": "29.03.2021", "location": "Гуанси-Чжуанский район", "threat": 41, "stats": {"Интеллект": 5, "Боевые возможности": 8, "Влияние": 3, "Мета-сила": 7, "Жестокость": 8, "Воля": 6, "Скрытность": 5, "Непредсказуемость": 6}, "abilities": ["Атомарное обнуление коэффициента трения поверхностей и сред", "Гипер-вибрационное нагнетание трения внутри закрытых механизмов", "Управление сцеплением твердых тел на дистанции до 100 метров"], "aliases": ["Фогель"], "quote": "Без трения хваленая сталь Уолша — просто корова на льду.", "bio": "Кристин Фогель — воплощение холодного прагматизма на службе Квартета. Циничный тактик и наместник сектора, способный одним усилием воли превратить грозную технику конгломерата в неуправляемые куски металла. Изменяя законы сцепления, он в одиночку парализует вражеские наступательные операции.\n\n---"}, {"name": "Дерек Вэнс", "faction": "Единая Америка\n\nПодфракция: Парфюмерная компания «Эленис»", "color": "#8A96A3", "role": "Глава Департамента корпоративной безопасности «Эленис»", "status": "Активен", "gender": "Мужской", "birth": "12.04.1995", "location": "Единая Америка", "threat": 41, "stats": {"Интеллект": 6, "Боевые возможности": 6, "Влияние": 2, "Мета-сила": 0, "Жестокость": 8, "Воля": 7, "Скрытность": 7, "Непредсказуемость": 5}, "abilities": ["Скрытные ликвидации", "Координация штурмовых групп", "Конспирация и зачистка улик"], "aliases": ["Глава безопасности Эленис", "Командир карательного отряда"], "quote": "Эмоции мешают делу. Моя задача — сделать так, чтобы у нашей госпожи не возникало проблем.", "bio": "Руководитель Службы безопасности парфюмерной империи «Эленис» и бывший элитный боец сил специального назначения. Дерек Вэнс — невидимый карающий меч Нимфеи, отвечающий за самые грязные и секретные силовые операции.\n\nОбладая пустой, выжженной душой и безупречной военной выправкой, он координирует отряды ликвидаторов, заметающих любые следы теневой деятельности синдиката. Дерек беспрекословно повинуется кукловоду ради единственной цели — спасения жизни своей знаменитой сестры.\n\n---"}, {"name": "Чэнь Лэй", "faction": "Ракшасы\n\nПодфракция: Каста Адаптированных", "color": "#8A96A3", "role": "Комендант сектора распределения ресурсов, штурмовая единица поддержки", "status": "Активен", "gender": "Мужской", "birth": "18.05.2003", "location": "Дакка", "threat": 40, "stats": {"Интеллект": 5, "Боевые возможности": 8, "Влияние": 3, "Мета-сила": 7, "Жестокость": 9, "Воля": 7, "Скрытность": 3, "Непредсказуемость": 5}, "abilities": ["Генерация направленных низкочастотных ультразвуковых импульсов", "Создание разрушительных барических ударных волн через голосовые связки", "Дистанционное нагнетение резонансной вибрации в твердых телах"], "aliases": ["Неизвестно"], "quote": "При старом правительстве я прятался в канавах и боялся сделать вдох. Господин Дариан и госпожа Амели сожгли их законы, и теперь я сам — закон для этой швали.", "bio": "Чэнь Лэй — суровый и прагматичный комендант, управляющий огромным распределительным узлом ресурсов и рабочей силы. Являясь уроженцем региона и элитным бойцом касты Адаптированных, он использует сокрушительную силу ультразвука, чтобы держать под контролем местное население и выступать в роли живой акустической артиллерии на передовой.\n\n---"}, {"name": "Вероника Рин", "faction": "Наемники", "color": "#B0B6BD", "role": "Наемница", "status": "Активен", "gender": "Женский", "birth": "15.06.2030", "location": "Белая зона", "threat": 40, "stats": {"Интеллект": 5, "Боевые возможности": 7, "Влияние": 2, "Мета-сила": 4, "Жестокость": 5, "Воля": 8, "Скрытность": 7, "Непредсказуемость": 6}, "abilities": ["Манипуляция стеклом", "Боевые навыки (стрелковое оружие, ближний бой)", "Управление транспортными средствами (мотоциклы, квадроциклы, автомобили)", "Навыки инфильтрации и сбора информации", "Прагматизм, цинизм, но с проявлениями эмпатии"], "aliases": ["Пустельга"], "quote": "Иногда важно признать свое бессилие. Но об этом позже\n\n---", "bio": ""}, {"name": "Эну", "faction": "Конфедерация Междуречья", "color": "#9B7BE0", "role": "Верховный жрец, стратегический аналитический центр", "status": "Активен", "gender": "Мужской", "birth": "15.06.1980", "location": "Ниппур", "threat": 40, "stats": {"Интеллект": 9, "Боевые возможности": 1, "Влияние": 7, "Мета-сила": 7, "Жестокость": 5, "Воля": 8, "Скрытность": 7, "Непредсказуемость": 3}, "abilities": ["Субатомарное и нейронное сканирование ма пособна пережить даже полную утрату физической оболочки. Будучи главой Управления Внешних Ресурсов, он превратил опасные вылазки в Белую Зону в отточенный механизм по спасению наследия предков. Его харизма и кибернетическое совершенство делают его одной из самых знаковых фигур в современной Аркадии.\n\n---"}, {"name": "Эмили Грей", "faction": "Аркадия", "color": "#36C28B", "role": "Паломник", "status": "Активен", "gender": "Женский", "birth": "14.02.1995", "location": "Аркадия", "threat": 39, "stats": {"Интеллект": 7, "Боевые возможности": 7, "Влияние": 2, "Мета-сила": 0, "Жестокость": 6, "Воля": 8, "Скрытность": 5, "Непредсказуемость": 4}, "abilities": ["Кибернетические аугментации", "Скрытные операции", "Ментальная стойкость", "Боевые навыки"], "aliases": ["Эмили Рут"], "quote": "Мертвый герой мне не нужен. Просто пообещай, что в следующий раз не будешь лезть на рожон так отчаянно.", "bio": "Эмили Грей — агент Аркадии и невеста Спасителя Юлиана Грея, играющая ключевую роль в координации паломников и обеспечении безопасности внутри купола. Она является старшей сестрой Натали Рут (Богини Тенебрии), однако их пути разошлись в глубоком детстве, когда семья отказалась от Натали из-за её пугающих способностей. В отличие от сестры, Эмили выбрала путь технологического совершенствования, став символом рациональности и верности Аркадии в противовес мистическому безумию Тенебриона. За внешней заботливостью и мягкостью Эмили скрывается прагматичный и жесткий оперативник, способный на радикальные решения ради защиты своего дома. Во время нападения фанатиков на их с Юлианом жилье, она проявила ледяное хладнокровие, лично ликвидируя нападавших и используя химические составы для мгновенного заметания следов. Её отношение к «безумцам», попавшим под влияние Тенебрии, лишено жалости: Эмили рассматривает их не как жертв, а как прямую угрозу, которую необходимо выжигать без колебаний. В бою Эмили полагается на скрытность и обширный набор кибернетических имплантов, интегрированных в её тело. Она способна мгновенно менять внешность, корректируя цвет и форму волос, а её запястья оснащены скрытыми устройствами для стрельбы карбоновыми иглами. Её «Боевые навыки» дополняются способностью действовать в условиях полной изоляции, что делает её идеальным кандидатом для опасных миссий в Австралию и другие «белые зоны», где технологическое превосходство важнее численного.\n\n---"}, {"name": "Бьянка Скардино", "faction": "Гарнизон", "color": "#88A0B0", "role": "Лидер группировки", "status": "Активен", "gender": "Женский", "birth": "20.04.2025", "location": "Гарнизон", "threat": 39, "stats": {"Интеллект": 7, "Боевые возможности": 4, "Влияние": 4, "Мета-сила": 0, "Жестокость": 5, "Воля": 8, "Скрытность": 5, "Непредсказуемость": 6}, "abilities": ["стратегическое планирование", "управление группировкой", "боевая подготовка", "допросы"], "aliases": ["Скардино", "Лидер Гарнизона", "Шеф"], "quote": "Меня окружают идиоты... Ладно. Давай попробуем с этим разобраться\n\n---", "bio": ""}, {"name": "Стефан Дюпон", "faction": "Ракшасы\n\nПодфракция: Адаптированные", "color": "#8A96A3", "role": "Наместник логистического узла, специалист по противовоздушной и точечной обороне", "status": "Активен", "gender": "Мужской", "birth": "11.08.2019", "location": "Долина реки Сицзян, Домен Итона Гранта", "threat": 39, "stats": {"Интеллект": 5, "Боевые возможности": 8, "Влияние": 3, "Мета-сила": 7, "Жестокость": 8, "Воля": 4, "Скрытность": 5, "Непредсказуемость": 6}, "abilities": ["Дистанционное локальное сжатие воздушных масс", "Создание зон кратковременного абсолютного вакуума в пределах видимости", "Генерация направленных барических схлопываний"], "aliases": ["Стефан Дюпон"], "quote": "В банке я сверял копейки, а ублюдки плевали мне в лицо. Здесь мне достаточно щелкнуть пальцами, чтобы у них полопались черепа.\n\n---", "bio": ""}, {"name": "Михаэль Иннос", "faction": "Тенебрион\n\nПодфракция: Небесный хор", "color": "#8A96A3", "role": "", "status": "Активен", "gender": "Мужской", "birth": "18.08.2000", "location": "Тенебрион", "threat": 39, "stats": {"Интеллект": 6, "Боевые возможности": 6, "Влияние": 7, "Мета-сила": 1, "Жестокость": 6, "Воля": 8, "Скрытность": 2, "Непредсказуемость": 4}, "abilities": ["Военная стратегия", "Командование войсками", "Участие в ближнем бою", "Ораторское искусство"], "aliases": ["Главнокомандующий Тенебриона"], "quote": "Небесам не нужны ваши сомнения. Им нужна только верность", "bio": "Стальной клинок Небесного хора, воплощающий холодную и беспощадную сторону божественного порядка. Его леденящий взгляд и крылья из черного сплава внушают трепет даже союзникам, а стратегический гений не оставляет врагам шанса на спасение. Для Инноса война — это ритуал очищения мира, в котором нет места слабости, а цена победы всегда оправдана священной целью.\n\n---"}, {"name": "Вестник Тишины", "faction": "Отражение бездны\n\nПодфракция: Триумвират Бездны", "color": "#8A96A3", "role": "Инквизитор культа, Стратегический щит секты", "status": "Активен", "gender": "Мужской", "birth": "13.06.2020", "location": "Сибирские леса", "threat": 39, "stats": {"Интеллект": 3, "Боевые возможности": 5, "Влияние": 4, "Мета-сила": 7, "Жестокость": 8, "Воля": 6, "Скрытность": 8, "Непредсказуемость": 5}, "abilities": ["Генерация ЭМИ-поля колоссального радиуса", "Подавление электроники, навигации и связи"], "aliases": [], "quote": "Ваши машины ослепнут, а вслед за ними ослепнете и вы. Слушайте тишину... она пришла за вами.", "bio": "Младший лидер Триумвирата Бездны и живой стратегический щит секты. Вестник Тишины — сын одного из первых сверхлюдей, жестоко убитого силами корпуса «Луна». Он генерирует колоссальное пассивное ЭМИ-поле, превращающее глухие леса Сибири в мертвую зону для любой электроники Единой Америки.\n\nИз-за постоянного переизбытка энергии его тело покрыто пугающими шрамами-молниями. Одержимый местью и абсолютно преданный Бездне, он руководит смертоносной кастой Мавок и лично пытает плененных солдат, используя ритуальный нож из кости собственного отца.\n\n---"}, {"name": "Престон Хейз", "faction": "Единая Америка\n\nПодфракция: Федеральный Резервный Комитет", "color": "#8A96A3", "role": "Председатель Федерального Резервного Комитета", "status": "Активен", "gender": "Мужской", "birth": "14.02.1970", "location": "Единая Америка", "threat": 38, "stats": {"Интеллект": 7, "Боевые возможности": 2, "Влияние": 6, "Мета-сила": 0, "Жестокость": 6, "Воля": 6, "Скрытность": 6, "Непредсказуемость": 5}, "abilities": ["Глобальные финансовые махинации", "Бюрократическое давление", "Управление рынками"], "aliases": ["Председатель ФРК", "Главный банкир"], "quote": "Финансовая стабильность державы зиждется на незыблемой морали и строгом расчете.", "bio": "Глава Федерального Резервного Комитета Единой Америки. Респектабельный мужчина с благородной сединой, олицетворяющий собой пуританскую этику, надежность и консерватизм.\n\nВ тени же этот «столп морали» скрывает извращенную жажду доминирования и садизма, оплачивая свои грязные тайны из государственной казны и находясь в абсолютном финансовом рабстве у серого кардинала державы.\n\n---"}, {"name": "Дамиан Кортес", "faction": "Тенебрион", "color": "#E6B422", "role": "", "status": "Активен", "gender": "Мужской", "birth": "22.09.2005", "location": "Скандинавский экзархат", "threat": 38, "stats": {"Интеллект": 5, "Боевые возможности": 7, "Влияние": 7, "Мета-сила": 1, "Жестокость": 5, "Воля": 9, "Скрытность": 1, "Непредсказуемость": 4}, "abilities": ["Мастерское владение топором с энергетической подпиткой", "Винтовка", "Стратегическое мышление", "Сильная воля", "Лидерство"], "aliases": ["Северный Медведь"], "quote": "Пусть жрицы молятся. Я предпочитаю доверять своему топору", "bio": "Суровый «Северный медведь», закаленный в бесконечных снегах и огне приграничных войн. Он не ждет чудес от богини и не тратит время на молитвы, предпочитая доказывать свою преданность сталью и кровью на поле боя. Дамиан — воплощение чистой дисциплины и стойкости, лидер, который не нуждается в титулах святости, чтобы вести за собой людей в самый безнадежный бой против захватчиков.\n\n---"}, {"name": "Абигейл Ли", "faction": "Единая Америка\n\nПодфракция: Министерство информационных технологий и связи", "color": "#8A96A3", "role": "Министр информационных технологий и связи", "status": "Активен", "gender": "Женский", "birth": "11.11.2008", "location": "", "threat": 38, "stats": {"Интеллект": 9, "Боевые возможности": 2, "Влияние": 6, "Мета-сила": 0, "Жестокость": 5, "Воля": 8, "Скрытность": 6, "Непредсказуемость": 2}, "abilities": ["Программирование квантовых алгоритмов", "Абсолютный контроль цифрового пространства", "Создание систем слежки"], "aliases": ["Министр связи", "Архитектор CyberSentinel"], "quote": "Человеческий фактор — это баг системы. Я пишу код, в котором нет места ошибкам.", "bio": "Непревзойденный гений кибернетики и Министр информационных технологий. Абигейл Ли — это ледяной технократ, отгородившийся от мира интерфейсами и стерильной дисциплиной.\n\nБудучи архитектором правительственной защиты, она тайно переписала главные алгоритмы страны ради женщины, к которой испытывает болезненную, почти религиозную привязанность, превратив её в невидимого цифрового призрака.\n\n---"}, {"name": "Анаиса Аскирион", "faction": "Тенебрион", "color": "#E6B422", "role": "Святая Клинков, страж Кадисского фронта", "status": "Активен", "gender": "Женский", "birth": "18.08.2010", "location": "Кадисский фронт", "threat": 38, "stats": {"Интеллект": 5, "Боевые возможности": 8, "Влияние": 8, "Мета-сила": 7, "Жестокость": 7, "Воля": 7, "Скрытность": 1, "Непредсказуемость": 2}, "abilities": ["Призыв духовных клинков (защита и атака)", "Музыкальный контроль поля боя (резонанс, инфразвук)", "Аудиальное обнаружение противника", "Усиление союзников через звуковые волны"], "aliases": ["Святая Клинков", "Симфонический Страж Кадисского фронта"], "quote": "В тишине я слышу их страх. Это единственная нота, которая никогда не фальшивит", "bio": "Симфонический страж, для которой война — это величественное и грозное музыкальное произведение. Она не просто сражается, а дирижирует хаосом битвы, призывая призрачные клинки в ритме божественных мелодий. Закованная в доспехи с неоновыми венами, Анаиса несет в себе глубокую травму прошлого, находя спасение от пугающей тишины собственного разума в грохоте сражений и шепоте богини.\n\n---"}, {"name": "Леон Крамер", "faction": "Единая Америка\n\nПодфракция: Силы суверенитета и глобального влияния", "color": "#8A96A3", "role": "Председатель Стратегического Военного Совета, Командующий ССГВ", "status": "Активен", "gender": "Мужской", "birth": "01.09.1980", "location": "Единая Америка", "threat": 38, "stats": {"Интеллект": 8, "Боевые возможности": 2, "Влияние": 7, "Мета-сила": 0, "Жестокость": 6, "Воля": 7, "Скрытность": 3, "Непредсказуемость": 5}, "abilities": ["Стратегическое планирование", "Анализ военных конфликтов", "Тактическое командование", "Интеллектуальный анализ"], "aliases": ["Командующий Сил Суверенитета"], "quote": "Война — это трагедия, но порой она неизбежна для защиты разума и свободы. Истинная сила рождается не в приказе, а в понимании цели", "bio": "Генерал армии Леон Крамер — непосредственный руководитель Сил Суверенитета и Глобального Влияния (ССГВ) и один из самых выдающихся стратегов Единой Америки. Выходец из семьи профессоров, он получил блестящее образование в области истории и экономики, что позволяет ему видеть поле боя как сложную историческую закономерность, а не просто набор тактических задач. Несмотря на безупречную карьеру, в юности Леон едва не лишился будущего из-за увлечения подпольной рок-музыкой, что до сих пор проявляется в его ироничном чувстве юмора и поощрении инициативы среди подчиненных. Крамер обладает проницательным аналитическим умом: именно он разработал долгосрочные прогнозы, предсказавшие угрозу со стороны Тенебриона. Он не просто кабинетный теоретик — генерал лично участвовал в операциях в Белой Зоне, проверяя свои стратегии на практике и заслужив такие награды, как Орден Освобождения и Медаль за Отвагу. Его стиль командования основан на вере в силу разума и знаний, а не в слепое подчинение, что делает его ключевым связующим звеном между политическим руководством страны и армейской элитой. Вне службы Леон Крамер остается глубоким интеллектуалом, предпочитающим тишину библиотек шуму парадов. Он в совершенстве владеет латынью Тенебриона, используя её для изучения документов захваченных городов врага. Его «Стратегическое планирование» и способность сохранять хладнокровие под звуки прогрессив-металла в наушниках превращают его в самого опасного противника для мистических сил Европы, поскольку Крамер воюет не только оружием, но и самой реальностью, которую он просчитывает на несколько ходов вперед.\n\n---"}, {"name": "Жан-Поль Руссо", "faction": "Ракшасы\n\nПодфракция: Адаптированные", "color": "#8A96A3", "role": "Командир оборонительного сектора, тектонический заградитель", "status": "Активен", "gender": "Мужской", "birth": "02.09.2017", "location": "Горный массив Луосяо, Пограничный рубеж Итона Гранта", "threat": 37, "stats": {"Интеллект": 6, "Боевые возможности": 7, "Влияние": 3, "Мета-сила": 6, "Жестокость": 8, "Воля": 5, "Скрытность": 3, "Непредсказуемость": 5}, "abilities": ["Молекулярный расплав твердых неорганических соединений", "Генерация направленных тектонических импульсов через конечности", "Дистанционное разжижение бетона, асфальта и горных пород"], "aliases": ["Жан-Поль Руссо"], "quote": "Укрепления Уолша кажутся прочными лишь до тех пор, пока их фундамент не потечет.\n\n---", "bio": ""}, {"name": "Рауль Рамирес", "faction": "Наемники\n\nПодфракция: Ковчег", "color": "#8A96A3", "role": "Наемник", "status": "Активен", "gender": "Мужской", "birth": "25.10.2030", "location": "Белая зона", "threat": 37, "stats": {"Интеллект": 8, "Боевые возможности": 7, "Влияние": 1, "Мета-сила": 0, "Жестокость": 6, "Воля": 6, "Скрытность": 5, "Непредсказуемость": 4}, "abilities": ["Инженерное дело", "ремонт и модификация \n---"}, {"name": "Деннис Картер", "faction": "Единая Америка\n\nПодфракция: Сопротивление", "color": "#8A96A3", "role": "Лидер сопротивления", "status": "Активен", "gender": "Мужской", "birth": "22.10.2035", "location": "Единая Америка", "threat": 37, "stats": {"Интеллект": 7, "Боевые возможности": 6, "Влияние": 4, "Мета-сила": 0, "Жестокость": 1, "Воля": 6, "Скрытность": 9, "Непредсказуемость": 4}, "abilities": ["Аналитическое мышление", "Шифрование", "Владение техникой", "Анализ данных", "Боевые навыки (улучшенные)"], "aliases": ["Алан Джонсон"], "quote": "Таково наше дело: риск и надежда\n\n---", "bio": ""}, {"name": "Ирэн", "faction": "Тенебрион", "color": "#E6B422", "role": "", "status": "Активен", "gender": "Женский", "birth": "10.05.2015", "location": "Резиденция Артура Остермана", "threat": 37, "stats": {"Интеллект": 6, "Боевые возможности": 4, "Влияние": 2, "Мета-сила": 0, "Жестокость": 5, "Воля": 7, "Скрытность": 7, "Непредсказуемость": 6}, "abilities": ["Ораторское искусство", "Навыки тренировки бойцов", "Наблюдательность"], "aliases": [], "quote": "Свободы выбора не существует. Все мы зависим от обстоятельств\n\n---", "bio": ""}, {"name": "Лилит Блэквуд", "faction": "Тенебрион\n\nПодфракция: Капитул Надзора", "color": "#8A96A3", "role": "Глава инквизиции Тенебриона", "status": "Активен", "gender": "Женский", "birth": "04.04.1990", "location": "Тенебрион", "threat": 36, "stats": {"Интеллект": 7, "Боевые возможности": 5, "Влияние": 5, "Мета-сила": 3, "Жестокость": 9, "Воля": 5, "Скрытность": 3, "Непредсказуемость": 2}, "abilities": ["Выдающийся стратегический интеллект", "Мастерство допроса и боевых искусств"], "aliases": ["Верховный Пресекатель"], "quote": "У лжи есть запах. И мы хорошо берем след", "bio": "Глава службы духовной безопасности и главная карающая длань государства. Уроженка шотландских земель, облаченная в темные одежды с золотыми искрами, она сеет леденящий ужас среди тех, кто смеет нарушать догматы.\n\n---"}, {"name": "Эмилия Эверетт", "faction": "Единая Америка\n\nПодфракция: Корпус «Солнце»", "color": "#8A96A3", "role": "Командующий корпусом «Солнце»", "status": "Активен", "gender": "Женский", "birth": "05.09.2010", "location": "Единая Америка", "threat": 36, "stats": {"Интеллект": 8, "Боевые возможности": 3, "Влияние": 6, "Мета-сила": 0, "Жестокость": 6, "Воля": 7, "Скрытность": 2, "Непредсказуемость": 4}, "abilities": ["Стратегическое мышление", "Лидерство", "Глубокий анализ", "Экстремальный перфекционизм", "Управление флотом"], "aliases": ["Генерал-полковник Эверетт"], "quote": "Победа начинается с порядка — в мыслях, в действиях, в каждой детали. Безупречность — не цель, а образ жизни. Только так мы можем быть непобедимы", "bio": "Генерал-полковник Эмилия Эверетт — одна из самых влиятельных и жестких фигур в иерархии Единой Америки, возглавляющая Экспансионный корпус «Солнце». Дочь потомственных военных, она с отличием окончила Академию стратегических исследований, зарекомендовав себя как блестящий аналитик и лидер, для которого дисциплина является высшей ценностью. Под её командованием корпус превратился в эталон точности: Эмилия требует безукоризненного исполнения приказов и предельной самоотдачи, превращая каждую военную операцию в симфонию идеального порядка. Её стиль руководства основан на тотальном контроле и внимании к мельчайшим деталям, от чистоты на борту флагмана «Америка» до сложнейших тактических расчетов. Эверетт известна своей отстраненностью от обычных человеческих слабостей; она ведет подробный личный дневник, куда вносит наблюдения за эффективностью экипажей, и находит вдохновение в классической музыке Бетховена, помогающей ей сохранять ледяное спокойствие в эпицентре сражений. За свои заслуги в укреплении глобального влияния Америки она была трижды удостоена медали «За безупречную службу» и ордена «Золотого щита». В стратегическом плане Эмилия — архитектор морского доминирования державы, лично курирующая флагманские авианесущие крепости. Её «Стратегическое мышление» позволяет Единой Америке эффективно блокировать угрозы со стороны Тенебриона, удерживая под контролем ключевые морские пути и береговые плацдармы. Для Эверетт война — это прежде всего математическая задача, требующая идеального решения, а любое отклонение от регламента рассматривается ею как личное оскорбление и угроза национальной безопасности.\n\n---"}, {"name": "Джонас Блейк", "faction": "Единая Америка\n\nПодфракция: Корпус «Земля»", "color": "#8A96A3", "role": "Командующий Внутренним корпусом", "status": "Активен", "gender": "Мужской", "birth": "05.03.1990", "location": "Единая Америка", "threat": 36, "stats": {"Интеллект": 5, "Боевые возможности": 5, "Влияние": 5, "Мета-сила": 0, "Жестокость": 7, "Воля": 7, "Скрытность": 2, "Непредсказуемость": 5}, "abilities": ["Стратегия городских боев", "Подавление мятежей", "Психологическая манипуляция", "Превосходные навыки выживания и рукопашного боя"], "aliases": ["Командующий ВКССГВ"], "quote": "Порядок — щит для жизни народа.", "bio": "Жесткий и прагматичный командующий Внутренним корпусом «Земля», вышедший из самых низов и сделавший головокружительную военную карьеру. Джонас Блейк — живое воплощение концепции безопасности через железную дисциплину.\n\nОн обожает превращать жестокие силовые зачистки в публичные шоу, заслужив репутацию сурового, но справедливого «защитника дома». Но за образом народного героя скрывается расчетливый функционер, готовый на любые меры ради сохранения контроля и подпитки собственного эго.\n\n---"}, {"name": "Себастьян де Валуа", "faction": "Тенебрион\n\nПодфракция: Небесный хор", "color": "#8A96A3", "role": "", "status": "Активен", "gender": "Мужской", "birth": "15.05.2000", "location": "Тенебрион", "threat": 35, "stats": {"Интеллект": 6, "Боевые возможности": 5, "Влияние": 5, "Мета-сила": 1, "Жестокость": 6, "Воля": 7, "Скрытность": 2, "Непредсказуемость": 4}, "abilities": ["Тактическое планирование", "Командование подразделениями Небесного хора"], "aliases": ["Себастьян де Валуа", "Магистр"], "quote": "Их машины холодны и бездушны. Мы же несем огонь веры, который расплавит любую сталь", "bio": "Серафим морских рубежей, чья жизнь посвящена крестовому походу против безбожной технократии. Пройдя путь от простого искателя приключений до командующего флотом, он сохранил в сердце образ своей духовной наставницы, ставший для него путеводной звездой. Себастьян фанатично верит, что его миссия — освобождение земель от скверны атеизма, и ведет свои корабли в бой с именем богини на устах.\n\n---"}, {"name": "Эмили Картер", "faction": "Единая Америка\n\nПодфракция: Министерство энергетики и природных ресурсов", "color": "#8A96A3", "role": "Министр энергетики и природных ресурсов", "status": "Активен", "gender": "Женский", "birth": "10.10.1992", "location": "Единая Америка", "threat": 35, "stats": {"Интеллект": 7, "Боевые возможности": 3, "Влияние": 5, "Мета-сила": 0, "Жестокость": 5, "Воля": 6, "Скрытность": 5, "Непредсказуемость": 4}, "abilities": ["Государственное управление", "Экологическое лоббирование", "Теневые экономические схемы", "Химический синтез и биокомпоненты"], "aliases": ["Министр энергетики"], "quote": "Мы строим чистое будущее на фундаменте незыблемых традиций и передовой науки.", "bio": "Глава Министерства энергетики и природных ресурсов. Публично Эмили — строгая, утонченная женщина и страстный борец за экологию, пропагандирующая геотермальную энергетику и заботу о планете.\n\nОднако за фасадом «зеленого» прогрессизма скрывается тщеславная особа, чья жажда роскоши и страх перед разоблачением техногенной катастрофы сделали её покорной служанкой теневой империи Эленис.\n\n---"}, {"name": "Барон", "faction": "Дно", "color": "#6F7E8C", "role": "Лидер группировки", "status": "Активен", "gender": "Мужской", "birth": "03.11.2005", "location": "Белая зона", "threat": 35, "stats": {"Интеллект": 4, "Боевые возможности": 3, "Влияние": 3, "Мета-сила": 0, "Жестокость": 7, "Воля": 6, "Скрытность": 6, "Непредсказуемость": 6}, "abilities": ["лидерство", "управление наемниками"], "aliases": ["Барон"], "quote": "Не думал, что когда-нибудь с тобой соглашусь. А вот, пришлось\n\n---", "bio": ""}, {"name": "Рауль Эрнандес", "faction": "Forge\n\nПодфракция: Совет директоров Forge", "color": "#8A96A3", "role": "Директор по внешним связям и правовым вопросам", "status": "Активен", "gender": "Мужской", "birth": "14.10.1985", "location": "Штаб-квартира Forge", "threat": 35, "stats": {"Интеллект": 9, "Боевые возможности": 1, "Влияние": 5, "Мета-сила": 0, "Жестокость": 5, "Воля": 7, "Скрытность": 6, "Непредсказуемость": 2}, "abilities": ["Юридическое манипулирование", "Международная дипломатия", "Шпионаж и сбор компромата"], "aliases": ["Неизвестно"], "quote": "Закон — это не истина. Закон — это инструмент. Важно не то, что правильно, а то, что можно доказать.", "bio": "Теневой дипломат и правовой щит корпорации. Рауль обеспечивает легитимность самым сомнительным операциям и мастерски использует закон как оружие, защищая интересы своего руководства на мировой арене.\n\n---"}, {"name": "Андрей Журавлев", "faction": "Гарнизон", "color": "#88A0B0", "role": "Боец", "status": "Активен", "gender": "Мужской", "birth": "15.03.2000", "location": "Гарнизон", "threat": 35, "stats": {"Интеллект": 4, "Боевые возможности": 6, "Влияние": 1, "Мета-сила": 0, "Жестокость": 5, "Воля": 8, "Скрытность": 6, "Непредсказуемость": 5}, "abilities": ["Силовые методы", "тактическое планирование", "управление транспортом"], "aliases": ["Андрюха"], "quote": "Хочется больше смысла, и так все просрали. Такой мир запорот\n\n---", "bio": ""}, {"name": "Катарина Меланье", "faction": "Тенебрион\n\nПодфракция: Капитул Воспитания", "color": "#8A96A3", "role": "", "status": "Активен", "gender": "Женский", "birth": "20.01.1990", "location": "Тенебрион", "threat": 34, "stats": {"Интеллект": 7, "Боевые возможности": 2, "Влияние": 5, "Мета-сила": 1, "Жестокость": 7, "Воля": 8, "Скрытность": 4, "Непредсказуемость": 1}, "abilities": ["Организация образовательных процессов", "генетический отбор", "управление воспитательными комплексами"], "aliases": ["Верховная Наставница"], "quote": "Дисциплина — единственный подарок, который стоит дарить ребенку\n\n---", "bio": ""}, {"name": "Кристина Новак", "faction": "Тенебрион\n\nПодфракция: Церковь Тенебрии", "color": "#8A96A3", "role": "", "status": "Активен", "gender": "Женский", "birth": "12.11.1995", "location": "Тенебрион", "threat": 34, "stats": {"Интеллект": 7, "Боевые возможности": 7, "Влияние": 8, "Мета-сила": 6, "Жестокость": 3, "Воля": 7, "Скрытность": 1, "Непредсказуемость": 1}, "abilities": ["Управление колониями бактерий (биокинез", "исцеление", "ускоренная деструкция органики)"], "aliases": [], "quote": "Истинная вера не кричит с алтарей. Она тихо шепчет во тьме, заживляя чужие раны", "bio": "Милосердный свет во тьме, чья преданность Тенебрии лишена фанатизма, но полна искренней заботы. Будучи талантливым врачом, она научилась превращать свою пугающую силу контроля бактерий в инструмент исцеления и поддержки. Кристина — единственный человек в высших эшелонах власти, сохранивший чистоту разума и видящий в богине не идол, а одинокую младшую сестру, нуждающуюся в защите.\n\n---"}, {"name": "Лукас Вайс", "faction": "Тенебрион\n\nПодфракция: Церковь Тенебрии", "color": "#8A96A3", "role": "", "status": "Активен", "gender": "Мужской", "birth": "14.10.1990", "location": "Тенебрион", "threat": 33, "stats": {"Интеллект": 6, "Боевые возможности": 4, "Влияние": 8, "Мета-сила": 3, "Жестокость": 4, "Воля": 6, "Скрытность": 2, "Непредсказуемость": 3}, "abilities": ["Медицинское целительство", "Диагностика духовных дисбалансов через физические проявления", "Разработка систем духовного преображения"], "aliases": ["Хранитель Жизни", "Архитектор Тела"], "quote": "Смерть — это просто техническая ошибка. Я здесь, чтобы её исправить\n\n---", "bio": ""}, {"name": "Джейсон МакКензи", "faction": "Forge\n\nПодфракция: Военный блок Forge, Совет директоров Forge", "color": "#8A96A3", "role": "Директор по безопасности (CSO)", "status": "Активен", "gender": "Мужской", "birth": "10.10.2010", "location": "Восточный регион", "threat": 33, "stats": {"Интеллект": 5, "Боевые возможности": 4, "Влияние": 5, "Мета-сила": 0, "Жестокость": 5, "Воля": 5, "Скрытность": 5, "Непредсказуемость": 4}, "abilities": ["Стратегическое планирование", "Управление частной армией", "Защита информации"], "aliases": ["CSO", "Директор по безопасности"], "quote": "Порядок требует жертв, которые не вносятся в смету.", "bio": "Джейсон МакКензи — стальной щит корпорации Forge, человек, возглавляющий ее частную армию и отвечающий за безопасность целого региона. Профессионал высочайшего класса, он сочетает в себе таланты военного стратега и эксперта по защите информации.\n\nВ Совете Директоров он известен как самый суровый, но справедливый руководитель. Однако за его дисциплинированностью скрывается леденящий душу расчет: МакКензи готов пожертвовать жизнями немногих ради спасения системы.\n\n---"}, {"name": "Клейтон Бёрк", "faction": "Единая Америка\n\nПодфракция: Силы суверенитета и глобального влияния", "color": "#8A96A3", "role": "Глава Управления оборонных закупок и военной логистики", "status": "Активен", "gender": "Мужской", "birth": "22.05.1975", "location": "Единая Америка", "threat": 33, "stats": {"Интеллект": 5, "Боевые возможности": 4, "Влияние": 5, "Мета-сила": 0, "Жестокость": 5, "Воля": 6, "Скрытность": 6, "Непредсказуемость": 2}, "abilities": ["Контроль военных поставок", "Теневое финансирование разработок", "Беспрепятственная армейская логистика"], "aliases": ["Глава Управления оборонных закупок"], "quote": "Пока политики в кабинетах трясутся над бумажками, настоящие патриоты куют победу в тени.", "bio": "Глава Управления оборонных закупок и логистики, суровый ветеран Американского кризиса с рублеными чертами лица. Генерал Бёрк презирает слабость и бюрократию, считая действующую власть чересчур мягкотелой.\n\nВедомый гордыней и иллюзией романтической связи с Нимфеей Эленис, этот непреклонный вояка т
